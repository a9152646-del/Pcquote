    <script>

    function enterSystem(tab) {
        document.getElementById('landing-page').classList.add('hidden');
        document.getElementById('main-container').classList.remove('hidden');
        showTab(tab);
    }
    
    function goBack() {
        if(confirm('回到首頁？未儲存的內容將遺失。')) {
            resetForm();
            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
        }
    }

    // 保留原本的所有 Javascript 內容
    const firebaseConfig = { apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM", authDomain: "magic-conch-gaming.firebaseapp.com", databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "magic-conch-gaming", storageBucket: "magic-conch-gaming.firebasestorage.app", messagingSenderId: "105735978925", appId: "1:105735978925:web:3ec77acbfd344475322b24" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let inv = {}; let catOrder = []; let records = []; let templates = {}; let currentSelections = {}; let editingRecordId = null; let currentCat = "";
    let collapsedCats = {}; let invSearchKeyword = "";

    function handleToggles() {
        const body = document.getElementById('mainBody');
        const price = document.getElementById('itemPriceToggle').checked;
        const cost = document.getElementById('itemCostToggle').checked;
        const admin = document.getElementById('adminToggle').checked;
        const ssTotal = document.getElementById('ssTotalToggle').checked;
        if(price) body.classList.remove('hide-item-prices'); else body.classList.add('hide-item-prices');
        if(cost) body.classList.remove('hide-item-costs'); else body.classList.add('hide-item-costs');
        if(admin) body.classList.remove('hide-admin-box'); else body.classList.add('hide-admin-box');
        if(ssTotal) body.classList.remove('ss-hide-totals'); else body.classList.add('ss-hide-totals');
    }

    function calculate() {
        try {
            let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
            let noCard = parseFloat(document.getElementById('noCardTotal')?.value || 0);
            let manualVal = document.getElementById('manualTotal').value;
            catOrder.forEach(cat => {
                (currentSelections[cat] || []).forEach(s => {
                    let p = 0, c = 0; if (s.p !== undefined && s.c !== undefined) { p = Number(s.p || 0); c = Number(s.c || 0); } 
                    else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
                    if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
                });
            });
            const baseTaxedTotal = (manualVal !== "" && !isNaN(parseFloat(manualVal))) ? parseFloat(manualVal) : (subP - disc);
            document.getElementById('ui-totalSale').innerText = `$${baseTaxedTotal.toLocaleString()}`;
            const taxAmount = Math.round(baseTaxedTotal - (baseTaxedTotal / 1.05));
            let profit = baseTaxedTotal - subC; 
            if (noCard > 0) { profit = (noCard - baseTaxedTotal) + (baseTaxedTotal - subC); document.getElementById('ui-noCardVal').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ui-noCardShow').classList.remove('hidden'); } else document.getElementById('ui-noCardShow').classList.add('hidden');
            const realProfit = profit - taxAmount;
            document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`; document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
            document.getElementById('ui-taxAmt').innerText = `-$${taxAmount.toLocaleString()}`; document.getElementById('ui-realProfit').innerText = `$${realProfit.toLocaleString()}`;
        } catch(e) {}
    }

    function renderConfig() {
        const container = document.getElementById('configRows'); if(!container) return;
        const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode'); 
        container.innerHTML = '';
        catOrder.forEach(cat => {
            const items = currentSelections[cat] || []; if (isSS && items.length === 0) return;
            const badges = items.map((sel, sIdx) => {
                let target = (inv[cat] || [])[sel.idx]; if(!target) return '';
                const dispP = (sel.p !== undefined) ? sel.p : target.p;
                const dispC = (sel.c !== undefined) ? sel.c : (target.c || 0);
                return `<div class="selected-badge mb-1">${sel.isGift?'[贈] ':''}<b>${target.name}</b>${sel.qty>1?` (x${sel.qty})`:''} <span class="price-tag">($${Number(dispP).toLocaleString()})</span><span class="cost-tag">(本:$${Number(dispC).toLocaleString()})</span></div>`;
            }).join('');
            container.innerHTML += `<div class="item-row" onclick="openSelection('${cat}')"><div class="text-[10px] font-black text-blue-400 uppercase mb-1">${cat}</div><div class="flex flex-col">${badges || '<span class="text-gray-300 italic text-xs">未選中項目...</span>'}</div></div>`;
        });
        calculate();
    }

    function renderInventoryEditor() { 
        const area = document.getElementById('inventoryEditor'); if (!area) return; const scrollPos = window.scrollY; area.innerHTML = ''; 
        const query = (invSearchKeyword || "").toLowerCase();
        catOrder.forEach((cat, cIdx) => { 
            const items = inv[cat] || []; const catMatch = cat.toLowerCase().includes(query); const filteredItems = items.filter(item => item.name.toLowerCase().includes(query));
            if (query && !catMatch && filteredItems.length === 0) return;
            const isCollapsed = collapsedCats[cat]; const sec = document.createElement('div'); sec.className = "bg-gray-100 p-3 rounded-xl border-2 mb-4 category-drag-item"; sec.dataset.catname = cat; 
            sec.innerHTML = `<div class="flex justify-between items-center ${isCollapsed?'':'mb-4'}"><div class="flex items-center gap-2"><span class="drag-handle cat-drag-handle">≡</span><input class="font-black text-base text-blue-700 border-none bg-transparent p-0 w-40" value="${cat}" onchange="renameCat(${cIdx}, this.value)"></div><div class="flex items-center gap-2"><button onclick="collapsedCats['${cat}']=!collapsedCats['${cat}'];renderInventoryEditor();" class="px-3 py-1 bg-white border rounded-lg font-black text-[10px] shadow-sm">${isCollapsed?'展開 +':'收合 -'}</button><button onclick="removeCat(${cIdx})" class="text-red-300 hover:text-red-500 text-2xl">×</button></div></div><div id="edit-${cat}" class="space-y-3 item-drag-container ${isCollapsed?'hidden':''}" data-cat="${cat}"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs font-bold bg-white mt-4 py-3 rounded-xl border-2 border-dashed border-gray-300 text-gray-400 ${isCollapsed?'hidden':''}">+ 新增零件品項</button>`; 
            area.appendChild(sec); 
            if(!isCollapsed) {
                items.forEach((item, idx) => { 
                    if (query && !catMatch && !item.name.toLowerCase().includes(query)) return;
                    const row = document.createElement('div'); row.className = `inv-item-row item-drag-row`; row.dataset.originalidx = idx; 
                    const sups = ['原', '速', '裕']; let supHtml = sups.map(s => `<button onclick="toggleSup('${cat}', ${idx}, '${s}')" class="sup-btn ${(item.sups||[]).includes(s)?'active':''}">${s}</button>`).join(''); 
                    row.innerHTML = `<div class="inv-item-main"><span class="drag-handle item-drag-handle">≡</span><div class="inv-name-area"><textarea class="inv-name-input" rows="1">${item.name}</textarea></div><button onclick="removeInvItem('${cat}', ${idx})" class="text-red-500 text-2xl px-2 flex-shrink-0">×</button></div><div class="inv-control-bar"><div class="price-group"><div class="val-box"><span class="val-label">售</span><input type="number" class="val-input p-input" value="${item.p}" onchange="inv['${cat}'][${idx}].p=Number(this.value)"></div><div class="val-box"><span class="val-label">本</span><input type="number" class="val-input c-input" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=Number(this.value)"></div><div class="flex gap-1 mx-1">${supHtml}</div><button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock;renderInventoryEditor();" class="stock-btn ${item.outOfStock?'oos':'active'}">${item.outOfStock?'缺貨':'供應'}</button></div></div>`; 
                    document.getElementById(`edit-${cat}`).appendChild(row); 
                    const ta = row.querySelector('textarea'); setTimeout(() => { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight) + 'px'; }, 10);
                    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; inv[cat][idx].name = this.value; });
                });
            }
        }); 
        setTimeout(() => { window.scrollTo(0, scrollPos); }, 50);
    }

    function saveRecord(st) { 
        const id = editingRecordId ? String(editingRecordId) : String(Date.now()); 
        const oldR = records.find(x => String(x.id) === id); const status = st === 'current' ? (oldR ? (oldR.status || 'draft') : 'draft') : st;
        const rawData = { id, time: (oldR ? oldR.time : new Date().toLocaleString()), name: document.getElementById('custName').value || "", custPhone: document.getElementById('custPhone').value || "", custAddr: document.getElementById('custAddr').value || "", custWarranty: document.getElementById('custWarranty').value || "", seller: document.getElementById('infoSeller').value || "江鈞宇", orderMemo: document.getElementById('orderMemo').value || "", paymentStatus: document.getElementById('infoPayment').value || "未付款", selections: currentSelections || {}, total: document.getElementById('ui-totalSale').innerText || "$0", discount: document.getElementById('discountAmt').value || 0, noCard: document.getElementById('noCardTotal').value || "", manualTotal: document.getElementById('manualTotal').value || "", status, progress: (oldR ? oldR.progress : "待處理"), notShipped: (oldR ? (oldR.notShipped || {}) : {}) }; 
        db.ref('records/' + id).update(rawData).then(() => { alert('💾 儲存成功！'); resetForm(); showTab(status === 'draft' ? 'drafts' : (status === 'order' ? 'orders' : 'completed')); });
    }

    function renderRecords() {
        const lists = { 'draft': document.getElementById('draftList'), 'order': document.getElementById('orderList'), 'completed': document.getElementById('completedList') };
        Object.values(lists).forEach(l => { if(l) l.innerHTML = ''; });
        records.sort((a,b)=>b.id-a.id).forEach(r => {
            const status = r.status || 'draft'; if (!lists[status]) return;
            const pOpts = ["待處理", "已叫貨", "組裝中", "測試中", "已完工", "已寄出"].map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
            const payOpts = ["未付款", "已付訂金", "已付清"].map(p => `<option value="${p}" ${(r.paymentStatus||"未付款")===p?'selected':''}>${p}</option>`).join('');
            let unshippedHtml = ""; if (r.notShipped) { Object.keys(r.notShipped).forEach(cat => { (r.notShipped[cat] || []).forEach(idx => { const target = (inv[cat] || [])[idx]; if (target) unshippedHtml += `<div class="text-[10px] text-red-500 font-black mt-1">🔴 未出貨：[${cat}] ${target.name}</div>`; }); }); }
            const noCardVal = (r.noCard && r.noCard !== "") ? Number(r.noCard).toLocaleString() : null;
            const div = document.createElement('div'); div.className = "p-4 border-2 rounded-xl bg-white shadow-sm space-y-3";
            div.innerHTML = `<div class="flex justify-between items-start"><div><div class="text-[10px] text-gray-400">${r.time}</div><div class="text-base font-black">${r.name || '無名氏'}</div><div class="text-blue-600 font-black text-lg">${r.total}</div>${noCardVal ? `<div class="text-[11px] text-orange-600 font-black mt-1">💳 無卡：$${noCardVal}</div>` : ''}${unshippedHtml}</div><div class="text-right"><span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-1 rounded-full">${r.seller}</span><div class="mt-2"><select onchange="db.ref('records/'+'${r.id}'+'/progress').set(this.value)" class="text-[10px] font-bold px-1 rounded ${getStatusClass(r.progress)}">${pOpts}</select></div><div class="mt-1"><select onchange="db.ref('records/'+'${r.id}'+'/paymentStatus').set(this.value)" class="text-[10px] font-bold px-1 rounded ${getPayClass(r.paymentStatus||'未付款')}">${payOpts}</select></div></div></div><div class="flex gap-1 pt-3 border-t"><button onclick="editRecord('${r.id}')" class="flex-1 py-2 bg-blue-600 text-white text-[10px] rounded-lg font-black">編輯</button><button onclick="openShipmentModal('${r.id}')" class="flex-1 py-2 bg-gray-50 text-gray-500 text-[10px] rounded-lg font-black border">🚚 出貨</button>${status === 'draft' ? `<button onclick="db.ref('records/'+'${r.id}'+'/status').set('order')" class="bg-green-600 text-white px-2 rounded-lg text-[10px] font-bold">轉正式</button>` : `<button onclick="db.ref('records/'+'${r.id}'+'/status').set('completed')" class="bg-gray-600 text-white px-2 rounded-lg text-[10px] font-bold">結案</button>`}<button onclick="if(confirm('刪除紀錄？')) db.ref('records/'+'${r.id}').remove()" class="text-red-300 text-xl px-1">✕</button></div>`;
            lists[status].appendChild(div);
        });
    }

    function renderStats() {
        const content = document.getElementById('statsContent'); if(!content) return; let monthlyData = {};
        records.forEach(r => { 
            if(r.status === 'draft') return; 
            const dateParts = r.time.split('/'); const monthKey = `${dateParts[0]}/${dateParts[1]}`; 
            if(!monthlyData[monthKey]) monthlyData[monthKey] = { revenue: 0, cost: 0, profit: 0, count: 0, taxTotal: 0 }; 
            const rev = parseInt(r.total.replace(/[^0-9.-]+/g,"")) || 0; 
            const tax = Math.round(rev - (rev / 1.05));
            monthlyData[monthKey].taxTotal += tax;
            let itemCost = 0; 
            for(let cat in r.selections) { 
                r.selections[cat].forEach(s => { 
                    let c = (s.c !== undefined) ? Number(s.c) : 0; 
                    if(!s.c) { const item = (inv[cat] || [])[s.idx]; if(item) c = Number(item.c || 0); } 
                    itemCost += (c * (s.qty || 1)); 
                }); 
            } 
            monthlyData[monthKey].revenue += rev; monthlyData[monthKey].cost += itemCost; monthlyData[monthKey].count += 1; 
        });
        Object.keys(monthlyData).forEach(k => { monthlyData[k].profit = Math.round((monthlyData[k].revenue / 1.05) - monthlyData[k].cost); });
        content.innerHTML = Object.keys(monthlyData).sort((a,b)=>b.localeCompare(a)).map(m => `<div class="card p-4"><div class="text-lg font-black text-gray-800 mb-2">${m} 績效統計</div><div class="grid grid-cols-2 md:grid-cols-4 gap-2"><div><div class="text-[10px] text-gray-400">總收</div><div class="text-blue-600 font-bold">$${monthlyData[m].revenue.toLocaleString()}</div></div><div><div class="text-[10px] text-gray-400">成本</div><div class="text-red-500 font-bold">$${monthlyData[m].cost.toLocaleString()}</div></div><div><div class="text-[10px] text-gray-400">稅金</div><div class="text-orange-600 font-bold">$${monthlyData[m].taxTotal.toLocaleString()}</div></div><div><div class="text-[10px] text-gray-400">淨利</div><div class="text-green-600 font-bold font-black">$${monthlyData[m].profit.toLocaleString()}</div></div></div></div>`).join('');
    }

    function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t === 'inventory') renderInventoryEditor(); if(t === 'stats') renderStats(); renderRecords(); }
    function editRecord(id) { const r = records.find(x => String(x.id) === String(id)); if(!r) return; editingRecordId = id; currentSelections = JSON.parse(JSON.stringify(r.selections || {})); document.getElementById('custName').value = r.name || ''; document.getElementById('discountAmt').value = r.discount || 0; document.getElementById('manualTotal').value = r.manualTotal || ''; document.getElementById('infoPayment').value = r.paymentStatus || '未付款'; renderConfig(); showTab('calc'); }
    function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('#tab-calc input, #tab-calc textarea').forEach(i=>i.value=""); renderConfig(); }
    function enterScreenshotMode() { document.getElementById('ss-time').innerText = '日期：' + new Date().toLocaleString(); document.getElementById('ss-val-disc').innerText = '$' + Number(document.getElementById('discountAmt').value).toLocaleString(); document.getElementById('ss-val-total').innerText = document.getElementById('ui-totalSale').innerText; document.getElementById('ss-warranty-info').innerText = document.getElementById('custWarranty').value ? `🛡️ 保固：${document.getElementById('custWarranty').value}` : ''; document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshot-header').style.display = 'block'; document.getElementById('screenshot-footer').style.display = 'block'; document.getElementById('screenshotNav').classList.remove('hidden'); renderConfig(); window.scrollTo(0,0); }
    function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshot-header').style.display = 'none'; document.getElementById('screenshot-footer').style.display = 'none'; document.getElementById('screenshotNav').classList.add('hidden'); renderConfig(); }
    
    function downloadQuoteImage() {
        const area = document.getElementById('screenshot-area');
        html2canvas(area, {
            scale: 2, useCORS: true, backgroundColor: "#ffffff",
            onclone: (clonedDoc) => {
                const clonedArea = clonedDoc.getElementById('screenshot-area');
                clonedArea.style.width = '400px'; 
                clonedDoc.querySelectorAll('.selected-badge').forEach(badge => { badge.style.fontSize = '13px'; badge.style.display = 'block'; badge.style.letterSpacing = '0.5px'; });
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `神奇海螺報價單_${document.getElementById('custName').value || '未命名'}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function toggleSup(cat, idx, s) { if(!inv[cat][idx].sups) inv[cat][idx].sups = []; const i = inv[cat][idx].sups.indexOf(s); if(i > -1) inv[cat][idx].sups.splice(i, 1); else inv[cat][idx].sups.push(s); renderInventoryEditor(); }
    function renameCat(idx, n) { const o = catOrder[idx]; inv[n] = inv[o]; delete inv[o]; catOrder[idx] = n; }
    function addNewCategory() { const n = prompt("大項名稱："); if(n) { catOrder.push(n); inv[n] = []; renderInventoryEditor(); } }
    function addInvItem(c) { if(!inv[c]) inv[c] = []; inv[c].push({name: "新零件", p: 0, c: 0, outOfStock: false, sups: []}); renderInventoryEditor(); }
    function saveInventory() { if(confirm('同步雲端？')) { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('成功'); } }
    function getStatusClass(p) { const map = {"待處理":"status-red", "已叫貨":"status-yellow", "組裝中":"status-blue", "測試中":"status-orange", "已完工":"status-purple", "已寄出":"status-green"}; return map[p] || ""; }
    function getPayClass(p) { const map = {"未付款":"status-red", "已付訂金":"status-orange", "已付清":"status-green"}; return map[p] || ""; }
    function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = '🔍 ' + cat; document.getElementById('selectionModal').classList.remove('hidden'); renderModalList(); }
    function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
    function renderModalList() { const list = document.getElementById('modalList'); list.innerHTML = ''; (inv[currentCat] || []).forEach((item, idx) => { const sel = (currentSelections[currentCat] || []).find(s => s.idx === idx); list.innerHTML += `<div class="p-3 border-2 rounded-xl flex justify-between items-center mb-2 ${sel?'border-blue-500 bg-blue-50':'border-gray-100'} ${item.outOfStock?'opacity-30 pointer-events-none':''}" onclick="togglePick(${idx})"><div class="flex-1"><div class="font-black text-gray-800 text-xs">${item.name}</div><div class="text-blue-600 font-black text-sm">$${item.p.toLocaleString()}</div></div>${sel ? `<div class="flex items-center gap-2" onclick="event.stopPropagation()"><button onclick="updateSubItem(${idx}, 'qty', -1)" class="bg-gray-100 px-3 py-1 rounded-lg">-</button><span>${sel.qty}</span><button onclick="updateSubItem(${idx}, 'qty', 1)" class="bg-blue-100 px-3 py-1 rounded-lg">+</button></div>`:''}</div>`; }); }
    function togglePick(idx) { if(!currentSelections[currentCat]) currentSelections[currentCat] = []; const i = currentSelections[currentCat].findIndex(s => s.idx === idx); if(i > -1) currentSelections[currentCat].splice(i,1); else { const t = inv[currentCat][idx]; currentSelections[currentCat].push({idx, qty:1, isGift:false, p: t.p, c: t.c}); } renderConfig(); renderModalList(); }
    function updateSubItem(idx, type, val) { const sel = currentSelections[currentCat].find(s => s.idx === idx); if(type==='qty') sel.qty = Math.max(1, sel.qty + val); renderConfig(); renderModalList(); }
    function openShipmentModal(id) { const r = records.find(x => String(x.id) === String(id)); if(!r) return; const list = document.getElementById('shipmentList'); list.innerHTML = ''; const ns = r.notShipped || {}; catOrder.forEach(cat => { (r.selections[cat] || []).forEach((sel, idx) => { let target = (inv[cat] || [])[sel.idx]; if (target) { const isNS = ns[cat] && ns[cat].includes(idx); list.innerHTML += `<label class="flex items-center gap-3 p-4 border-2 rounded-xl bg-white ${isNS?'border-red-500 bg-red-50':'border-gray-100'}"><input type="checkbox" ${isNS?'checked':''} onchange="updateItemShipment('${id}', '${cat}', ${idx}, this.checked)"><div class="flex-1 text-sm font-bold">${target.name}</div></label>`; } }); }); document.getElementById('shipmentModal').classList.remove('hidden'); }
    function updateItemShipment(id, cat, idx, isNS) { const r = records.find(x => String(x.id) === String(id)); if(!r) return; let ns = r.notShipped || {}; if(!ns[cat]) ns[cat] = []; if(isNS) { if(!ns[cat].includes(idx)) ns[cat].push(idx); } else { ns[cat] = ns[cat].filter(i => i !== idx); } db.ref('records/' + id + '/notShipped').set(ns); }
    function openTemplateModal() { const list = document.getElementById('templateList'); list.innerHTML = ''; Object.keys(templates).forEach(id => { const t = templates[id]; list.innerHTML += `<div class="p-4 border-2 rounded-xl mb-3 flex justify-between items-center bg-white shadow-sm" onclick="applyTemplate('${id}')"><div class="font-black text-xs">${t.name}</div><button class="bg-red-100 text-red-500 px-3 py-1 rounded-lg text-[10px]" onclick="event.stopPropagation(); db.ref('templates/'+'${id}').remove()">刪除</button></div>`; }); document.getElementById('templateModal').classList.remove('hidden'); }
    function applyTemplate(id) { currentSelections = JSON.parse(JSON.stringify(templates[id].selections)); renderConfig(); document.getElementById('templateModal').classList.add('hidden'); }
    function saveTemplate() { const name = prompt("範本名稱："); if (name) db.ref('templates/' + Date.now()).set({ name, selections: currentSelections }); }
    function addCustomSeller() { const n = prompt("業務姓名："); if(n) { const s = document.getElementById('infoSeller'); const o = document.createElement('option'); o.value=n; o.text=n; o.selected=true; s.add(o); } }
    function copyQuoteAsText() { let text = `【神奇海螺報價單】\n`; catOrder.forEach(cat => { (currentSelections[cat] || []).forEach(sel => { let t = (inv[cat] || [])[sel.idx]; if (t) text += `[${cat}] ${t.name} x ${sel.qty}\n`; }); }); text += `總計：${document.getElementById('ui-totalSale').innerText}`; navigator.clipboard.writeText(text).then(() => alert('已複製文字！')); }

    db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); if(!document.getElementById('tab-inventory').classList.contains('hidden')) renderInventoryEditor(); });
    db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
    db.ref('records').on('value', s => { records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); } renderRecords(); });
    db.ref('templates').on('value', s => { templates = s.exists() ? s.val() : {}; });

    window.onload = () => { handleToggles(); };
    </script>
</body>
