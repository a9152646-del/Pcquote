    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-top: 60px !important; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }

        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; }
        .selected-badge { color: #000; font-size: 14px; margin-right: 12px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
        .price-tag { color: #000; font-weight: 900; }
        
        /* 截圖模式優化 */
        #screenshot-header, #screenshot-footer { display: none; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode #mainBody { background: #fff !important; padding: 30px 20px !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: 0 4px 20px rgba(0,0,0,0.03) !important; border: 1px solid #f0f0f0 !important; border-radius: 12px !important; padding: 1.5rem !important; }
        
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 10px; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; }
        .screenshot-mode #screenshot-header .ss-title { font-size: 1.8rem; font-weight: 900; color: #1e3a8a; letter-spacing: 5px; }
        .screenshot-mode #screenshot-header #ss-time { font-size: 0.8rem; color: #888; margin-top: 5px; }

        .screenshot-mode #screenshot-footer { display: block !important; margin-top: 25px; text-align: right; border-top: 1px solid #eee; padding-top: 15px; }
        .ss-amount-row { font-size: 0.9rem; font-weight: 700; color: #666; margin-bottom: 2px; }
        .ss-total-row { font-size: 1.6rem; font-weight: 900; color: #3b82f6; border-top: 2px solid #3b82f6; margin-top: 8px; padding-top: 5px; display: inline-block; min-width: 220px; }
        
        /* 返回按鈕：改至左下角 */
        #screenshotNav { position: fixed; bottom: 30px; left: 20px; z-index: 9999999; display: none; }
        .screenshot-mode #screenshotNav { display: block !important; }
        #screenshotNav button { font-size: 13px; padding: 10px 18px; border-radius: 50px; background: rgba(30, 41, 59, 0.85); color: white; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .pick-item { transition: all 0.2s; border: 2px solid #e5e7eb; cursor: pointer; border-radius: 10px; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; }
        .out-of-stock-row { background-color: #fff1f2 !important; border-color: #fecaca !important; }
    </style>
</head>

        <div class="p-4 border-b flex justify-between items-center bg-gray-50"><h3 id="modalTitle" class="font-bold text-blue-600">選擇品項</h3><button onclick="closeModal()" class="text-gray-400 text-3xl">×</button></div>
        <div class="p-3 border-b bg-white"><input type="text" id="modalSearch" class="w-full" placeholder="🔍 搜尋零件名稱..." oninput="filterModalList()"></div>

        <div class="p-4 border-t bg-gray-50 space-y-2">
            <div class="flex gap-2"><input type="text" id="tempName" class="flex-1" placeholder="名稱"><input type="number" id="tempPrice" class="w-20" placeholder="售價"><input type="number" id="tempCost" class="w-20" placeholder="成本"><button onclick="addTempItem()" class="bg-orange-500 text-white px-4 py-1 rounded text-sm font-bold">新增</button></div>

<div id="deliveryModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[1000]">
    <div class="bg-white rounded-2xl max-w-xl w-full max-h-[80vh] overflow-hidden flex flex-col shadow-2xl">

        <div id="deliveryList" class="overflow-y-auto flex-1 p-4 space-y-2 bg-gray-50"></div>
        <div class="p-4 border-t"><button onclick="saveDeliveryStatus()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">更新狀態</button></div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; let editingRecordId = null; let currentCat = ""; let currentStatus = 'draft'; let isSellerMode = true;

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => { records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); } renderRecords(); });

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    if(noCard > 0) { document.getElementById('ui-noCardShow').innerText = `無卡分期：$${noCard.toLocaleString()}`; document.getElementById('ui-noCardShow').classList.remove('hidden'); } else { document.getElementById('ui-noCardShow').classList.add('hidden'); }
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${((noCard > 0 ? noCard : finalSale) - subC).toLocaleString()}`;
    
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
    document.getElementById('ss-discount').innerText = `-$${disc.toLocaleString()}`;
    document.getElementById('ss-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `$${finalSale.toLocaleString()}`;
    if(noCard > 0) { document.getElementById('ss-nocard-val').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ss-nocard-row').classList.remove('hidden'); } else { document.getElementById('ss-nocard-row').classList.add('hidden'); }
}

function renderConfig() {
    const container = document.getElementById('configRows');
    const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode');
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        if (isSS && items.length === 0) return;
        const badges = items.map(sel => {
            let target = sel.isTemp ? sel : (inv[cat] || [])[sel.idx];
            if(!target) return '';
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${target.name}${sel.qty>1?` x${sel.qty}`:''} <span class="price-tag ml-1 text-xs">($${Number(target.p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer" onclick="openSelection('${cat}')">
            <div class="text-[11px] font-black text-blue-500 uppercase tracking-widest">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs no-screenshot">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const progressList = ["待處理", "組裝中", "測試中", "已完工", "已寄出"];
        const pOpts = progressList.map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
        const div = `<div class="p-4 border-2 rounded-xl bg-white shadow-sm mb-2">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="text-[10px] text-gray-400 font-bold">${r.time}</div>
                    <div class="text-sm font-bold text-gray-700">${r.name || '[無名]'}</div>
                    <div class="text-blue-600 font-black text-xl">${r.total}</div>
                </div>
                <div class="flex flex-col gap-1 items-end">
                    <div class="flex gap-1 items-center">
                        <span class="bg-gray-100 text-[10px] px-2 py-1 rounded font-bold h-[24px] flex items-center">${r.seller||'未選'}</span>
                        <select onchange="db.ref('records/'+${r.id}+'/progress').set(this.value)" class="text-[10px] px-1 py-0 border rounded w-24 h-[24px] leading-none">${pOpts}</select>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 border-t mt-2 pt-2">
                <button onclick="editRecord(${r.id})" class="flex-1 py-1 bg-blue-500 text-white text-xs rounded font-bold">編輯</button>
                ${r.status === 'draft' ? `<button onclick="if(confirm('轉正式訂單？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold">✅ 轉正式</button>` : `<button onclick="openDeliveryFast(${r.id})" class="flex-1 py-1 bg-orange-500 text-white text-xs rounded font-bold">📦 出貨</button>`}
                <button onclick="if(confirm('刪除？')) db.ref('records/'+${r.id}).remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded">刪除</button>
            </div>
        </div>`;
        if(r.status === 'draft') dList.innerHTML += div; else if(r.status === 'completed') cList.innerHTML += div; else oList.innerHTML += div;
    });
}

function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border-2 shadow-sm relative";
        sec.innerHTML = `<div class="flex justify-between items-center mb-3">
            <div class="flex items-center gap-2">
                <div class="flex flex-col text-[10px] text-gray-400">
                    <button onclick="moveCat(${cIdx}, -1)">▲</button>
                    <button onclick="moveCat(${cIdx}, 1)">▼</button>
                </div>
                <input class="font-bold text-blue-600 border-none p-0 w-32 focus:ring-0" value="${cat}" onchange="renameCat(${cIdx}, this.value)">
            </div>
            <button onclick="removeCat(${cIdx})" class="text-red-300 text-3xl">×</button>
        </div>
        <div id="edit-${cat}" class="space-y-2 pl-2"></div>
        <button onclick="addInvItem('${cat}')" class="w-full text-[11px] bg-gray-50 mt-4 py-2 rounded border-dashed border-2 text-gray-400 font-bold">+ 新增零件品項</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = `flex items-center gap-2 p-2 rounded border ${item.outOfStock ? 'out-of-stock-row' : 'bg-gray-50'}`;
            row.innerHTML = `<div class="flex flex-col text-[8px] text-gray-300 px-1">
                    <button onclick="moveItem('${cat}', ${idx}, -1)">▲</button>
                    <button onclick="moveItem('${cat}', ${idx}, 1)">▼</button>
                </div>
                <input class="flex-1 text-xs font-bold bg-transparent border-none focus:ring-0" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <input type="number" class="w-16 text-xs text-blue-600 bg-white border border-gray-100 rounded px-1" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value">
                <input type="number" class="w-16 text-xs text-red-400 bg-white border border-gray-100 rounded px-1" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=this.value">
                <button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock; renderInventoryEditor();" class="text-[10px] px-2 py-1 rounded font-bold border transition-colors ${item.outOfStock ? 'bg-red-500 text-white border-red-600' : 'bg-white text-gray-500 border-gray-200 shadow-sm'}">${item.outOfStock?'缺貨':'供應'}</button>
                <button onclick="inv['${cat}'].splice(${idx}, 1); renderInventoryEditor();" class="text-red-300 px-1 text-xl">×</button>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}

function moveCat(idx, dir) { let newIdx = idx + dir; if (newIdx < 0 || newIdx >= catOrder.length) return; [catOrder[idx], catOrder[newIdx]] = [catOrder[newIdx], catOrder[idx]]; renderInventoryEditor(); }
function moveItem(cat, idx, dir) { let newIdx = idx + dir; if (newIdx < 0 || newIdx >= inv[cat].length) return; [inv[cat][idx], inv[cat][newIdx]] = [inv[cat][newIdx], inv[cat][idx]]; renderInventoryEditor(); }

function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t==='inventory') renderInventoryEditor(); }
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('admin-prices').classList.toggle('hidden'); }
function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); renderConfig(); }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); renderConfig(); }

function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = '選擇 ' + cat; document.getElementById('selectionModal').classList.remove('hidden'); renderModalList(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function filterModalList() { const q = document.getElementById('modalSearch').value.toLowerCase(); document.querySelectorAll('.pick-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-3 flex justify-between items-center rounded-lg mb-1 ${sel?'active':''} ${item.outOfStock?'opacity-40 pointer-events-none':''}" onclick="togglePick(${idx})">
            <div class="flex-1">
                <div class="font-bold text-sm">${item.outOfStock?'[缺貨中] ':''}${item.name}</div>
                <div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div>
            </div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <label class="text-xs flex items-center gap-1"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked)"> 贈</label>
                <div class="flex items-center border rounded bg-white">
                    <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${idx}, 'qty', -1)">-</button>
                    <span class="px-2 text-xs font-bold">${sel?.qty || 1}</span>
                    <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${idx}, 'qty', 1)">+</button>
                </div>
            </div>
        </div>`;
    });
}

function togglePick(idx) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function updateSubItem(idx, type, val) {
    const sel = (currentSelections[currentCat] || []).find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val);
    if(type==='gift') sel.isGift = val;
    renderConfig(); renderModalList();
}

function saveRecord(st) { 
    const id = editingRecordId || Date.now();
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, seller: document.getElementById('infoSeller').value, selections: currentSelections, total: document.getElementById('ui-totalSale').innerText, noCard: document.getElementById('noCardTotal').value, status: st === 'current' ? currentStatus : st, discount: document.getElementById('discountAmt').value, progress: "待處理" };
    db.ref('records/' + id).update(r).then(() => { alert('存檔成功'); resetForm(); showTab('drafts'); });
}

function editRecord(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; 
    document.getElementById('discountAmt').value = r.discount || 0; 
    document.getElementById('noCardTotal').value = r.noCard || '';
    if(r.status === 'draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); else document.getElementById('btnConvertToOrder').classList.add('hidden');
    renderConfig(); showTab('calc');
}

function addTempItem() {
    const n = document.getElementById('tempName').value; const p = document.getElementById('tempPrice').value; const c = document.getElementById('tempCost').value;
    if(!n) return;
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({name:n, p, c, isGift:false, qty:1, isTemp: true});
    renderConfig(); renderModalList();
}

function openDeliveryFast(id) {
    let deliveryId = id; const r = records.find(x => x.id === id); let tempDeliv = r.deliveredItems || {};
    const list = document.getElementById('deliveryList'); list.innerHTML = '';
    for (let cat in r.selections) {
        r.selections[cat].forEach((sel, idx) => {
            const k = `${cat}_${idx}`; const isD = tempDeliv[k] !== false;
            let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知");
            list.innerHTML += `<div class="flex justify-between p-3 border rounded-lg bg-white mb-1"><div class="text-sm font-bold">${n}</div><input type="checkbox" ${isD?'checked':''} onchange="db.ref('records/'+${deliveryId}+'/deliveredItems/${k}').set(this.checked)"></div>`;
        });
    }
    document.getElementById('deliveryModal').classList.remove('hidden');
}

function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('同步雲端成功'); }
function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input').forEach(i=>i.value=""); renderConfig(); }
function resetFormOnly() { if(confirm('清空重填？')) { document.querySelectorAll('input').forEach(i=>i.value=""); currentSelections={}; renderConfig(); } }
function addNewCategory() { const n = prompt("大項名稱："); if(n) { catOrder.push(n); inv[n] = []; renderInventoryEditor(); } }
function addInvItem(c) { inv[c].push({name: "新零件", p: 0, c: 0, outOfStock: false}); renderInventoryEditor(); }
function removeCat(idx) { if(confirm('確定刪除該大項與其所有內容？')) { delete inv[catOrder[idx]]; catOrder.splice(idx,1); renderInventoryEditor(); } }
function renameCat(idx, newName) { const old = catOrder[idx]; inv[newName] = inv[old]; delete inv[old]; catOrder[idx] = newName; }
function addCustomSeller() { const n = prompt("業務名："); if(n) { const s = document.getElementById('infoSeller'); const o = document.createElement('option'); o.value=n; o.text=n; o.selected=true; s.add(o); } }
function exitToOrdersWithoutSaving() { if(confirm('不儲存？')) { resetForm(); showTab('drafts'); } }
function closeDeliveryModal() { document.getElementById('deliveryModal').classList.add('hidden'); }

window.onload = () => renderConfig();
</script>
</body>
</html>
