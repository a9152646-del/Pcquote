<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>神奇海螺電競 | 專業報價與庫存系統 v8.81</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_4759.jpeg?v=1">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            background-color: #f4f9fc; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            padding-top: 60px !important; 
        }
        
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; }
        
        /* 報價模式：全黑文字、無邊框標籤 */
        .selected-badge { color: #000; font-size: 15px; margin-right: 12px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
        .price-tag { color: #000; font-weight: 900; }
        
        /* 截圖模式硬設定 */
        #screenshot-header, #screenshot-footer { display: none; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 40px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 3px solid #000 !important; border-radius: 0 !important; padding: 2rem !important; }
        .screenshot-mode .item-row { border: none; border-bottom: 1px dashed #000; padding: 12px 0; }
        
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 3px solid #000; padding-bottom: 10px; }
        .screenshot-mode #screenshot-header .ss-title { width: 100%; text-align: center; font-size: 2rem; font-weight: 900; color: #000; }
        .screenshot-mode #screenshot-header #ss-time { width: 100%; text-align: left; font-size: 0.9rem; color: #000; font-weight: bold; margin-top: 10px; }
        
        /* 截圖模式底部金額 */
        .screenshot-mode #screenshot-footer { display: block !important; margin-top: 30px; border-top: 2px solid #000; padding-top: 15px; text-align: right; }
        .ss-amount-row { font-size: 1.2rem; font-weight: 800; color: #000; margin-bottom: 5px; }
        .ss-total-row { font-size: 1.8rem; font-weight: 900; color: #000; border-top: 2px solid #000; margin-top: 10px; padding-top: 5px; display: inline-block; min-width: 250px; }

        /* 返回按鈕強制最上層 */
        #screenshotNav { position: fixed; top: 40px; right: 20px; z-index: 999999; display: none; }
        #mainBody.screenshot-mode #screenshotNav { display: block; }

        .pick-item { transition: all 0.2s; border: 2px solid #e5e7eb; cursor: pointer; border-radius: 10px; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; }
        .is-out-of-stock { opacity: 0.4; background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #64748b !important; }

        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<button onclick="location.reload(true)" class="no-screenshot fixed right-4 bottom-24 z-[40] bg-orange-500 text-white shadow-lg w-10 h-10 rounded-full flex items-center justify-center text-lg active:scale-90 transition-all opacity-80">🔄</button>

<div id="screenshotNav" class="no-screenshot">
    <button onclick="exitScreenshotMode()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black shadow-2xl border-4 border-white active:scale-90 transition-all">← 返回編輯模式</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming",
  storageBucket: "magic-conch-gaming.firebasestorage.app",
  messagingSenderId: "105735978925",
  appId: "1:105735978925:web:3ec77acbfd344475322b24"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<div class="max-w-7xl mx-auto">
    <div id="screenshot-header">
        <div class="ss-title">《報價單》</div>
        <div id="ss-time"></div>
    </div>

    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-0 z-10 p-1">
        <button onclick="showTab('calc')" id="btn-calc" class="px-5 py-4 tab-active whitespace-nowrap">🐚 報價配單</button>
        <button onclick="showTab('drafts')" id="btn-drafts" class="px-5 py-4 whitespace-nowrap">📂 訂單草稿</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-5 py-4 whitespace-nowrap">✅ 正式訂單</button>
        <button onclick="showTab('completed')" id="btn-completed" class="px-5 py-4 whitespace-nowrap">🏁 已結案</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-5 py-4 whitespace-nowrap">⚙️ 庫存品項</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6 no-screenshot">
                        <h2 class="font-bold text-xl text-blue-600">電腦配置區</h2>
                        <button onclick="toggleSellerMode()" id="sellerBtn" class="text-xs bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">管理員模式: ON</button>
                    </div>
                    <div id="configRows" class="grid grid-cols-1 md:grid-cols-1"></div>
                </div>
                <div class="card p-6 no-screenshot">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                        <select id="custSource">
                            <option value="FB">Facebook</option>
                            <option value="IG">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="其他">其他</option>
                        </select>
                        <input type="text" id="custAddr" placeholder="配送地址" class="md:col-span-4">
                        <textarea id="orderMemo" placeholder="內部備註" class="md:col-span-4 h-24 w-full"></textarea>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-20">
                    <div class="space-y-1 mb-4">
                        <div class="text-xs text-gray-400 font-bold">折扣金額</div><input type="number" id="discountAmt" class="w-full mb-2" value="0" oninput="calculate()">
                        <div id="ui-untaxed" class="text-xl font-bold text-gray-700">$0</div>
                        <div id="ui-totalSale" class="text-4xl font-black text-blue-600">$0</div>
                        <div class="pt-4 border-t mt-4 text-xs text-orange-500 font-bold">無卡分期金額</div>
                        <input type="number" id="noCardTotal" class="w-full mt-1 border-orange-200" placeholder="請輸入分期總額" oninput="calculate()">
                    </div>
                    <div id="sellerBox" class="seller-bg p-4 rounded-lg mb-6 border border-blue-100 space-y-3">
                        <div class="flex justify-between text-sm text-blue-500 border-t pt-2"><span>總成本</span><span id="ui-totalCost">$0</span></div>
                        <div class="flex justify-between text-lg font-bold text-green-600 border-t mt-2 pt-2"><span>預計淨利</span><span id="ui-totalProfit">$0</span></div>
                    </div>
                    <div class="space-y-2">
                        <button onclick="saveRecord('current')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">儲存/更新</button>
                        <button id="btnConvertToOrder" onclick="saveRecord('order')" class="hidden w-full bg-green-600 text-white py-3 rounded-xl font-bold">✅ 轉為正式訂單</button>
                        <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">📸 進入截圖模式</button>
                        <button onclick="exitToOrdersWithoutSaving()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold">❌ 不儲存並返回</button>
                        <button onclick="resetForm()" class="w-full text-gray-400 text-xs mt-2 underline font-bold">清空重填</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="screenshot-footer">
        <div class="ss-amount-box">
            <div class="ss-amount-row">折扣金額：<span id="ss-discount">-$0</span></div>
            <div class="ss-amount-row">未稅總計：<span id="ss-untaxed">$0</span></div>
            <div class="ss-total-row">含稅總額：<span id="ss-total">$0</span></div>
        </div>
    </div>

    <div id="tab-drafts" class="page-content hidden"><div id="draftList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
    <div id="tab-orders" class="page-content hidden"><div id="orderList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
    <div id="tab-completed" class="page-content hidden"><div id="completedList" class="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-90"></div></div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl text-gray-800">⚙️ 雲端品項管理</h2>
                <div class="flex gap-2">
                    <button onclick="showRecycleBin()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg text-sm font-bold">🗑️ 刪除紀錄</button>
                    <button onclick="addNewCategory()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold">+ 新增大項</button>
                    <button onclick="saveInventory()" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold">儲存並同步</button>
                </div>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<div id="selectionModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
    <div class="bg-white rounded-2xl max-w-xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50">
            <h3 id="modalTitle" class="font-bold text-blue-600">選擇品項</h3>
            <button onclick="closeModal()" class="text-gray-400 text-3xl font-bold">×</button>
        </div>
        <div class="p-3 border-b bg-white">
            <input type="text" id="modalSearch" class="w-full" placeholder="🔍 搜尋零件名稱..." oninput="filterModalList()">
        </div>
        <div id="modalList" class="overflow-y-auto flex-1 p-4 space-y-2"></div>
        <div class="p-4 border-t bg-gray-50 space-y-2">
            <div class="flex gap-2">
                <input type="text" id="tempName" class="flex-1" placeholder="名稱">
                <input type="number" id="tempPrice" class="w-20" placeholder="售價">
                <input type="number" id="tempCost" class="w-20" placeholder="成本">
                <button onclick="addTempItem()" class="bg-orange-500 text-white px-4 py-1 rounded text-sm font-bold">新增</button>
            </div>
        </div>
        <div class="p-4 border-t"><button onclick="closeModal()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">確認完成</button></div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; 
let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft';
let recycleBin = [];

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    const profit = noCard > 0 ? (noCard - subC) : (finalSale - subC);
    document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
    
    // 截圖數值
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
    document.getElementById('ss-discount').innerText = `-$${disc.toLocaleString()}`;
    document.getElementById('ss-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `$${finalSale.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode');
    container.innerHTML = '';
    
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        if (isSS && items.length === 0) return; // 截圖模式：沒選東西就完全不產生 HTML

        const badges = items.map(sel => {
            let name = "", p = 0;
            if(sel.isTemp) { name = sel.name; p = sel.p; } 
            else { const target = (inv[cat] || [])[sel.idx]; if(!target) return ''; name = target.name; p = target.p; }
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${name}${sel.qty>1?` x${sel.qty}`:''} <span class="price-tag ml-1">($${Number(p).toLocaleString()})</span></div>`;
        }).join('');
        
        container.innerHTML += `<div class="p-2 item-row cursor-pointer" onclick="openSelection('${cat}')">
            <div class="text-sm font-black text-black uppercase border-l-4 border-black pl-2 tracking-widest">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs no-screenshot">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function enterScreenshotMode() { 
    document.getElementById('mainBody').classList.add('screenshot-mode'); 
    renderConfig(); 
}
function exitScreenshotMode() { 
    document.getElementById('mainBody').classList.remove('screenshot-mode'); 
    renderConfig(); 
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const div = `<div class="p-4 border-2 rounded-xl bg-white shadow-sm"><div class="flex justify-between items-start"><div class="flex-1"><div class="text-[10px] text-gray-400 font-bold">${r.time}</div><div class="text-sm font-bold">${r.name || '[無名]'}</div><div class="text-blue-600 font-black">${r.total}</div></div></div><div class="flex gap-2 border-t mt-2 pt-2"><button onclick="editRecord(${r.id})" class="flex-1 py-1 bg-blue-500 text-white text-xs rounded font-bold">編輯</button><button onclick="if(confirm('刪除？')) db.ref('records/'+${r.id}).remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded">刪除</button></div></div>`;
        if(r.status === 'draft') dList.innerHTML += div; else oList.innerHTML += div;
    });
}
function editRecord(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; 
    document.getElementById('discountAmt').value = r.discount || 0; 
    if(r.status === 'draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); 
    else document.getElementById('btnConvertToOrder').classList.add('hidden');
    renderConfig(); showTab('calc');
}

function showTab(t) { 
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); 
    document.getElementById('tab-'+t).classList.remove('hidden'); 
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); 
    document.getElementById('btn-'+t).classList.add('tab-active'); 
    if(t==='inventory') renderInventoryEditor(); 
}

function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border relative shadow-sm";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2"><input class="font-bold text-blue-600 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)"><button onclick="removeCat(${cIdx})" class="text-red-300 text-xl">×</button></div><div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs border-dashed border-2 mt-2 py-2 rounded-lg font-bold text-gray-400">+ 新增零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "bg-gray-50 p-3 rounded-lg border space-y-2 mb-2";
            row.innerHTML = `<input type="text" class="text-sm font-black w-full bg-white border p-1" value="${item.name}" onchange="inv['${cat}'][idx].name=this.value"><div class="flex gap-2"><input type="number" class="w-1/3 text-xs" value="${item.p}" placeholder="售價" onchange="inv['${cat}'][idx].p=this.value"><input type="number" class="w-1/3 text-xs text-red-600 font-bold" value="${item.c||0}" placeholder="成本" onchange="inv['${cat}'][idx].c=this.value"><button onclick="inv['${cat}'][idx].outOfStock=!inv['${cat}'][idx].outOfStock; renderInventoryEditor();" class="w-1/3 text-[10px] font-bold rounded ${item.outOfStock?'bg-red-500 text-white':'bg-white text-gray-400 border'}">缺貨</button></div><div class="flex justify-end pt-1"><button onclick="deleteInvItem('${cat}', ${idx})" class="text-[10px] bg-red-50 text-red-500 px-4 py-1 rounded-full font-black">刪除品項 ×</button></div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0, outOfStock: false}); renderInventoryEditor(); }
function deleteInvItem(cat, idx) { inv[cat].splice(idx, 1); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('同步')); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function saveRecord(st) { 
    const id = editingRecordId || Date.now();
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, selections: currentSelections, total: document.getElementById('ui-totalSale').innerText, status: st === 'current' ? currentStatus : st, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).update(r).then(() => { alert('成功'); showTab('drafts'); });
}
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); renderConfig(); }
function togglePick(idx, isT) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = (currentSelections[currentCat] || []).find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-3 flex justify-between items-center ${sel?'active':''}" onclick="togglePick(${idx}, false)"><div>${item.name}</div><div class="font-bold">$${item.p}</div></div>`;
    });
}
function addTempItem() {
    const name = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value; 
    if(!name||!p) return; if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c: c||0, qty:1, isTemp:true });
    renderConfig(); renderModalList();
}
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = `選擇 ${cat}`; renderModalList(); document.getElementById('selectionModal').classList.remove('hidden'); }
window.onload = () => renderConfig();
</script>
</body>
</html>
