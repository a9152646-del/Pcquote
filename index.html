<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇海螺電競 | 專業報價與庫存系統 v7.4 雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; border-color: #3b82f6; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        .hide-price .price-tag { display: none !important; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 20px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .print-only { display: block !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; width: 100% !important; padding: 2rem !important; }
        .screenshot-mode .empty-cat { display: none !important; }
        .screenshot-mode .selected-badge { border: none; background: none; padding: 0; font-size: 14px; color: #000; }
        .screenshot-mode .item-row { border: none; border-bottom: 1px dashed #ccc; border-radius: 0; padding: 8px 0; }
        .screenshot-mode .item-row .text-blue-500 { color: #1e293b; font-weight: 800; border-left: 4px solid #1e293b; padding-left: 8px; }
        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<script>
// --- Firebase 配置 ---
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming",
  storageBucket: "magic-conch-gaming.firebasestorage.app",
  messagingSenderId: "105735978925",
  appId: "1:105735978925:web:3ec77acbfd344475322b24",
  measurementId: "G-SQGQY6YPE9"
};

// 初始化 Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
</script>

<div class="max-w-7xl mx-auto">
    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="showTab('calc')" id="btn-calc" class="px-6 py-3 tab-active">🐚 報價配單</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-6 py-3">📋 訂單/草稿管理</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-6 py-3">⚙️ 品項庫管理</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="print-only mb-8 flex flex-col items-center">
            <div class="text-3xl font-black text-slate-800 tracking-widest border-b-4 border-slate-800 pb-2 mb-4 w-full text-center">《電腦報價單》</div>
            <div class="w-full flex justify-start text-sm font-bold italic text-slate-500">
                <span id="print-date">---</span>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6 no-screenshot">
                        <h2 class="font-bold text-xl text-blue-600">電腦配置區</h2>
                        <button onclick="toggleSellerMode()" id="sellerBtn" class="text-xs bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">管理員模式: ON</button>
                    </div>
                    <div id="configRows" class="grid grid-cols-1 md:grid-cols-1 gap-1"></div>
                </div>

                <div class="card p-6 no-screenshot">
                    <h2 class="font-bold mb-4 border-b pb-2">客戶資訊</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                        <select id="custSource">
                            <option value="FB">Facebook</option>
                            <option value="IG">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="其他">其他</option>
                        </select>
                        <textarea id="orderMemo" placeholder="內部備註" class="md:col-span-4 h-24 w-full"></textarea>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-20">
                    <h3 class="font-bold border-b pb-2 mb-4 text-gray-600">報價總計</h3>
                    <div class="space-y-1 mb-4">
                        <div class="text-xs text-gray-400">未稅總計</div>
                        <div id="ui-untaxed" class="text-xl font-bold text-gray-700">$0</div>
                        <div class="text-xs text-gray-400">含稅總計 (5%)</div>
                        <div id="ui-totalSale" class="text-4xl font-black text-blue-600">$0</div>
                    </div>
                    <div class="mb-6">
                        <label class="text-xs text-gray-400">折扣金額</label>
                        <input type="number" id="discountAmt" class="w-full mt-1" value="0" oninput="calculate()">
                    </div>

                    <div id="sellerBox" class="seller-bg p-4 rounded-lg mb-6 border border-blue-100 space-y-3">
                        <label class="text-[10px] font-bold text-blue-400 uppercase">分期總額</label>
                        <input type="number" id="noCardTotal" class="w-full mt-1 border-blue-200" placeholder="若無則不填" oninput="calculate()">
                        <div class="flex justify-between text-sm text-blue-500 border-t pt-2"><span>總成本</span><span id="ui-totalCost">$0</span></div>
                        <div class="flex justify-between text-lg font-bold text-green-600 border-t mt-2 pt-2"><span>預計淨利</span><span id="ui-totalProfit">$0</span></div>
                    </div>

                    <button onclick="saveRecord('draft')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold mb-2">儲存草稿至雲端</button>
                    <button id="convertOrderBtn" onclick="saveRecord('order')" class="hidden w-full bg-green-600 text-white py-3 rounded-xl font-bold mb-2">✅ 轉為正式訂單</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold mb-2">📸 進入截圖模式</button>
                    <button onclick="resetForm()" class="w-full text-gray-400 text-xs mt-2">清空重填</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-orders" class="page-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6">
                <h2 class="font-bold text-lg mb-4 text-orange-500 border-b pb-2 flex justify-between">📂 雲端草稿 <span id="count-draft">0</span></h2>
                <div id="draftList" class="space-y-4"></div>
            </div>
            <div class="card p-6">
                <h2 class="font-bold text-lg mb-4 text-green-600 border-b pb-2 flex justify-between">✅ 正式訂單 <span id="count-order">0</span></h2>
                <div id="orderList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl text-gray-800">⚙️ 雲端品項管理</h2>
                <button onclick="saveInventoryToFirebase()" class="bg-green-500 text-white px-8 py-2 rounded-lg font-bold">同步到雲端</button>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<button id="exitBtn" onclick="exitScreenshotMode()" style="display: none; position: fixed; bottom: 30px; left: 30px; z-index: 999999;" class="bg-red-600 text-white px-8 py-4 rounded-full font-bold shadow-2xl">❌ 退出截圖模式</button>

<div id="selectionModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
            <h3 id="modalTitle" class="font-bold text-lg">選擇品項</h3>
            <button onclick="closeModal()" class="text-2xl text-gray-400">&times;</button>
        </div>
        <div id="modalList" class="p-4 overflow-y-auto flex-1 space-y-2"></div>
        <div class="p-4 border-t bg-gray-50 flex gap-2">
            <input type="text" id="tempName" placeholder="臨時零件" class="flex-1 text-xs">
            <input type="number" id="tempPrice" placeholder="售價" class="w-16 text-xs">
            <button onclick="addTempItem()" class="bg-blue-500 text-white px-3 rounded">+</button>
            <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">完成</button>
        </div>
    </div>
</div>

<script>
// --- 核心變數 ---
const defaultInv = { "處理器(CPU)": [], "主機板(MB)": [], "記憶體(RAM)": [], "顯示卡(VGA)": [], "固態硬碟(SSD)": [], "電源供應器(PSU)": [], "機殼(Case)": [], "組裝與服務": [] };
let inv = defaultInv;
let catOrder = Object.keys(inv);
let records = [];
let currentSelections = {}; 
let editingRecordId = null;
let currentCat = "";
let isSellerMode = true;

// --- Firebase 即時監聽 ---
function initFirebase() {
    db.ref('inventory').on('value', (s) => { if(s.exists()) inv = s.val(); renderConfig(); });
    db.ref('catOrder').on('value', (s) => { if(s.exists()) catOrder = s.val(); renderConfig(); });
    db.ref('records').on('value', (s) => {
        records = [];
        if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
        renderRecords();
    });
}

function showTab(tab) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.getElementById('btn-' + tab).classList.add('tab-active');
    if(tab === 'inventory') renderInventoryEditor();
}

function renderConfig() {
    const container = document.getElementById('configRows');
    if(!container) return; container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const isEmpty = items.length === 0;
        let badges = items.map((sel, sIdx) => {
            const itemObj = sel.isTemp ? sel : (inv[cat] ? inv[cat][sel.idx] : null);
            const name = itemObj ? itemObj.name : '未知';
            const price = (itemObj && !sel.isGift) ? itemObj.p : 0;
            const priceHtml = `<span class="price-tag text-blue-500 font-normal ml-1">($${price.toLocaleString()})</span>`;
            return `<div class="selected-badge">${sel.isGift?'<span class="text-red-500">[贈]</span>':''}${name}${priceHtml}
                <div class="flex ml-2 no-screenshot border rounded bg-white overflow-hidden">
                    <button onclick="changeQty('${cat}', ${sIdx}, -1, event)" class="px-2 bg-gray-50 hover:bg-gray-100 text-blue-500 font-bold">-</button>
                    <span class="px-2 text-[10px] flex items-center">${sel.qty || 1}</span>
                    <button onclick="changeQty('${cat}', ${sIdx}, 1, event)" class="px-2 bg-gray-50 hover:bg-gray-100 text-blue-500 font-bold">+</button>
                </div></div>`;
        }).join('');
        const div = document.createElement('div');
        div.className = `flex items-center justify-between p-3 border-b item-row cursor-pointer ${isEmpty ? 'empty-cat' : ''} ${!isSellerMode ? 'hide-price' : ''}`;
        div.onclick = () => openSelection(cat);
        div.innerHTML = `<div class="flex-1"><div class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">${cat}</div><div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div></div><div class="text-blue-400 no-screenshot">❯</div>`;
        container.appendChild(div);
    });
}

function openSelection(cat) {
    currentCat = cat;
    const modal = document.getElementById('selectionModal'), list = document.getElementById('modalList');
    document.getElementById('modalTitle').innerText = `選擇 ${cat}`;
    list.innerHTML = '';
    (inv[cat] || []).forEach((item, idx) => {
        const selObj = (currentSelections[cat] || []).find(s => s.idx === idx && !s.isTemp);
        const div = document.createElement('div');
        div.className = `flex justify-between p-3 border rounded-lg cursor-pointer ${selObj ? 'bg-blue-50 border-blue-200' : ''}`;
        div.onclick = () => togglePick(idx);
        div.innerHTML = `<div><div class="font-bold text-sm">${item.name}</div><div class="text-xs text-blue-500">$${Number(item.p).toLocaleString()}</div></div>
                         <div class="flex items-center gap-2"><label onclick="event.stopPropagation()"><input type="checkbox" ${selObj?.isGift ? 'checked' : ''} onchange="toggleGift(${idx}, this.checked)"> 贈</label>${selObj ? '✅' : ''}</div>`;
        list.appendChild(div);
    });
    modal.classList.remove('hidden');
}

function togglePick(idx) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const existIdx = currentSelections[currentCat].findIndex(s => s.idx === idx && !s.isTemp);
    if(existIdx > -1) currentSelections[currentCat].splice(existIdx, 1);
    else currentSelections[currentCat].push({idx, isGift: false, isTemp: false, qty: 1});
    openSelection(currentCat); calculate(); renderConfig();
}

function toggleGift(idx, checked) {
    const sel = currentSelections[currentCat]?.find(s => s.idx === idx && !s.isTemp);
    if(sel) sel.isGift = checked; calculate(); renderConfig();
}

function changeQty(cat, sIdx, delta, e) {
    e.stopPropagation();
    currentSelections[cat][sIdx].qty = Math.max(1, (currentSelections[cat][sIdx].qty || 1) + delta);
    calculate(); renderConfig();
}

function addTempItem() {
    const n = document.getElementById('tempName').value, p = parseFloat(document.getElementById('tempPrice').value)||0;
    if(!n) return; if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ isTemp: true, name: n, p, c: 0, isGift: false, qty: 1 });
    document.getElementById('tempName').value = ''; calculate(); renderConfig(); openSelection(currentCat);
}

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt').value) || 0;
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    for(let c in currentSelections) {
        currentSelections[c].forEach(s => {
            const item = s.isTemp ? s : (inv[c] ? inv[c][s.idx] : null);
            if(item) {
                if(!s.isGift) subP += (Number(item.p) * (s.qty || 1));
                subC += (Number(item.c || 0) * (s.qty || 1));
            }
        });
    }
    const finalSale = subP - disc;
    document.getElementById('ui-untaxed').innerText = `$${Math.round(finalSale / 1.05).toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${(noCard > 0 ? (noCard - subC) : (finalSale - subC)).toLocaleString()}`;
}

function saveRecord(status) {
    const id = editingRecordId || Date.now();
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value || '未命名', phone: document.getElementById('custPhone').value, memo: document.getElementById('orderMemo').value, source: document.getElementById('custSource').value, status, selections: currentSelections, discount: document.getElementById('discountAmt').value, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText };
    db.ref('records/' + id).set(r).then(() => { alert('雲端已儲存'); resetForm(); showTab('orders'); });
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = ''; let dCount=0, oCount=0;
    records.sort((a,b) => b.id - a.id).forEach(r => {
        const div = document.createElement('div');
        div.className = "p-4 border rounded-xl bg-white flex justify-between items-center shadow-sm";
        div.innerHTML = `<div><div class="text-[10px] text-gray-400">${r.time}</div><div class="font-bold text-sm">[${r.source}] ${r.name}</div><div class="text-blue-600 font-bold">${r.total}</div></div>
                         <div class="flex gap-2"><button onclick="editDraft(${r.id})" class="px-3 py-1 bg-blue-500 text-white text-xs rounded">編輯</button><button onclick="deleteRecord(${r.id})" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded">刪除</button></div>`;
        if(r.status === 'draft') { dList.appendChild(div); dCount++; } else { oList.appendChild(div); oCount++; }
    });
    document.getElementById('count-draft').innerText = dCount; document.getElementById('count-order').innerText = oCount;
}

function editDraft(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name; document.getElementById('discountAmt').value = r.discount;
    document.getElementById('convertOrderBtn').classList.toggle('hidden', r.status !== 'draft');
    renderConfig(); calculate(); showTab('calc');
}

function resetForm() { editingRecordId = null; currentSelections = {}; document.getElementById('custName').value = ''; calculate(); renderConfig(); }
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').style.display = isSellerMode ? 'block' : 'none'; renderConfig(); }
function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('exitBtn').style.display = 'block'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('exitBtn').style.display = 'none'; }

// --- 品項管理 (包含成本) ---
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2 font-bold text-blue-500 text-sm">${cat}<div class="flex gap-1"><button onclick="moveCat(${cIdx},-1)">↑</button><button onclick="moveCat(${cIdx},1)">↓</button></div></div>
            <div id="edit-${cat}" class="space-y-2"></div><button onclick="addNewSubItem('${cat}')" class="w-full text-xs text-gray-400 border-dashed border mt-2 py-1">+ 零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "flex flex-col gap-1 bg-gray-50 p-2 rounded relative";
            row.innerHTML = `<input type="text" class="text-xs font-bold" value="${item.name}" placeholder="名稱" onchange="inv['${cat}'][${idx}].name=this.value">
                <div class="flex gap-1"><input type="number" class="w-1/2 text-xs" value="${item.p}" placeholder="售價" onchange="inv['${cat}'][${idx}].p=this.value">
                <input type="number" class="w-1/2 text-xs text-red-500" value="${item.c||0}" placeholder="成本" onchange="inv['${cat}'][${idx}].c=this.value"></div>
                <button onclick="removeSubItem('${cat}',${idx})" class="absolute top-1 right-1 text-gray-300">×</button>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}
function addNewSubItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function removeSubItem(c, i) { inv[c].splice(i, 1); renderInventoryEditor(); }
function moveCat(i, d) { let n = i+d; if(n>=0 && n<catOrder.length) [catOrder[i], catOrder[n]] = [catOrder[n], catOrder[i]]; renderInventoryEditor(); }
function saveInventoryToFirebase() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('雲端品項庫已儲存'); }
function deleteRecord(id) { if(confirm('確定刪除？')) db.ref('records/' + id).remove(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }

// 啟動
initFirebase();
window.onload = () => { renderConfig(); calculate(); };
</script>
</body>
</html>
