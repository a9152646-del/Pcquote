<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; 
let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft';

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else {
                const item = (inv[cat] || [])[s.idx];
                if(item) { p = Number(item.p || 0); c = Number(item.c || 0); }
            }
            if(!s.isGift) subP += (p * (s.qty || 1));
            subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    const profit = noCard > 0 ? (noCard - subC) : (finalSale - subC);
    document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
    document.getElementById('ss-discount').innerText = disc > 0 ? `折扣：-$${disc.toLocaleString()}` : "折扣";
    document.getElementById('ss-untaxed').innerText = `未稅金額：$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `含稅總計：$${finalSale.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const isEmpty = items.length === 0;
        const badges = items.map(sel => {
            let name = "", p = 0;
            if(sel.isTemp) { name = sel.name; p = sel.p; } 
            else {
                const target = (inv[cat] || [])[sel.idx];
                if(!target) return '';
                name = target.name; p = target.p;
            }
            const qtyStr = (sel.qty || 1) > 1 ? `<span class="text-orange-600 font-bold ml-1">x${sel.qty}</span>` : '';
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${name}${qtyStr} <span class="price-tag text-blue-500 ml-1">($${Number(p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${!isSellerMode?'hide-price':''} ${isEmpty?'empty-row':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function updateSeller(id, name) { db.ref(`records/${id}/seller`).set(name); }
// 新增: 更新訂單狀態
function updateStatus(id, status) { db.ref(`records/${id}/progressStatus`).set(status); }

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const sellers = ["未選擇", "朱冠穎", "江鈞宇", "江苙翔"];
        const sellerOptions = sellers.map(s => `<option value="${s}" ${r.seller === s ? 'selected' : ''}>${s}</option>`).join('');
        
        // 新增: 狀態選單
        const statuses = ["待處理", "組裝中", "測試中", "已完工", "已寄出"];
        const statusOptions = statuses.map(s => `<option value="${s}" ${r.progressStatus === s ? 'selected' : ''}>${s}</option>`).join('');

        const hasNoCard = (r.noCard && Number(r.noCard) > 0);
        const priceDisplay = hasNoCard 
            ? `<div class="text-gray-400 text-xs line-through">原計: ${r.total}</div><div class="text-orange-600 font-black">分期: $${Number(r.noCard).toLocaleString()}</div>`
            : `<div class="text-blue-600 font-black">${r.total}</div>`;
        const div = `<div class="p-4 border rounded-xl bg-white flex flex-col gap-3 shadow-sm">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="text-[10px] text-gray-400 font-bold">${r.time}</div>
                    <div class="text-sm font-bold text-gray-700">[${r.source||'無'}] ${r.name}</div>
                    ${priceDisplay}
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Seller</span>
                        <select onchange="updateSeller(${r.id}, this.value)" class="text-xs p-1 bg-gray-50 border-gray-200 rounded w-24">${sellerOptions}</select>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter">Progress</span>
                        <select onchange="updateStatus(${r.id}, this.value)" class="text-xs p-1 bg-blue-50 border-blue-100 text-blue-600 rounded w-24 font-bold">${statusOptions}</select>
                    </div>
                </div>
            </div>
            <div class="flex gap-2 border-t pt-2">
                <button onclick="editRecord(${r.id})" class="flex-1 py-1 bg-blue-500 text-white text-xs rounded font-bold hover:bg-blue-600">編輯</button>
                <button onclick="if(confirm('確定刪除？')) db.ref('records/${r.id}').remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded hover:bg-red-100 font-bold">刪除</button>
            </div>
        </div>`;
        if(r.status === 'draft') dList.innerHTML += div; else oList.innerHTML += div;
    });
    document.getElementById('count-draft').innerText = records.filter(r=>r.status==='draft').length;
    document.getElementById('count-order').innerText = records.filter(r=>r.status==='order').length;
}

function filterModalList() {
    const term = document.getElementById('modalSearch').value.toLowerCase();
    const items = document.querySelectorAll('#modalList .pick-item');
    items.forEach(item => { item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none'; });
}

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        // 修改: 增加缺貨樣式判斷
        const isOut = item.outOfStock;
        list.innerHTML += `<div class="pick-item p-3 rounded-lg flex justify-between items-center mb-1 ${sel?'active':''} ${isOut?'out-of-stock':''}" onclick="togglePick(${idx}, false)">
            <div class="flex-1">
                <div class="font-bold text-sm">${isOut?'(缺貨) ':''}${item.name}</div>
                <div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div>
            </div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <label class="text-xs flex items-center gap-1 cursor-pointer"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked, false)"> 贈</label>
                <div class="flex items-center border rounded bg-white overflow-hidden shadow-sm">
                    <button class="px-3 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', -1, false)">-</button>
                    <span class="px-3 text-xs font-bold min-w-[30px] text-center">${sel?.qty || 1}</span>
                    <button class="px-3 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', 1, false)">+</button>
                </div>
            </div>
        </div>`;
    });
    // ... 臨時品項部分保持不變
    selections.filter(s => s.isTemp).forEach((temp, tIdx) => {
        list.innerHTML += `<div class="pick-item p-3 rounded-lg flex justify-between items-center active border-orange-200 bg-orange-50 mb-1">
            <div class="flex-1"><div class="font-bold text-sm text-orange-700">[臨時] ${temp.name}</div><div class="text-xs text-orange-500 font-bold">$${Number(temp.p).toLocaleString()}</div></div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <div class="flex items-center border rounded bg-white shadow-sm">
                    <button class="px-3 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(null, 'qty', -1, true, ${tIdx})">-</button>
                    <span class="px-3 text-xs font-bold min-w-[30px] text-center">${temp.qty || 1}</span>
                    <button class="px-3 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(null, 'qty', 1, true, ${tIdx})">+</button>
                </div>
                <button onclick="removeTempItem(${tIdx})" class="text-red-400 text-lg ml-2 font-bold">×</button>
            </div>
        </div>`;
    });
    filterModalList();
}

function togglePick(idx, isTemp) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); 
    else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function updateSubItem(idx, type, val, isTemp, tIdx) {
    if(!currentSelections[currentCat]) return;
    const selList = currentSelections[currentCat];
    const sel = isTemp ? selList.filter(s => s.isTemp)[tIdx] : selList.find(s => !s.isTemp && s.idx === idx);
    if(!sel && type === 'qty' && !isTemp) { togglePick(idx, false); return updateSubItem(idx, type, val, isTemp); }
    if(!sel) return;
    if(type === 'qty') sel.qty = Math.max(1, (sel.qty || 1) + val);
    if(type === 'gift') sel.isGift = val;
    renderConfig(); renderModalList();
}
function addTempItem() {
    const name = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value || 0;
    if(!name || !p) return alert('請輸入名稱售價');
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c, qty: 1, isGift: false, isTemp: true });
    document.getElementById('tempName').value = ""; document.getElementById('tempPrice').value = ""; document.getElementById('tempCost').value = "";
    renderConfig(); renderModalList();
}
function removeTempItem(tIdx) {
    const all = currentSelections[currentCat], tempItems = all.filter(s => s.isTemp);
    all.splice(all.indexOf(tempItems[tIdx]), 1); renderConfig(); renderModalList();
}
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = `選擇 ${cat}`; document.getElementById('modalSearch').value = ''; renderModalList(); document.getElementById('selectionModal').classList.remove('hidden'); }
function saveRecord(targetStatus) {
    const id = editingRecordId || Date.now(), status = targetStatus === 'current' ? currentStatus : targetStatus;
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, source: document.getElementById('custSource').value, phone: document.getElementById('custPhone').value, addr: document.getElementById('custAddr').value, memo: document.getElementById('orderMemo').value, selections: currentSelections, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText, status, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).update(r).then(() => { alert('儲存成功'); resetForm(); showTab('orders'); });
}
function editRecord(id) {
    const r = records.find(x => x.id === id); editingRecordId = id; currentStatus = r.status; 
    currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; document.getElementById('custPhone').value = r.phone || ''; document.getElementById('custAddr').value = r.addr || ''; document.getElementById('discountAmt').value = r.discount || 0; document.getElementById('noCardTotal').value = r.noCard || '';
    const cBtn = document.getElementById('btnConvertToOrder'); if(r.status === 'draft') cBtn.classList.remove('hidden'); else cBtn.classList.add('hidden');
    renderConfig(); showTab('calc');
}
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border relative";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2"><input class="font-bold text-blue-600 bg-transparent border-none p-0 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)"><div class="flex gap-1"><button onclick="moveCat(${cIdx},-1)" class="text-xs bg-gray-100 p-1 rounded">↑</button><button onclick="moveCat(${cIdx},1)" class="text-xs bg-gray-100 p-1 rounded">↓</button><button onclick="removeCat(${cIdx})" class="text-red-300 ml-1 font-bold">×</button></div></div><div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs text-gray-500 font-bold border-dashed border-2 mt-2 py-2 bg-gray-50 rounded-lg">+ 新增零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "flex flex-col gap-1 bg-gray-50 p-2 rounded relative border border-transparent hover:border-blue-200";
            // 修改: 增加缺貨切換按鈕
            row.innerHTML = `<input type="text" class="text-xs font-bold" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value"><div class="flex gap-1"><input type="number" class="w-1/2 text-xs" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value"><input type="number" class="w-1/2 text-xs text-red-500" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=this.value"></div><div class="flex gap-2 mt-1 items-center">
                <button onclick="moveItem('${cat}', ${idx}, -1)" class="text-[9px] bg-white px-2 border">上移</button>
                <button onclick="moveItem('${cat}', ${idx}, 1)" class="text-[9px] bg-white px-2 border">下移</button>
                <label class="text-[9px] flex items-center gap-1 cursor-pointer bg-gray-200 px-1 rounded">
                    <input type="checkbox" ${item.outOfStock?'checked':''} onchange="inv['${cat}'][${idx}].outOfStock=this.checked; renderInventoryEditor();"> 缺貨
                </label>
                <button onclick="removeInvItem('${cat}',${idx})" class="absolute top-1 right-1 text-gray-300">×</button></div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}
function moveCat(i, d) { let n = i+d; if(n>=0 && n<catOrder.length) { [catOrder[i], catOrder[n]] = [catOrder[n], catOrder[i]]; renderInventoryEditor(); } }
function moveItem(cat, i, d) { let n = i+d; if(n>=0 && n<inv[cat].length) { [inv[cat][i], inv[cat][n]] = [inv[cat][n], inv[cat][i]]; renderInventoryEditor(); } }
function addNewCategory() { const name = prompt("名稱"); if(name) { catOrder.push(name); inv[name] = []; renderInventoryEditor(); } }
function removeCat(i) { if(confirm("確定刪除？")) { delete inv[catOrder[i]]; catOrder.splice(i,1); renderInventoryEditor(); } }
function renameCat(i, nN) { const oN = catOrder[i]; inv[nN] = inv[oN]; delete inv[oN]; catOrder[i] = nN; renderInventoryEditor(); }
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function removeInvItem(c, i) { inv[c].splice(i,1); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('同步成功')); }
function enterScreenshotMode() { calculate(); document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshotNav').style.display='flex'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshotNav').style.display='none'; }
function exitToOrdersWithoutSaving() { if(confirm("確定返回？")) { resetForm(); showTab('orders'); } }

function showTab(t) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    const target = document.getElementById('tab-' + t);
    if(target) target.classList.remove('hidden');
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
    const btn = document.getElementById('btn-' + t);
    if(btn) btn.classList.add('tab-active');
    if(t === 'inventory') renderInventoryEditor();
}

function toggleSellerMode() {
    isSellerMode = !isSellerMode;
    const box = document.getElementById('sellerBox');
    if(isSellerMode) box.classList.remove('hidden'); else box.classList.add('hidden');
    const btn = document.getElementById('sellerBtn');
    btn.innerText = `管理員模式: ${isSellerMode ? 'ON' : 'OFF'}`;
    renderConfig();
}

function resetForm() { editingRecordId = null; currentSelections = {}; document.getElementById('custName').value = ""; document.getElementById('custPhone').value = ""; document.getElementById('custAddr').value = ""; document.getElementById('discountAmt').value = 0; document.getElementById('noCardTotal').value = ""; document.getElementById('btnConvertToOrder').classList.add('hidden'); calculate(); renderConfig(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
window.onload = () => { renderConfig(); };
</script>
</body>
</html>
