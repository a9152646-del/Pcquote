<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft'; let recycleBin = [];

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    const profit = noCard > 0 ? (noCard - subC) : (finalSale - subC);
    document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
    document.getElementById('ss-discount').innerText = `-$${disc.toLocaleString()}`;
    document.getElementById('ss-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `$${finalSale.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode');
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        if (isSS && items.length === 0) return;
        const badges = items.map(sel => {
            let name = "", p = 0;
            if(sel.isTemp) { name = sel.name; p = sel.p; } 
            else { const target = (inv[cat] || [])[sel.idx]; if(!target) return ''; name = target.name; p = target.p; }
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${name}${sel.qty>1?` x${sel.qty}`:''} <span class="price-tag ml-1">($${Number(p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer" onclick="openSelection('${cat}')">
            <div class="text-sm font-black text-black uppercase border-l-4 border-black pl-2 tracking-widest">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs no-screenshot">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const sellers = ["朱冠穎", "江苙翔", "江鈞宇"];
        const progressList = ["待處理", "組裝中", "測試中", "已完工", "已寄出"];
        const sOpts = sellers.map(s => `<option value="${s}" ${r.seller===s?'selected':''}>${s}</option>`).join('');
        const pOpts = progressList.map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
        
        // 檢查未出貨品項
        let missingItems = [];
        if(r.deliveredItems) {
            for(let key in r.deliveredItems) {
                if(r.deliveredItems[key] === false) {
                    const [cat, idx] = key.split('_');
                    const sel = (r.selections[cat] || [])[idx];
                    if (sel) {
                        let name = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知");
                        missingItems.push(name);
                    }
                }
            }
        }

        const cardHtml = `<div class="p-4 card bg-white mb-2 relative ${missingItems.length > 0 ? 'border-red-500' : ''}">
            <div class="flex justify-between items-start mb-4">
                <div class="flex-1">
                    <div class="text-[10px] text-gray-400 font-bold mb-1">${r.time}</div>
                    <div class="text-sm font-bold text-gray-700">${r.name || '[無名]'}</div>
                    <div class="text-blue-600 font-black text-xl">${r.total}</div>
                    ${missingItems.length > 0 ? `<div class="text-xs text-red-600 font-black mt-1">⚠️ 未出貨：${missingItems.join(', ')}</div>` : ''}
                </div>
                <div class="flex flex-col gap-1 items-end">
                    <div class="flex gap-1">
                        <span class="bg-gray-100 text-[10px] px-2 py-0.5 rounded font-bold">${r.seller||'未選'}</span>
                        <span class="${missingItems.length > 0 ? 'bg-red-500 text-white' : 'bg-red-100 text-red-500'} text-[10px] px-2 py-0.5 rounded font-bold">${missingItems.length > 0 ? '缺貨中' : (r.progress||'待處理')}</span>
                    </div>
                    <div class="flex gap-1 mt-1">
                        <select onchange="db.ref('records/'+${r.id}+'/seller').set(this.value)" class="text-[10px] p-1 border rounded">${sOpts}</select>
                        <select onchange="db.ref('records/'+${r.id}+'/progress').set(this.value)" class="text-[10px] p-1 bg-blue-50 border-blue-100 text-blue-600 rounded font-bold">${pOpts}</select>
                    </div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 border-t pt-3">
                <button onclick="editRecord(${r.id})" class="bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm">編輯</button>
                ${r.status === 'draft' ? `<button onclick="if(confirm('轉為正式訂單？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-green-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm">✅ 轉正式訂單</button>` : ''}
                
                ${r.status === 'order' ? `
                    <button onclick="openDeliveryFast(${r.id})" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm">⚠️ 缺貨標記 (管理出貨)</button>
                    <button onclick="if(confirm('完成此訂單？')) db.ref('records/'+${r.id}+'/status').set('completed')" class="bg-gray-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm">🏁 結案歸檔</button>
                ` : ''}
                
                <button onclick="if(confirm('刪除？')) db.ref('records/'+${r.id}).remove()" class="bg-red-50 text-red-400 px-3 py-1.5 rounded-lg text-xs font-bold ml-auto">刪除</button>
            </div>
        </div>`;
        if(r.status === 'draft') dList.innerHTML += cardHtml; else if(r.status === 'order') oList.innerHTML += cardHtml; else cList.innerHTML += cardHtml;
    });
}

function enterScreenshotMode() { 
    document.getElementById('mainBody').classList.add('screenshot-mode'); 
    document.getElementById('screenshotNav').classList.remove('hidden');
    renderConfig(); 
}
function exitScreenshotMode() { 
    document.getElementById('mainBody').classList.remove('screenshot-mode'); 
    document.getElementById('screenshotNav').classList.add('hidden');
    renderConfig(); 
}

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-3 flex justify-between items-center rounded-lg mb-1 ${sel?'active':''}" onclick="togglePick(${idx})">
            <div class="flex-1"><div class="font-bold text-sm">${item.name}</div><div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div></div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <label class="text-xs flex items-center gap-1 cursor-pointer font-bold"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked)"> 贈</label>
                <div class="flex items-center border rounded bg-white"><button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', -1)">-</button><span class="px-2 text-xs font-bold min-w-[20px] text-center">${sel?.qty || 1}</span><button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', 1)">+</button></div>
            </div>
        </div>`;
    });
}

function updateSubItem(idx, type, val) {
    if(!currentSelections[currentCat]) return;
    const sel = currentSelections[currentCat].find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val);
    if(type==='gift') sel.isGift = val;
    renderConfig(); renderModalList();
}

function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 card border relative mb-4";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2"><input class="font-bold text-blue-600 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)"><button onclick="removeCat(${cIdx})" class="text-red-300 text-3xl font-bold">×</button></div><div id="edit-${cat}" class="space-y-3"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs border-dashed border-2 mt-4 py-2 rounded-lg font-bold text-gray-400">+ 新增零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "bg-gray-50 p-3 rounded-lg border space-y-2 mb-2";
            row.innerHTML = `<input type="text" class="text-sm font-black w-full bg-white border p-2 rounded" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <div class="flex gap-2"><input type="number" class="w-1/3 text-xs p-1" value="${item.p}" placeholder="售價" onchange="inv['${cat}'][${idx}].p=this.value"><input type="number" class="w-1/3 text-xs text-red-600 font-bold p-1 bg-white" value="${item.c||0}" placeholder="成本" onchange="inv['${cat}'][${idx}].c=this.value">
                    <button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock; renderInventoryEditor();" class="w-1/3 text-[10px] font-bold rounded ${item.outOfStock?'bg-red-500 text-white':'bg-white text-gray-400 border'}">缺貨</button>
                </div><div class="flex justify-end pt-1"><button onclick="deleteInvItem('${cat}', ${idx})" class="text-[10px] bg-red-50 text-red-500 px-4 py-1.5 rounded-full font-black border border-red-200">刪除品項 ×</button></div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}

function editRecord(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; document.getElementById('discountAmt').value = r.discount || 0; 
    document.getElementById('infoSeller').value = r.seller || '朱冠穎';
    if(r.status === 'draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); else document.getElementById('btnConvertToOrder').classList.add('hidden');
    renderConfig(); showTab('calc');
}

let deliveryId = null; let tempDeliv = {};
function openDeliveryFast(id) {
    deliveryId = id; const r = records.find(x => x.id === id); tempDeliv = r.deliveredItems || {};
    const list = document.getElementById('deliveryList'); list.innerHTML = '';
    for (let cat in r.selections) {
        r.selections[cat].forEach((sel, idx) => {
            const k = `${cat}_${idx}`; const isD = tempDeliv[k] !== false;
            let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知");
            list.innerHTML += `<div class="flex justify-between p-3 border rounded-lg bg-white"><div class="text-sm font-bold">${n}</div><input type="checkbox" ${isD?'checked':''} onchange="tempDeliv['${k}']=this.checked"></div>`;
        });
    }
    document.getElementById('deliveryModal').classList.remove('hidden');
}
function saveDeliveryStatus() { db.ref('records/'+deliveryId+'/deliveredItems').set(tempDeliv).then(() => document.getElementById('deliveryModal').classList.add('hidden')); }
function closeDeliveryModal() { document.getElementById('deliveryModal').classList.add('hidden'); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t==='inventory') renderInventoryEditor(); }
function saveRecord(st) { 
    const id = editingRecordId || Date.now();
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, seller: document.getElementById('infoSeller').value, selections: currentSelections, total: document.getElementById('ui-totalSale').innerText, status: st === 'current' ? currentStatus : st, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).update(r).then(() => { alert('成功'); resetForm(); showTab('drafts'); });
}
function togglePick(idx) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0, outOfStock: false}); renderInventoryEditor(); }
function deleteInvItem(cat, idx) { const item = inv[cat][idx]; recycleBin.push({ type: 'item', name: item.name, cat: cat, data: item }); inv[cat].splice(idx, 1); renderInventoryEditor(); }
function showRecycleBin() {
    const list = document.getElementById('recycleList'); list.innerHTML = recycleBin.length ? '' : '<div class="text-center py-10 text-gray-400 font-bold">目前沒有刪除紀錄</div>';
    recycleBin.forEach((item, idx) => {
        list.innerHTML += `<div class="flex items-center justify-between p-3 bg-white border rounded shadow-sm"><span class="font-bold text-sm">(${item.type==='cat'?'類別':'零件'}) ${item.name}</span><button onclick="restoreFromBin(${idx})" class="text-xs bg-blue-500 text-white px-3 py-1 rounded font-bold">復原</button></div>`;
    });
    document.getElementById('recycleBinModal').classList.remove('hidden');
}
function restoreFromBin(idx) {
    const itm = recycleBin[idx]; if (itm.type === 'cat') { catOrder.push(itm.name); inv[itm.name] = itm.data; } else { if (!inv[itm.cat]) inv[itm.cat] = []; inv[itm.cat].push(itm.data); }
    recycleBin.splice(idx, 1); renderInventoryEditor(); showRecycleBin();
}
function closeRecycleBin() { document.getElementById('recycleBinModal').classList.add('hidden'); }
function addTempItem() {
    const name = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value; 
    if(!name||!p) return; if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c: c||0, qty:1, isTemp:true });
    renderConfig(); renderModalList();
}
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = `選擇 ${cat}`; renderModalList(); document.getElementById('selectionModal').classList.remove('hidden'); }
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); renderConfig(); }
function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input:not([type="checkbox"])').forEach(i=>i.value=""); renderConfig(); }
window.onload = () => renderConfig();
</script>
</body>
</html>
