    <style>

        /* 截圖模式專用樣式 */
        .screenshot-mode .item-row { padding: 2px 10px !important; margin-bottom: 0px !important; border-radius: 0px !important; border: none !important; border-bottom: 1px solid #f1f5f9 !important; box-shadow: none !important; }
        .screenshot-mode #configRows { gap: 0 !important; space-y: 0 !important; }
        .screenshot-mode .selected-badge { font-size: 10px !important; line-height: 1.1 !important; margin-bottom: 0px !important; }
        .screenshot-mode #screenshot-header { margin-bottom: 8px !important; padding-bottom: 4px !important; }
        .screenshot-mode #screenshot-footer { padding: 6px 12px !important; display: block !important; }

        /* 品項管理整齊版面 (v9.88 樣式) */
        .inv-item-row { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .inv-item-main { display: flex; align-items: center; gap: 10px; }
        .inv-name-area { flex: 1; min-width: 0; }
        .inv-name-input { width: 100%; border: none !important; background: transparent !important; font-weight: 800; font-size: 15px; padding: 4px 0 !important; color: #1e293b; word-break: break-all; resize: none; min-height: 24px; overflow: hidden; display: block; line-height: 1.4; }

        .price-group { display: flex; gap: 6px; align-items: center; }

        .val-input { border: none !important; background: transparent !important; width: 45px; font-weight: 900; font-size: 13px; text-align: right; padding: 0 !important; }
        .p-input { color: #3b82f6; } 
        .c-input { color: #ef4444 !important; font-weight: 900 !important; } 

        .sup-btn { font-size: 10px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid #e2e8f0; color: #cbd5e1; font-weight: 900; transition: all 0.2s; background: white; flex-shrink: 0; }

    <script>
    const firebaseConfig = { apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM", authDomain: "magic-conch-gaming.firebaseapp.com", databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "magic-conch-gaming", storageBucket: "magic-conch-gaming.firebasestorage.app", messagingSenderId: "105735978925", appId: "1:105735978925:web:3ec77acbfd344475322b24" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let inv = {}; let catOrder = []; let records = []; let templates = {}; let currentSelections = {}; let editingRecordId = null; let currentCat = "";
    let collapsedCats = {}; 

    function calculate() {
        try {
            let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
            let noCard = parseFloat(document.getElementById('noCardTotal')?.value || 0);
            let manualVal = document.getElementById('manualTotal').value;
            catOrder.forEach(cat => {
                (currentSelections[cat] || []).forEach(s => {
                    let p = 0, c = 0; if (s.p !== undefined && s.c !== undefined) { p = Number(s.p || 0); c = Number(s.c || 0); } 
                    else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
                    if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
                });
            });
            const baseTaxedTotal = (manualVal !== "" && !isNaN(parseFloat(manualVal))) ? parseFloat(manualVal) : (subP - disc);
            document.getElementById('ui-totalSale').innerText = `$${baseTaxedTotal.toLocaleString()}`;
            const taxAmount = Math.round(baseTaxedTotal - (baseTaxedTotal / 1.05));
            let profit = baseTaxedTotal - subC; 
            if (noCard > 0) { profit = (noCard - baseTaxedTotal) + (baseTaxedTotal - subC); document.getElementById('ui-noCardVal').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ui-noCardShow').classList.remove('hidden'); } else document.getElementById('ui-noCardShow').classList.add('hidden');
            const realProfit = profit - taxAmount;
            document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`; document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
            document.getElementById('ui-taxAmt').innerText = `-$${taxAmount.toLocaleString()}`; document.getElementById('ui-realProfit').innerText = `$${realProfit.toLocaleString()}`;
        } catch(e) {}
    }

    function renderConfig() {
        const container = document.getElementById('configRows'); if(!container) return;
        const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode'); 
        container.innerHTML = '';
        catOrder.forEach(cat => {
            const items = currentSelections[cat] || []; if (isSS && items.length === 0) return;
            const badges = items.map((sel, sIdx) => {
                let target = (inv[cat] || [])[sel.idx]; if(!target) return '';
                const dispP = (sel.p !== undefined) ? sel.p : target.p;
                const dispC = (sel.c !== undefined) ? sel.c : (target.c || 0);
                return `<div class="selected-badge flex-col mb-2">${sel.isGift?'[贈] ':''}<div>${target.name}${sel.qty>1?`<span class="bg-blue-100 text-blue-600 px-2 rounded-full ml-1 text-xs">x${sel.qty}</span>`:''} <span class="price-tag">($${Number(dispP).toLocaleString()})</span><span class="cost-tag">(本:$${Number(dispC).toLocaleString()})</span></div></div>`;
            }).join('');
            container.innerHTML += `<div class="item-row cursor-pointer" onclick="openSelection('${cat}')"><div class="text-[10px] font-black text-blue-400 uppercase mb-1">${cat}</div><div class="flex flex-col">${badges || '<span class="text-gray-300 italic text-sm">未選中項目...</span>'}</div></div>`;
        });
        calculate();
    }

    function initDragAndDrop() {
        const main = document.getElementById('inventoryEditor');
        if(main) {
            if (main.sortableInstance) main.sortableInstance.destroy();
            main.sortableInstance = new Sortable(main, { handle: '.cat-drag-handle', animation: 250, delay: 150, delayOnTouchOnly: true, forceFallback: true, onEnd: function() { catOrder = Array.from(main.querySelectorAll('.category-drag-item')).map(el => el.dataset.catname); }});
        }
        document.querySelectorAll('.item-drag-container').forEach(c => {
            if (c.sortableInstance) c.sortableInstance.destroy();
            const cat = c.dataset.cat;
            c.sortableInstance = new Sortable(c, { handle: '.item-drag-handle', animation: 250, delay: 150, delayOnTouchOnly: true, forceFallback: true, onEnd: function() { const rows = Array.from(c.querySelectorAll('.item-drag-row')); const old = [...(inv[cat] || [])]; inv[cat] = rows.map(r => old[parseInt(r.dataset.originalidx)]); renderInventoryEditor(); }});
        });
    }

    function renderInventoryEditor() { 
        const area = document.getElementById('inventoryEditor'); if (!area) return; const scrollPos = window.scrollY; area.innerHTML = ''; 
        const head = document.getElementById('inventoryHeader'); 
        if(head) head.innerHTML = `<div class="flex justify-between items-center"><h2 class="font-black text-lg text-gray-700">⚙️ 雲端品項管理</h2><div class="flex gap-2"><button onclick="addNewCategory()" class="bg-blue-500 text-white px-3 py-2 rounded-lg text-[10px]">+ 大項</button><button onclick="saveInventory()" class="bg-green-600 text-white px-3 py-2 rounded-lg text-[10px]">💾 同步數據</button></div></div><div class="flex gap-2"><button onclick="toggleAllCats(true)" class="flex-1 bg-gray-200 py-2 rounded-lg text-[10px] font-black">全部收合 ↑</button><button onclick="toggleAllCats(false)" class="flex-1 bg-gray-200 py-2 rounded-lg text-[10px] font-black">全部展開 ↓</button></div>`; 
        catOrder.forEach((cat, cIdx) => { 
            const isCollapsed = collapsedCats[cat]; const sec = document.createElement('div'); sec.className = "bg-gray-100 p-3 rounded-xl border-2 mb-4 category-drag-item"; sec.dataset.catname = cat; 
            sec.innerHTML = `<div class="flex justify-between items-center ${isCollapsed?'':'mb-4'}"><div class="flex items-center gap-2"><span class="drag-handle cat-drag-handle">≡</span><input class="font-black text-base text-blue-700 border-none bg-transparent p-0 w-40" value="${cat}" onchange="renameCat(${cIdx}, this.value)"></div><div class="flex items-center gap-2"><button onclick="collapsedCats['${cat}']=!collapsedCats['${cat}'];renderInventoryEditor();" class="px-3 py-1 bg-white border rounded-lg font-black text-[10px] shadow-sm">${isCollapsed?'展開 +':'收合 -'}</button><button onclick="removeCat(${cIdx})" class="text-red-300 hover:text-red-500 text-2xl">×</button></div></div><div id="edit-${cat}" class="space-y-3 item-drag-container ${isCollapsed?'hidden':''}" data-cat="${cat}"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs font-bold bg-white mt-4 py-3 rounded-xl border-2 border-dashed border-gray-300 text-gray-400 ${isCollapsed?'hidden':''}">+ 新增零件品項</button>`; 
            area.appendChild(sec); 
            if(!isCollapsed) {
                (inv[cat] || []).forEach((item, idx) => { 
                    const row = document.createElement('div'); row.className = `inv-item-row item-drag-row`; row.dataset.originalidx = idx; 
                    const sups = ['原', '速', '裕']; let supHtml = sups.map(s => `<button onclick="toggleSup('${cat}', ${idx}, '${s}')" class="sup-btn ${(item.sups||[]).includes(s)?'active':''}">${s}</button>`).join(''); 
                    row.innerHTML = `<div class="inv-item-main"><span class="drag-handle item-drag-handle">≡</span><div class="inv-name-area"><textarea class="inv-name-input" rows="1">${item.name}</textarea></div><button onclick="removeInvItem('${cat}', ${idx})" class="text-red-500 text-2xl px-2 flex-shrink-0">×</button></div><div class="inv-control-bar"><div class="price-group"><div class="val-box"><span class="val-label">售</span><input type="number" class="val-input p-input" value="${item.p}" onchange="inv['${cat}'][${idx}].p=Number(this.value)"></div><div class="val-box"><span class="val-label">本</span><input type="number" class="val-input c-input" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=Number(this.value)"></div><div class="flex gap-1 mx-1">${supHtml}</div><button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock;renderInventoryEditor();" class="stock-btn ${item.outOfStock?'oos':'active'}">${item.outOfStock?'缺貨':'供應'}</button></div></div>`; 
                    document.getElementById(`edit-${cat}`).appendChild(row); 
                    const ta = row.querySelector('textarea'); setTimeout(() => { ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight) + 'px'; }, 10);
                    ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; inv[cat][idx].name = this.value; });
                });
            }
        }); 
        setTimeout(() => { initDragAndDrop(); window.scrollTo(0, scrollPos); }, 50);
    }

    // 四大開關邏輯
    function toggleItemPriceMode() { const i = document.getElementById('itemPriceToggle').checked; if(i) document.getElementById('mainBody').classList.remove('hide-item-prices'); else document.getElementById('mainBody').classList.add('hide-item-prices'); }
    function toggleItemCostMode() { const i = document.getElementById('itemCostToggle').checked; if(i) document.getElementById('mainBody').classList.remove('hide-item-costs'); else document.getElementById('mainBody').classList.add('hide-item-costs'); }
    function toggleAdminMode() { const i = document.getElementById('adminToggle').checked; if(i) document.getElementById('mainBody').classList.remove('hide-admin-box'); else document.getElementById('mainBody').classList.add('hide-admin-box'); }
    function toggleSSTotalMode() { const i = document.getElementById('ssTotalToggle').checked; if(i) document.getElementById('mainBody').classList.remove('ss-hide-totals'); else document.getElementById('mainBody').classList.add('ss-hide-totals'); }

    function saveRecord(st) { 
        const id = editingRecordId ? String(editingRecordId) : String(Date.now()); 
        const oldR = records.find(x => String(x.id) === id);
        const status = st === 'current' ? (oldR ? (oldR.status || 'draft') : 'draft') : st;
        const rawData = { 
            id: id, time: (oldR ? oldR.time : new Date().toLocaleString()), 
            name: document.getElementById('custName').value || "", 
            custPhone: document.getElementById('custPhone').value || "", 
            custAddr: document.getElementById('custAddr').value || "", 
            custWarranty: document.getElementById('custWarranty').value || "", 
            seller: document.getElementById('infoSeller').value || "朱冠穎", 
            orderMemo: document.getElementById('orderMemo').value || "", 
            selections: currentSelections || {}, 
            total: document.getElementById('ui-totalSale').innerText || "$0", 
            discount: document.getElementById('discountAmt').value || 0, 
            noCard: document.getElementById('noCardTotal').value || "", 
            manualTotal: document.getElementById('manualTotal').value || "", 
            status: status, 
            progress: (oldR ? oldR.progress : "待處理"), 
            notShipped: (oldR ? (oldR.notShipped || {}) : {}) 
        }; 
        db.ref('records/' + id).update(rawData).then(() => { alert('💾 儲存修訂成功！'); resetForm(); showTab(status === 'draft' ? 'drafts' : (status === 'order' ? 'orders' : 'completed')); });
    }

    function renderRecords() {
        const lists = { 'draft': document.getElementById('draftList'), 'order': document.getElementById('orderList'), 'completed': document.getElementById('completedList') };
        Object.values(lists).forEach(l => { if(l) l.innerHTML = ''; });
        records.sort((a,b)=>b.id-a.id).forEach(r => {
            const status = r.status || 'draft'; if (!lists[status]) return;
            const pOpts = ["待處理", "已叫貨", "組裝中", "測試中", "已完工", "已寄出"].map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
            let unshippedHtml = "";
            if (r.notShipped) {
                Object.keys(r.notShipped).forEach(cat => {
                    (r.notShipped[cat] || []).forEach(idx => {
                        const target = (inv[cat] || [])[idx];
                        if (target) unshippedHtml += `<div class="text-[10px] text-red-500 font-black mt-1">🔴 未出貨：[${cat}] ${target.name}</div>`;
                    });
                });
            }
            const div = document.createElement('div'); div.className = "p-4 border-2 rounded-xl bg-white shadow-sm space-y-3";
            const shipmentBtn = (status === 'order' || status === 'completed') ? `<button onclick="openShipmentModal(${r.id})" class="flex-1 py-2 bg-gray-50 text-gray-500 text-[10px] rounded-lg font-black border">🚚 出貨管理</button>` : '';
            const noCardVal = (r.noCard && r.noCard !== "") ? Number(r.noCard).toLocaleString() : null;

            // 針對你的需求，修改按鈕 logic 使其可回溯
            let actionBtnHtml = "";
            if (status === 'draft') {
                actionBtnHtml = `<button onclick="if(confirm('轉正式訂單？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-green-600 text-white px-2 rounded-lg text-[10px] font-bold">轉正式</button>`;
            } else if (status === 'order') {
                actionBtnHtml = `
                    <button onclick="if(confirm('退回草稿？')) db.ref('records/'+${r.id}+'/status').set('draft')" class="bg-orange-400 text-white px-2 rounded-lg text-[10px] font-bold">退回草稿</button>
                    <button onclick="if(confirm('結案？')) db.ref('records/'+${r.id}+'/status').set('completed')" class="bg-gray-600 text-white px-2 rounded-lg text-[10px] font-bold">結案</button>
                `;
            } else if (status === 'completed') {
                actionBtnHtml = `<button onclick="if(confirm('退回正式？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-blue-400 text-white px-2 rounded-lg text-[10px] font-bold">退回正式</button>`;
            }

            div.innerHTML = `<div class="flex justify-between items-start">
                <div>
                    <div class="text-[10px] text-gray-400">${r.time}</div>
                    <div class="text-base font-black">${r.name || '無名氏'}</div>
                    <div class="text-blue-600 font-black text-lg">${r.total}</div>
                    ${noCardVal ? `<div class="text-[11px] text-orange-600 font-black mt-1">💳 無卡：$${noCardVal}</div>` : ''}
                    <div class="mt-1">${unshippedHtml}</div>
                </div>
                <div class="text-right">
                    <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-1 rounded-full">${r.seller||'業務'}</span>
                    <div class="mt-2"><select onchange="db.ref('records/'+${r.id}+'/progress').set(this.value)" class="text-[10px] font-bold px-1 rounded ${getStatusClass(r.progress)}">${pOpts}</select></div>
                </div>
            </div>
            <div class="flex gap-1 pt-3 border-t">
                <button onclick="editRecord(${r.id})" class="flex-1 py-2 bg-blue-600 text-white text-[10px] rounded-lg font-black">編輯</button>
                ${shipmentBtn}
                ${actionBtnHtml}
                <button onclick="if(confirm('確定刪除紀錄？')) db.ref('records/'+${r.id}).remove()" class="text-red-300 text-xl px-1">✕</button>
            </div>`;
            lists[status].appendChild(div);
        });
    }

    function renderStats() {
        const content = document.getElementById('statsContent'); if(!content) return; let monthlyData = {};
        records.forEach(r => { 
            if(r.status === 'draft') return; 
            const dateParts = r.time.split('/'); 
            const monthKey = `${dateParts[0]}/${dateParts[1]}`; 
            if(!monthlyData[monthKey]) monthlyData[monthKey] = { revenue: 0, cost: 0, profit: 0, count: 0, taxTotal: 0 }; 
            const rev = parseInt(r.total.replace(/[^0-9.-]+/g,"")) || 0; 
            
            // 計算單筆稅金加總
            const tax = Math.round(rev - (rev / 1.05));
            monthlyData[monthKey].taxTotal += tax;

            let itemCost = 0; 
            for(let cat in r.selections) { 
                r.selections[cat].forEach(s => { 
                    let c = (s.c !== undefined) ? Number(s.c) : 0; 
                    if(!s.c) { const item = (inv[cat] || [])[s.idx]; if(item) c = Number(item.c || 0); } 
                    itemCost += (c * (s.qty || 1)); 
                }); 
            } 
            monthlyData[monthKey].revenue += rev; 
            monthlyData[monthKey].cost += itemCost; 
            monthlyData[monthKey].count += 1; 
        });
        Object.keys(monthlyData).forEach(k => { monthlyData[k].profit = Math.round((monthlyData[k].revenue / 1.05) - monthlyData[k].cost); });
        content.innerHTML = Object.keys(monthlyData).sort((a,b)=>b.localeCompare(a)).map(m => `
            <div class="card p-4">
                <div class="text-lg font-black text-gray-800 mb-2">${m} 績效統計</div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <div><div class="text-[10px] text-gray-400">含稅總額</div><div class="text-blue-600 font-bold">$${monthlyData[m].revenue.toLocaleString()}</div></div>
                    <div><div class="text-[10px] text-gray-400">總成本</div><div class="text-red-500 font-bold">$${monthlyData[m].cost.toLocaleString()}</div></div>
                    <div class="bg-orange-50 p-1 rounded"><div class="text-[10px] text-orange-400">總稅金(5%)</div><div class="text-orange-600 font-bold font-black">$${monthlyData[m].taxTotal.toLocaleString()}</div></div>
                    <div><div class="text-[10px] text-gray-400">稅後淨利</div><div class="text-green-600 font-bold">$${monthlyData[m].profit.toLocaleString()}</div></div>
                </div>
            </div>`).join('');
    }

    function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); const fsBtn = document.getElementById('floatingSaveBtn'); if(t === 'inventory') { fsBtn.classList.remove('hidden'); fsBtn.style.display = 'flex'; renderInventoryEditor(); } else { fsBtn.classList.add('hidden'); fsBtn.style.display = 'none'; } renderRecords(); if(t==='stats') renderStats(); }
    function editRecord(id) { const r = records.find(x => String(x.id) === String(id)); if(!r) return; editingRecordId = id; currentSelections = JSON.parse(JSON.stringify(r.selections || {})); document.getElementById('custName').value = r.name || ''; document.getElementById('custPhone').value = r.custPhone || ''; document.getElementById('discountAmt').value = r.discount || 0; document.getElementById('manualTotal').value = r.manualTotal || ''; document.getElementById('noCardTotal').value = r.noCard || ''; document.getElementById('custAddr').value = r.custAddr || ''; document.getElementById('custWarranty').value = r.custWarranty || ''; document.getElementById('orderMemo').value = r.orderMemo || ''; renderConfig(); showTab('calc'); }
    function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('#tab-calc input, #tab-calc textarea').forEach(i=>i.value=""); document.getElementById('discountAmt').value=0; renderConfig(); }
    function goBack() { resetForm(); showTab('calc'); }
    function enterScreenshotMode() { document.getElementById('ss-time').innerText = '日期：' + new Date().toLocaleString(); document.getElementById('ss-val-disc').innerText = '$' + Number(document.getElementById('discountAmt').value).toLocaleString(); document.getElementById('ss-val-total').innerText = document.getElementById('ui-totalSale').innerText; document.getElementById('ss-warranty-info').innerText = document.getElementById('custWarranty').value ? `🛡️ 保固：${document.getElementById('custWarranty').value}` : ''; document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshot-header').style.display = 'block'; document.getElementById('screenshot-footer').style.display = 'block'; document.getElementById('screenshotNav').classList.remove('hidden'); renderConfig(); window.scrollTo(0,0); }
    function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshot-header').style.display = 'none'; document.getElementById('screenshot-footer').style.display = 'none'; document.getElementById('screenshotNav').classList.add('hidden'); renderConfig(); }
    function toggleAllCats(s) { catOrder.forEach(c => { collapsedCats[c] = s; }); renderInventoryEditor(); }
    function toggleSup(cat, idx, s) { if(!inv[cat][idx].sups) inv[cat][idx].sups = []; const i = inv[cat][idx].sups.indexOf(s); if(i > -1) inv[cat][idx].sups.splice(i, 1); else inv[cat][idx].sups.push(s); renderInventoryEditor(); }
    function renameCat(idx, n) { const o = catOrder[idx]; inv[n] = inv[o]; delete inv[o]; catOrder[idx] = n; }
    function addNewCategory() { const n = prompt("大項名稱："); if(n) { catOrder.push(n); inv[n] = []; renderInventoryEditor(); } }
    function addInvItem(c) { if(!inv[c]) inv[c] = []; inv[c].push({name: "新零件", p: 0, c: 0, outOfStock: false, sups: []}); renderInventoryEditor(); }
    function removeInvItem(cat, idx) { if(confirm('刪除？')) { inv[cat].splice(idx, 1); renderInventoryEditor(); } }
    function removeCat(idx) { if(confirm('刪除大項？')) { delete inv[catOrder[idx]]; catOrder.splice(idx,1); renderInventoryEditor(); } }
    function saveInventory() { if(confirm('同步雲端？')) { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('同步成功'); } }
    function getStatusClass(p) { const map = {"待處理":"status-red", "已叫貨":"status-yellow", "組裝中":"status-blue", "測試中":"status-orange", "已完工":"status-purple", "已寄出":"status-green"}; return map[p] || ""; }
    function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = '🔍 ' + cat; document.getElementById('selectionModal').classList.remove('hidden'); renderModalList(); }
    function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
    function renderModalList() { const list = document.getElementById('modalList'); list.innerHTML = ''; (inv[currentCat] || []).forEach((item, idx) => { const sel = (currentSelections[currentCat] || []).find(s => s.idx === idx); list.innerHTML += `<div class="p-3 border-2 rounded-xl flex justify-between items-center mb-2 ${sel?'border-blue-500 bg-blue-50':'border-gray-100'} ${item.outOfStock?'opacity-30 pointer-events-none':''}" onclick="togglePick(${idx})"><div class="flex-1"><div class="font-black text-gray-800 text-xs">${item.name}</div><div class="text-blue-600 font-black text-sm">$${Number(item.p).toLocaleString()}</div></div>${sel ? `<div class="flex flex-col items-end gap-2" onclick="event.stopPropagation()"><div class="flex items-center gap-2"><button onclick="updateSubItem(${idx}, 'qty', -1)" class="bg-gray-100 px-3 py-1 rounded-lg font-black text-lg">-</button><span class="text-sm font-black w-6 text-center">${sel.qty}</span><button onclick="updateSubItem(${idx}, 'qty', 1)" class="bg-blue-100 px-3 py-1 rounded-lg font-black text-lg">+</button></div><button onclick="toggleGift(${idx})" class="text-[10px] px-2 py-1 rounded ${sel.isGift?'bg-red-500 text-white':'bg-gray-200 text-gray-500'} font-black">🎁 贈品</button></div>`:''}</div>`; }); }
    function togglePick(idx) { if(!currentSelections[currentCat]) currentSelections[currentCat] = []; const i = currentSelections[currentCat].findIndex(s => s.idx === idx); if(i > -1) { currentSelections[currentCat].splice(i,1); } else { const t = (inv[currentCat] || [])[idx]; currentSelections[currentCat].push({idx, qty:1, isGift:false, p: Number(t.p||0), c: Number(t.c||0)}); } renderConfig(); renderModalList(); }
    function updateSubItem(idx, type, val) { const sel = currentSelections[currentCat].find(s => s.idx === idx); if(type==='qty') sel.qty = Math.max(1, sel.qty + val); renderConfig(); renderModalList(); }
    function toggleGift(idx) { const sel = currentSelections[currentCat].find(s => s.idx === idx); if(sel) { sel.isGift = !sel.isGift; renderConfig(); renderModalList(); } }
    function openShipmentModal(id) { const r = records.find(x => x.id === id); if(!r) return; const list = document.getElementById('shipmentList'); list.innerHTML = ''; const ns = r.notShipped || {}; catOrder.forEach(cat => { (r.selections[cat] || []).forEach((sel, idx) => { let target = (inv[cat] || [])[sel.idx]; if (target) { const isNS = ns[cat] && ns[cat].includes(idx); list.innerHTML += `<label class="flex items-center gap-3 p-4 border-2 rounded-xl bg-white ${isNS?'border-red-500 bg-red-50':'border-gray-100'}"><input type="checkbox" class="w-6 h-6" ${isNS?'checked':''} onchange="updateItemShipment(${id}, '${cat}', ${idx}, this.checked)"><div class="flex-1 text-sm font-bold">${target.name}</div></label>`; } }); }); document.getElementById('shipmentModal').classList.remove('hidden'); }
    function updateItemShipment(id, cat, idx, isNotShipped) { const r = records.find(x => x.id === id); if(!r) return; let ns = r.notShipped || {}; if(!ns[cat]) ns[cat] = []; if(isNotShipped) { if(!ns[cat].includes(idx)) ns[cat].push(idx); } else { ns[cat] = ns[cat].filter(i => i !== idx); } db.ref('records/' + id + '/notShipped').set(ns); }
    function openTemplateModal() { const list = document.getElementById('templateList'); list.innerHTML = ''; Object.keys(templates).forEach(id => { const t = templates[id]; list.innerHTML += `<div class="p-4 border-2 rounded-xl mb-3 flex justify-between items-center bg-white shadow-sm" onclick="applyTemplate('${id}')"><div class="font-black text-gray-700 text-xs">${t.name}</div><div class="flex gap-2"><button class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px]" onclick="applyTemplate('${id}')">套用</button><button class="bg-red-100 text-red-500 px-3 py-1 rounded-lg text-[10px]" onclick="event.stopPropagation(); db.ref('templates/'+'${id}').remove()">刪除</button></div></div>`; }); document.getElementById('templateModal').classList.remove('hidden'); }
    function applyTemplate(id) { currentSelections = JSON.parse(JSON.stringify(templates[id].selections)); document.getElementById('discountAmt').value = templates[id].discount || 0; document.getElementById('manualTotal').value = templates[id].manualTotal || ''; renderConfig(); document.getElementById('templateModal').classList.add('hidden'); }
    function saveTemplate() { const name = prompt("範本名稱："); if (!name) return; db.ref('templates/' + Date.now()).update({ name, selections: currentSelections, discount: document.getElementById('discountAmt').value, manualTotal: document.getElementById('manualTotal').value }); }
    function addCustomSeller() { const n = prompt("業務名稱："); if(n) { const s = document.getElementById('infoSeller'); const o = document.createElement('option'); o.value=n; o.text=n; o.selected=true; s.add(o); } }
    function copyQuoteAsText() { let text = `🐚【神奇海螺電競 | 專業報價】\n日期：${new Date().toLocaleDateString()}\n------------------------------\n`; catOrder.forEach(cat => { (currentSelections[cat] || []).forEach(sel => { let target = (inv[cat] || [])[sel.idx]; if (target) text += `[${cat}] ${target.name}${sel.qty > 1 ? ` x ${sel.qty}` : ''}${sel.isGift?' (贈品)':''}\n`; }); }); text += `------------------------------\n`; if (document.getElementById('discountAmt').value > 0) text += `折扣：-$${Number(document.getElementById('discountAmt').value).toLocaleString()}\n`; text += `總計：${document.getElementById('ui-totalSale').innerText} (含稅)`; navigator.clipboard.writeText(text).then(() => alert('📋 已複製文字報價！')); }

    db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); if(!document.getElementById('tab-inventory').classList.contains('hidden')) renderInventoryEditor(); });
    db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
    db.ref('records').on('value', s => { records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); } renderRecords(); });
    db.ref('templates').on('value', s => { templates = s.exists() ? s.val() : {}; });

    window.onload = () => { showTab('calc'); toggleAdminMode(); toggleItemPriceMode(); toggleItemCostMode(); toggleSSTotalMode(); };
    </script>
</body>
