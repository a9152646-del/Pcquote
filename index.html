<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>神奇海螺電競 | 專業報價與庫存系統 v8.8</title>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="IMG_4759.jpeg?v=1">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            background-color: #f4f9fc; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            padding-top: 60px !important; 
        }
        
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; border-color: #3b82f6; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        
        /* 截圖模式 */
        #screenshot-header, #screenshot-footer { display: none; }
        .hide-price .price-tag { display: none !important; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 40px !important; padding-top: 40px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; padding: 2rem !important; }
        .screenshot-mode .item-row { border: none; border-bottom: 1px dashed #ccc; padding: 8px 0; }
        
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .screenshot-mode #screenshot-header .ss-title { width: 100%; text-align: center; font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; color: #000; }
        .screenshot-mode #screenshot-header #ss-time { width: 100%; text-align: left; font-size: 0.875rem; color: #4b5563; }
        .screenshot-mode #screenshot-footer { display: block !important; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }

        .pick-item { transition: all 0.2s; border: 2px solid #e5e7eb; cursor: pointer; border-radius: 10px; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .is-out-of-stock { opacity: 0.4; background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #64748b !important; }

        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } }
    </style>
</head>

<div id="recycleBinModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60]">
    <div class="bg-white rounded-2xl max-w-xl w-full max-h-[80vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-4 border-b flex justify-between items-center bg-gray-800 text-white">
            <h3 class="font-bold">🗑️ 刪除紀錄 (暫存)</h3>
            <button onclick="closeRecycleBin()" class="text-2xl">×</button>
        </div>
        <div id="recycleList" class="overflow-y-auto flex-1 p-4 space-y-2 bg-gray-50"></div>
        <div class="p-2 text-center text-[10px] text-gray-400 font-bold italic">重整頁面後暫存會清空，請及時復原</div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; 
let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft';
let recycleBin = []; 

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    const profit = noCard > 0 ? (noCard - subC) : (finalSale - subC);
    document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const badges = items.map(sel => {
            let name = "", p = 0;
            if(sel.isTemp) { name = sel.name; p = sel.p; } 
            else { const target = (inv[cat] || [])[sel.idx]; if(!target) return ''; name = target.name; p = target.p; }
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${name}${sel.qty>1?` x${sel.qty}`:''} <span class="price-tag text-blue-500 ml-1">($${Number(p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${!isSellerMode?'hide-price':''} ${items.length===0?'empty-row':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function updateField(id, field, value) { db.ref(`records/${id}/${field}`).set(value); }

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const sellers = ["未選擇", "朱冠穎", "江苙翔"];
        const sOpts = sellers.map(s => `<option value="${s}" ${r.seller===s?'selected':''}>${s}</option>`).join('');
        const pOpts = ["待處理", "組裝中", "測試中", "已完工", "已寄出"].map(s => `<option value="${s}" ${r.progress===s?'selected':''}>${s}</option>`).join('');
        
        let missingItems = [];
        if(r.deliveredItems) {
            for(let key in r.deliveredItems) {
                if(r.deliveredItems[key] === false) {
                    const [cat, idx] = key.split('_');
                    const sel = (r.selections[cat] || [])[idx];
                    if (sel) {
                        let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知");
                        missingItems.push(n);
                    }
                }
            }
        }

        const div = `<div class="p-4 border-2 rounded-xl bg-white flex flex-col gap-3 shadow-sm relative ${missingItems.length>0?'border-red-400':'border-transparent'}">
            <div class="flex justify-between items-start">
                <div class="flex-1 space-y-1">
                    <div class="text-[10px] text-gray-400 font-bold">${r.time}</div>
                    <div class="text-sm font-bold text-gray-700">${r.name || '[無名]'}</div>
                    <div class="text-blue-600 font-black">${r.total}</div>
                    ${missingItems.length > 0 ? `<div class="text-[11px] text-red-600 font-black">⚠️ 未出貨：${missingItems.join(', ')}</div>` : ''}
                </div>
                <div class="flex flex-col items-end gap-2 pr-2">
                    <select onchange="updateField(${r.id}, 'seller', this.value)" class="text-xs p-1 bg-gray-50 border rounded w-24">${sOpts}</select>
                    <select onchange="updateField(${r.id}, 'progress', this.value)" class="text-xs p-1 bg-blue-50 border-blue-100 text-blue-700 rounded w-24 font-bold">${pOpts}</select>
                </div>
            </div>
            <div class="flex gap-2 border-t pt-2">
                <button onclick="editRecord(${r.id})" class="flex-1 py-1 bg-blue-500 text-white text-xs rounded font-bold">編輯</button>
                <button onclick="openDeliveryFast(${r.id})" class="flex-1 py-1 bg-orange-500 text-white text-xs rounded font-bold">📦 出貨管理</button>
                <button onclick="if(confirm('確定刪除？')) db.ref('records/'+${r.id}).remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded font-bold">刪除</button>
            </div>
        </div>`;
        
        if(r.status === 'draft') dList.innerHTML += div; 
        else if(r.status === 'completed') cList.innerHTML += div;
        else oList.innerHTML += div;
    });
}

function editRecord(id) {
    const r = records.find(x => x.id === id);
    if (!r) return;
    editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; 
    document.getElementById('custPhone').value = r.phone || ''; 
    document.getElementById('custAddr').value = r.addr || ''; 
    document.getElementById('discountAmt').value = r.discount || 0; 
    document.getElementById('noCardTotal').value = r.noCard || '';
    document.getElementById('orderMemo').value = r.memo || '';
    if(r.status === 'draft') { document.getElementById('btnConvertToOrder').classList.remove('hidden'); } 
    else { document.getElementById('btnConvertToOrder').classList.add('hidden'); }
    renderConfig(); showTab('calc');
}

let deliveryRecordId = null;
let tempDeliveryStatus = {};
function openDeliveryFast(id) {
    deliveryRecordId = id;
    const r = records.find(x => x.id === id);
    tempDeliveryStatus = r.deliveredItems || {}; 
    const list = document.getElementById('deliveryList');
    list.innerHTML = '';
    for (let cat in r.selections) {
        r.selections[cat].forEach((sel, idx) => {
            const key = `${cat}_${idx}`;
            const isDelivered = tempDeliveryStatus[key] !== false; 
            let name = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知品項");
            list.innerHTML += `
                <div class="flex items-center justify-between p-3 border rounded-lg bg-white">
                    <div class="flex-1 text-sm font-bold">${name}</div>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" ${isDelivered ? 'checked' : ''} onchange="tempDeliveryStatus['${key}']=this.checked">
                        <span class="text-xs">已出貨</span>
                    </label>
                </div>`;
        });
    }
    document.getElementById('deliveryModal').classList.remove('hidden');
}
function saveDeliveryStatus() {
    db.ref(`records/${deliveryRecordId}/deliveredItems`).set(tempDeliveryStatus).then(() => closeDeliveryModal());
}
function closeDeliveryModal() { document.getElementById('deliveryModal').classList.add('hidden'); }

function deleteInvItem(cat, idx) {
    const item = inv[cat][idx];
    recycleBin.push({ type: 'item', name: item.name, cat: cat, data: item });
    inv[cat].splice(idx, 1);
    renderInventoryEditor();
}
function removeCat(i) { 
    if(confirm("確定刪除類別？")) { 
        const name = catOrder[i];
        recycleBin.push({ type: 'cat', name: name, data: inv[name] });
        delete inv[name]; catOrder.splice(i,1); renderInventoryEditor(); 
    } 
}
function showRecycleBin() {
    const list = document.getElementById('recycleList');
    list.innerHTML = recycleBin.length ? '' : '<div class="text-center py-10 text-gray-400">尚無刪除紀錄</div>';
    recycleBin.forEach((item, idx) => {
        list.innerHTML += `<div class="flex items-center justify-between p-3 bg-white border rounded shadow-sm">
            <span class="font-bold text-sm">(${item.type==='cat'?'類別':'零件'}) ${item.name}</span>
            <button onclick="restoreFromBin(${idx})" class="text-xs bg-blue-500 text-white px-3 py-1 rounded font-bold">復原</button>
        </div>`;
    });
    document.getElementById('recycleBinModal').classList.remove('hidden');
}
function restoreFromBin(idx) {
    const item = recycleBin[idx];
    if (item.type === 'cat') { catOrder.push(item.name); inv[item.name] = item.data; } 
    else { if (!inv[item.cat]) inv[item.cat] = []; inv[item.cat].push(item.data); }
    recycleBin.splice(idx, 1); renderInventoryEditor(); showRecycleBin();
}
function closeRecycleBin() { document.getElementById('recycleBinModal').classList.add('hidden'); }

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = ''; const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-3 rounded-lg flex justify-between items-center mb-1 ${sel?'active':''} ${item.outOfStock?'is-out-of-stock':''}" onclick="togglePick(${idx}, false)">
            <div class="flex-1"><div class="font-bold text-sm">${item.name}</div><div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div></div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <label class="text-xs flex items-center gap-1 cursor-pointer"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked, false)"> 贈</label>
                <div class="flex items-center border rounded bg-white overflow-hidden shadow-sm">
                    <button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', -1, false)">-</button>
                    <span class="px-2 text-xs font-bold min-w-[20px] text-center">${sel?.qty || 1}</span>
                    <button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', 1, false)">+</button>
                </div>
            </div>
        </div>`;
    });
}
function togglePick(idx, isTemp) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function updateSubItem(idx, type, val, isTemp, tIdx) {
    if(!currentSelections[currentCat]) return;
    const selList = currentSelections[currentCat];
    const sel = isTemp ? selList.filter(s => s.isTemp)[tIdx] : selList.find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val); if(type==='gift') sel.isGift = val;
    renderConfig(); renderModalList();
}
function addTempItem() {
    const name = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value; 
    if(!name||!p) return;
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c: c||0, qty:1, isTemp:true });
    document.getElementById('tempName').value = ""; document.getElementById('tempPrice').value = ""; document.getElementById('tempCost').value = ""; 
    renderConfig(); renderModalList();
}
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = `選擇 ${cat}`; renderModalList(); document.getElementById('selectionModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }

function saveRecord(targetStatus) {
    const id = editingRecordId || Date.now(), status = targetStatus === 'current' ? currentStatus : targetStatus;
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, source: document.getElementById('custSource').value, phone: document.getElementById('custPhone').value, addr: document.getElementById('custAddr').value, memo: document.getElementById('orderMemo').value, selections: currentSelections, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText, status, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).update(r).then(() => { alert('儲存成功'); resetForm(); showTab('drafts'); });
}

function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input:not([type="checkbox"])').forEach(i=>i.value=""); document.getElementById('btnConvertToOrder').classList.add('hidden'); renderConfig(); }

function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border relative shadow-sm";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2"><input class="font-bold text-blue-600 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)"><div class="flex gap-1"><button onclick="moveCat(${cIdx},-1)" class="text-xs bg-gray-100 p-1 rounded font-bold">↑</button><button onclick="moveCat(${cIdx},1)" class="text-xs bg-gray-100 p-1 rounded font-bold">↓</button><button onclick="removeCat(${cIdx})" class="text-red-300 ml-1 text-xl">×</button></div></div><div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs border-dashed border-2 mt-2 py-2 rounded-lg font-bold text-gray-400">+ 新增零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "bg-gray-50 p-3 rounded-lg relative border space-y-2";
            row.innerHTML = `
                <input type="text" class="text-sm font-bold w-full bg-white" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                
                <div class="flex gap-2">
                    <input type="number" class="w-1/3 text-xs" value="${item.p}" placeholder="售價" onchange="inv['${cat}'][${idx}].p=this.value">
                    <input type="number" class="w-1/3 text-xs text-red-600 font-bold" value="${item.c||0}" placeholder="成本" onchange="inv['${cat}'][${idx}].c=this.value">
                    <button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock; renderInventoryEditor();" class="w-1/3 text-[10px] font-bold rounded ${item.outOfStock?'bg-red-500 text-white':'bg-white text-gray-400 border'}">缺貨</button>
                </div>
                
                <div class="flex justify-end pt-1">
                    <button onclick="deleteInvItem('${cat}', ${idx})" class="text-xs bg-red-50 text-red-400 px-3 py-1 rounded-md font-bold border border-red-100">刪除品項 ×</button>
                </div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}
function addNewCategory() { const name = prompt("名稱"); if(name) { catOrder.push(name); inv[name]=[]; renderInventoryEditor(); } }
function renameCat(i, n) { const o = catOrder[i]; inv[n]=inv[o]; delete inv[o]; catOrder[i]=n; renderInventoryEditor(); }
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0, outOfStock: false}); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('同步成功')); }

function enterScreenshotMode() { calculate(); document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshotNav').style.display='flex'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshotNav').style.display='none'; }
function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t==='inventory') renderInventoryEditor(); }
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); document.getElementById('sellerBtn').innerText = `管理員模式: ${isSellerMode?'ON':'OFF'}`; renderConfig(); }
window.onload = () => renderConfig();
</script>
</body>
</html>
