<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>神奇海螺電競 | 專業報價與庫存系統 v8.8</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* --- 問題 1 修正：動態島完全避讓方案 --- */
        :root {
            --sat: env(safe-area-inset-top);
        }
        body { 
            background-color: #f4f9fc; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            /* 基礎間距 + 自動感應動態島高度 */
            padding-top: calc(15px + var(--sat)) !important; 
        }
        
        /* 針對導航欄的避讓 */
        .sticky-nav {
            top: var(--sat);
            z-index: 50;
        }

        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .item-row:hover { background-color: #f8fafc; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 4px; border: 1px solid #e2e8f0; }
        
        /* 截圖模式 */
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .screenshot-mode .empty-row { display: none !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; }
        .screenshot-mode .price-tag { display: none !important; }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<button onclick="location.reload(true)" class="no-screenshot fixed right-4 bottom-24 z-[40] bg-orange-500 text-white shadow-lg w-10 h-10 rounded-full flex items-center justify-center text-lg active:scale-90 opacity-80">🔄</button>

<div id="screenshotNav" style="display: none;" class="fixed top-10 right-5 z-[9999] flex gap-2">
    <button onclick="exitScreenshotMode()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-xl">退出截圖</button>
</div>

<div class="max-w-7xl mx-auto">
    <div id="screenshot-header" class="hidden">
        <h1 class="text-2xl font-black">神奇海螺電競 專業組裝報價</h1>
        <div id="ss-time" class="text-sm text-gray-500"></div>
    </div>

    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky sticky-nav p-1">
        <button onclick="showTab('calc')" id="btn-calc" class="px-5 py-4 tab-active whitespace-nowrap">🐚 報價配單</button>
        <button onclick="showTab('drafts')" id="btn-drafts" class="px-5 py-4 whitespace-nowrap">📂 訂單草稿</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-5 py-4 whitespace-nowrap">✅ 正式訂單</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-5 py-4 whitespace-nowrap">⚙️ 庫存品項</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6 no-screenshot">
                        <h2 class="font-bold text-xl text-blue-600">電腦配置區</h2>
                        <button onclick="toggleSellerMode()" id="sellerBtn" class="text-xs bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">管理員模式: ON</button>
                    </div>
                    <div id="configRows" class="grid grid-cols-1 gap-1"></div>
                </div>
                <div class="card p-6 no-screenshot">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                        <select id="custSource">
                            <option value="FB">Facebook</option>
                            <option value="IG">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-24 space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400">折扣金額</label>
                        <input type="number" id="discountAmt" class="w-full mt-1" value="0" oninput="calculate()">
                    </div>
                    <div class="border-t pt-2">
                        <div class="flex justify-between text-sm text-gray-500"><span>未稅總計</span><span id="ui-untaxed">$0</span></div>
                        <div class="flex justify-between text-2xl font-black text-blue-600 mt-1"><span>含稅總計</span><span id="ui-totalSale">$0</span></div>
                    </div>
                    <div id="sellerBox" class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <div class="flex justify-between text-xs text-blue-500"><span>總成本</span><span id="ui-totalCost">$0</span></div>
                        <div class="flex justify-between text-lg font-bold text-green-600 border-t mt-2 pt-2"><span>預計淨利</span><span id="ui-totalProfit">$0</span></div>
                    </div>
                    <button onclick="saveRecord('draft')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">儲存草稿</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">📸 生成報價截圖</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-drafts" class="page-content hidden"><div id="draftList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
    <div id="tab-orders" class="page-content hidden"><div id="orderList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
    <div id="tab-inventory" class="page-content hidden"><div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
</div>

<script>
// Firebase 配置保持不變
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let inv = {}; let catOrder = []; let currentSelections = {}; let records = []; let editingId = null;

// 資料監聽
db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = [];
    if(s.exists()) {
        const data = s.val();
        for(let id in data) records.push(data[id]);
    }
    renderRecords();
});

// --- 問題 2 修正：確保函式正確且不會被事件冒泡干擾 ---
function updateRecordField(id, field, val) {
    if(!id) return;
    db.ref(`records/${id}/${field}`).set(val)
      .then(() => console.log('更新成功'))
      .catch(err => alert('更新失敗: ' + err));
}

function renderRecords() {
    const dList = document.getElementById('draftList');
    const oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = '';

    records.sort((a,b) => b.id - a.id).forEach(r => {
        const sellers = ["未選擇", "朱冠穎", "江苙翔"];
        const sOpts = sellers.map(s => `<option value="${s}" ${r.seller===s?'selected':''}>${s}</option>`).join('');
        
        const card = `
            <div class="card p-4 border-l-4 ${r.status==='order'?'border-green-500':'border-blue-400'}">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs text-gray-400">${r.time}</div>
                        <div class="font-bold text-gray-700">${r.name || '客戶未命名'}</div>
                        <div class="text-blue-600 font-black text-lg">${r.total}</div>
                    </div>
                    <div class="text-right">
                        <select onchange="updateRecordField(${r.id}, 'seller', this.value)" class="text-xs bg-gray-50 border rounded p-1 relative z-20">
                            ${sOpts}
                        </select>
                    </div>
                </div>
                <div class="mt-3 flex gap-2 no-screenshot">
                    <button onclick="editRecord(${r.id})" class="flex-1 bg-gray-100 py-2 rounded font-bold text-xs">編輯</button>
                    ${r.status==='draft' ? `<button onclick="convertToOrder(${r.id})" class="flex-1 bg-green-600 text-white py-2 rounded font-bold text-xs">轉正式訂單</button>` : ''}
                    <button onclick="if(confirm('確定刪除？')) db.ref('records/'+${r.id}).remove()" class="px-3 bg-red-50 text-red-400 rounded text-xs">刪除</button>
                </div>
            </div>`;
        
        if(r.status === 'draft') dList.innerHTML += card;
        else oList.innerHTML += card;
    });
}

// 基礎計算與 UI 功能 (其餘邏輯保持不變)
function calculate() {
    let subP = 0, subC = 0;
    const disc = parseFloat(document.getElementById('discountAmt').value || 0);
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(sel => {
            const item = (inv[cat] || [])[sel.idx];
            if(item) {
                const qty = sel.qty || 1;
                if(!sel.isGift) subP += (Number(item.p) * qty);
                subC += (Number(item.c || 0) * qty);
            }
        });
    });
    const finalSale = subP - disc;
    document.getElementById('ui-untaxed').innerText = `$${Math.round(finalSale / 1.05).toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${(finalSale - subC).toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows');
    if(!container) return;
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const selections = currentSelections[cat] || [];
        const badges = selections.map(sel => {
            const item = (inv[cat] || [])[sel.idx];
            return item ? `<div class="selected-badge">${sel.isGift?'[贈] ':''}${item.name} <span class="price-tag text-blue-500">($${Number(item.p).toLocaleString()})</span></div>` : '';
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${selections.length===0?'empty-row':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function showTab(t) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    document.getElementById('tab-'+t).classList.remove('hidden');
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('btn-'+t).classList.add('tab-active');
}

function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshotNav').style.display='flex'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshotNav').style.display='none'; }
function convertToOrder(id) { db.ref(`records/${id}/status`).set('order'); }
function saveRecord(status) {
    const id = editingId || Date.now();
    const r = { id, status, time: new Date().toLocaleString(), name: document.getElementById('custName').value, total: document.getElementById('ui-totalSale').innerText, selections: currentSelections, seller: "未選擇" };
    db.ref('records/' + id).set(r).then(() => { alert('儲存成功'); resetForm(); });
}
function resetForm() { editingId = null; currentSelections = {}; document.getElementById('custName').value = ''; renderConfig(); }

window.onload = () => renderConfig();
</script>
</body>
</html>
