<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇海螺電競 | 專業報價與庫存系統 v7.4 雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f4f9fc; font-family: sans-serif; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; }
        .seller-bg { background-color: #eff6ff; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 20px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; }
        @media print { .no-print, button, .no-screenshot { display: none !important; } }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<script>
// --- Firebase 金鑰 ---
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming",
  storageBucket: "magic-conch-gaming.firebasestorage.app",
  messagingSenderId: "105735978925",
  appId: "1:105735978925:web:3ec77acbfd344475322b24"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<div class="max-w-7xl mx-auto">
    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="showTab('calc')" id="btn-calc" class="px-6 py-3 tab-active">🐚 報價配單</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-6 py-3">📋 訂單管理</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-6 py-3">⚙️ 品項庫管理</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <h2 class="font-bold text-xl text-blue-600 mb-4">電腦配置區</h2>
                    <div id="configRows" class="divide-y"></div>
                </div>
                <div class="card p-6 no-screenshot">
                    <h2 class="font-bold mb-4 border-b pb-2">客戶資訊</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                    </div>
                </div>
            </div>
            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-20 text-center">
                    <h3 class="text-gray-400 text-sm">含稅總計</h3>
                    <div id="ui-totalSale" class="text-4xl font-black text-blue-600 my-2">$0</div>
                    <button onclick="saveRecord('order')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold mb-2">✅ 儲存訂單</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">📸 截圖模式</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-orders" class="page-content hidden">
        <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between mb-4">
                <h2 class="font-bold text-xl">⚙️ 雲端品項庫</h2>
                <button onclick="saveInv()" class="bg-blue-600 text-white px-4 py-2 rounded">同步到雲端</button>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>
</div>

<button id="exitBtn" onclick="exitScreenshotMode()" style="display:none; position:fixed; bottom:30px; left:30px; z-index:9999;" class="bg-red-600 text-white px-8 py-4 rounded-full font-bold">❌ 退出截圖</button>

<div id="selectionModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full p-4">
        <div id="modalList" class="max-h-96 overflow-y-auto space-y-2"></div>
        <button onclick="closeModal()" class="w-full mt-4 bg-gray-200 py-2 rounded">關閉</button>
    </div>
</div>

<script>
// 初始化結構，每個 item 現在包含 name, p (售價), c (成本)
let inv = { "處理器(CPU)": [], "主機板(MB)": [], "記憶體(RAM)": [], "顯示卡(VGA)": [], "固態硬碟(SSD)": [], "電源供應器(PSU)": [], "機殼(Case)": [] };
let records = [];
let currentSelections = {};

// 初始化：從雲端抓資料
db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('records').on('value', s => { records = []; s.forEach(c => records.push(c.val())); renderRecords(); });

function showTab(t) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    document.getElementById('tab-'+t).classList.remove('hidden');
    if(t==='inventory') renderInventoryEditor();
}

function renderConfig() {
    const container = document.getElementById('configRows');
    container.innerHTML = '';
    Object.keys(inv).forEach(cat => {
        const sel = currentSelections[cat] || [];
        container.innerHTML += `<div class="py-4 cursor-pointer" onclick="openSelection('${cat}')">
            <div class="text-xs text-blue-500 font-bold">${cat}</div>
            <div class="mt-1">${sel.length ? sel.map(s => `<span class="selected-badge">${inv[cat][s].name} ($${inv[cat][s].p})</span>`).join('') : '<span class="text-gray-300">尚未選擇</span>'}</div>
        </div>`;
    });
}

function openSelection(cat) {
    const list = document.getElementById('modalList');
    list.innerHTML = `<h3 class="font-bold mb-2">${cat}</h3>`;
    inv[cat].forEach((item, idx) => {
        list.innerHTML += `<div onclick="togglePick('${cat}', ${idx})" class="p-3 border rounded mb-2 cursor-pointer hover:bg-blue-50">
            ${item.name} <span class="text-blue-500 font-bold">$${item.p}</span>
        </div>`;
    });
    document.getElementById('selectionModal').classList.remove('hidden');
}

function togglePick(cat, idx) {
    if(!currentSelections[cat]) currentSelections[cat] = [];
    const i = currentSelections[cat].indexOf(idx);
    if(i > -1) currentSelections[cat].splice(i, 1);
    else currentSelections[cat].push(idx);
    calculate(); renderConfig();
}

function calculate() {
    let total = 0;
    for(let c in currentSelections) {
        currentSelections[c].forEach(idx => { total += Number(inv[c][idx].p); });
    }
    document.getElementById('ui-totalSale').innerText = `$${total.toLocaleString()}`;
}

function saveRecord(status) {
    const id = Date.now();
    const data = { id, name: document.getElementById('custName').value, total: document.getElementById('ui-totalSale').innerText, time: new Date().toLocaleString() };
    db.ref('records/'+id).set(data).then(() => alert('儲存成功！'));
}

function renderRecords() {
    const list = document.getElementById('orderList');
    list.innerHTML = '';
    records.forEach(r => {
        list.innerHTML += `<div class="card p-4"><b>${r.name}</b> <span class="text-blue-600">${r.total}</span><br><small>${r.time}</small></div>`;
    });
}

// --- 更新部分：品項庫管理加入名稱、售價、成本 ---
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    Object.keys(inv).forEach(cat => {
        area.innerHTML += `<div class="border p-2 rounded"><b>${cat}</b>
            <div class="flex gap-1 mb-1 text-[10px] text-gray-400 px-1">
                <div class="flex-1">名稱</div>
                <div class="w-16">售價</div>
                <div class="w-16">成本</div>
            </div>
            <div id="edit-${cat}"></div>
            <button onclick="addInvItem('${cat}')" class="mt-2 text-xs text-blue-500">+ 新增零件</button>
        </div>`;
        inv[cat].forEach((item, idx) => {
            // 確保資料存在，避免舊資料沒有成本欄位
            if(item.c === undefined) item.c = 0;
            
            document.getElementById('edit-'+cat).innerHTML += `<div class="flex gap-1 mb-1">
                <input class="flex-1 text-xs" placeholder="名稱" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <input class="w-16 text-xs" placeholder="售價" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value">
                <input class="w-16 text-xs border-blue-200" placeholder="成本" value="${item.c}" onchange="inv['${cat}'][${idx}].c=this.value">
            </div>`;
        });
    });
}

function addInvItem(c) { inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function saveInv() { db.ref('inventory').set(inv).then(() => alert('雲端同步成功！')); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('exitBtn').style.display='block'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('exitBtn').style.display='none'; }
</script>
</body>
</html>
