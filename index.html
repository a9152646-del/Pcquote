<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇海螺電競 | 雲端同步系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="p-4 bg-gray-50">

<div id="app" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <h1 class="text-2xl font-bold mb-4">🐚 神鰭海螺報價系統</h1>
    
    <div class="flex border-b mb-4">
        <button onclick="tab('calc')" class="p-2 border-b-2 border-blue-500">電腦估價</button>
        <button onclick="tab('admin')" class="p-2 ml-4">品項管理</button>
    </div>

    <div id="view-calc">
        <p class="text-gray-500">正在從雲端下載最新價格...</p>
        <div id="item-list" class="space-y-2 mt-4"></div>
    </div>

    <div id="view-admin" class="hidden">
        <h2 class="font-bold">新增/修改品項</h2>
        <input type="text" id="itemName" placeholder="零件名稱" class="border p-2 w-full mb-2">
        <input type="number" id="itemPrice" placeholder="價格" class="border p-2 w-full mb-2">
        <button onclick="addItem()" class="bg-blue-500 text-white p-2 rounded w-full">同步到雲端</button>
    </div>
</div>

<script>
// --- 你的專屬金鑰 ---
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming",
  storageBucket: "magic-conch-gaming.firebasestorage.app",
  messagingSenderId: "105735978925",
  appId: "1:105735978925:web:3ec77acbfd344475322b24"
};

// 初始化
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 基本切換邏輯
function tab(name) {
    document.getElementById('view-calc').classList.toggle('hidden', name !== 'calc');
    document.getElementById('view-admin').classList.toggle('hidden', name !== 'admin');
}

// 同步資料邏輯
function addItem() {
    const name = document.getElementById('itemName').value;
    const price = document.getElementById('itemPrice').value;
    if(name && price) {
        db.ref('items').push({ name, price });
        alert('同步成功！');
        location.reload();
    }
}

// 讀取資料
db.ref('items').on('value', (snapshot) => {
    const list = document.getElementById('item-list');
    list.innerHTML = "";
    snapshot.forEach((child) => {
        const data = child.val();
        list.innerHTML += `<div class="flex justify-between border-b py-2"><span>${data.name}</span><span class="text-blue-600">$${data.price}</span></div>`;
    });
});
</script>

<style>.hidden { display: none; }</style>
</body>
</html>
