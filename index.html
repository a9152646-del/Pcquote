<!DOCTYPE html>
<html lang="zh-TW">

    <style>
        body { background-color: #f8fafc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-top: 105px !important; padding-bottom: 200px !important; font-size: 14px; color: #334155; line-height: 1.5; }

        .status-red { background-color: #fef2f2; color: #ef4444; border: 1px solid #fecaa7; }
        .status-blue { background-color: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
        .status-orange { background-color: #fffaf1; color: #f59e0b; border: 1px solid #fde68a; }

        .status-green { background-color: #f0fdf4; color: #22c55e; border: 1px solid #bbf7d0; }

        .selected-badge { color: #1e293b; font-size: 14px; margin-right: 8px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
        .price-tag { color: #94a3b8; font-weight: 400; font-size: 12px; margin-left: 4px; }
        body.hide-prices:not(.screenshot-mode) .price-tag { display: none !important; }

        #adminToggleContainer { position: fixed; bottom: 25px; left: 15px; z-index: 50; display: flex; flex-direction: column; gap: 12px; }
        .floating-label { background: #fff; padding: 10px 16px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 2px solid #e2e8f0; display: flex; align-items: center; gap: 8px; cursor: pointer; width: fit-content; }
        
        #screenshotNav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 99999; display: none; }
        .screenshot-mode #screenshotNav { display: block !important; }
        #screenshotNav button { font-size: 14px; padding: 10px 20px; border-radius: 30px; background: #1e293b; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.3); font-weight: bold; }
        
        .screenshot-mode .no-screenshot, .screenshot-mode #adminToggleContainer { display: none !important; }

        .inv-item-row { display: flex; flex-direction: column; padding: 10px 12px; border-radius: 8px; border: 1px solid #f1f5f9; background: #fff; margin-bottom: 8px; }
        .inv-item-name-row { display: flex; align-items: center; gap: 8px; width: 100%; padding-bottom: 6px; border-bottom: 1px dashed #f1f5f9; }
        .inv-item-name-row input[type="text"] { border: none !important; background: transparent !important; padding: 0 !important; flex: 1; font-weight: bold; font-size: 13px; min-width: 0; }
        .inv-item-ctrl-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding-top: 6px; }
        
        .stock-btn { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; border: 1px solid #e2e8f0; cursor: pointer; min-width: 55px; text-align: center; }
        .stock-btn.active { background: #22c55e; color: white; border-color: #22c55e; }
        .stock-btn.oos { background: #ef4444; color: white; border-color: #ef4444; }
        .supp-btn { font-size: 10px; width: 26px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 5px; border: 1px solid #e2e8f0; cursor: pointer; background: #f1f5f9; color: #94a3b8; font-weight: bold; }

        #floatingSaveBtn { position: fixed; right: 16px; bottom: 230px; z-index: 100; }
    </style>
</head>
<body class="p-2 md:p-4 hide-prices" id="mainBody">

                            <div><label class="text-xs text-blue-400 font-bold">EDIT TOTAL 手動總額</label><input type="number" id="manualTotal" class="w-full mt-1 border-blue-200 font-black text-lg text-blue-600" placeholder="點此修改總額..." oninput="calculate()"></div>
                            <div class="pt-1"><div class="text-xs text-blue-400 font-bold">TOTAL 含稅 ✏️</div><div id="ui-totalSale" class="text-3xl font-black text-blue-600">$0</div></div>
                            <div id="ui-noCardShow" class="p-2 bg-orange-50 rounded hidden border-2 border-orange-200"><div class="text-[10px] text-orange-400 font-bold uppercase">無卡分期</div><div id="ui-noCardVal" class="text-lg font-black text-orange-600">$0</div></div>

                        </div>
                        <div id="sellerBox" class="bg-blue-50 p-3 rounded-lg invisible"><div class="flex justify-between text-xs text-blue-500"><span>成本</span><span id="ui-totalCost">$0</span></div><div class="flex justify-between text-sm font-black text-green-600 border-t-2 border-blue-100 mt-2 pt-2"><span>利潤</span><span id="ui-totalProfit">$0</span></div></div>
                        <div class="space-y-2"><button onclick="saveRecord('current')" class="w-full bg-blue-600 text-white py-3 rounded-lg font-black">💾 儲存草稿</button><button id="btnConvertToOrder" onclick="saveRecord('order')" class="hidden w-full bg-green-600 text-white py-3 rounded-lg font-black">✅ 轉正式訂單</button><button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-lg font-black">📸 截圖模式</button></div>

        <div id="tab-stats" class="page-content hidden">
            <div class="card p-6 text-center space-y-6">

                <div class="bg-gray-50 p-4 rounded-xl space-y-3">

                        <div class="p-4 bg-green-50 rounded-xl border-2 border-green-100 text-center"><div class="text-[10px] text-green-400 font-bold">總營收</div><div id="stat-revenue" class="text-2xl font-black text-green-600">$0</div></div>
                        <div class="p-4 bg-orange-50 rounded-xl border-2 border-orange-100 text-center"><div class="text-[10px] text-orange-400 font-bold">總利潤</div><div id="stat-profit" class="text-3xl font-black text-orange-600">$0</div></div>
                    </div>

                <button id="btnShowStats" onclick="toggleStats()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold">📊 顯示結算數據</button>

        <div id="tab-inventory" class="page-content hidden">

                <div class="flex justify-between items-center mb-4"><h2 class="font-black text-lg text-gray-700">⚙️ 雲端品項管理</h2><div class="flex gap-2"><button onclick="addNewCategory()" class="bg-blue-500 text-white px-3 py-2 rounded-lg text-[10px]">+ 大項</button><button onclick="saveInventory()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] shadow-md font-bold">💾 同步雲端</button></div></div>
                <div id="inventoryEditor" class="space-y-4"></div>
            </div>

        <div id="templateModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[600] backdrop-blur-md">
            <div class="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col shadow-2xl border-2 border-blue-100">
                <div class="p-5 border-b flex justify-between items-center bg-indigo-50"><h3 class="font-black text-indigo-700 text-lg">📁 載入配置範本</h3><button onclick="document.getElementById('templateModal').classList.add('hidden')" class="text-gray-400 text-3xl">×</button></div>
                <div id="templateList" class="overflow-y-auto flex-1 p-5 space-y-3"></div>
                <div class="p-5 border-t bg-gray-50"><button onclick="document.getElementById('templateModal').classList.add('hidden')" class="w-full bg-gray-200 text-gray-600 py-4 rounded-xl font-bold">關閉</button></div>
            </div>

        <div id="selectionModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[500] backdrop-blur-md">
            <div class="bg-white rounded-xl max-w-lg w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50"><h3 id="modalTitle" class="font-black text-blue-600 text-lg">選擇品項</h3><button onclick="closeModal()" class="text-gray-400 text-3xl">×</button></div>

                <div class="p-3 border-t"><button onclick="closeModal()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black">確定選擇</button></div>

        <div id="deliveryModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[1000]"><div class="bg-white rounded-xl max-w-md w-full max-h-[75vh] overflow-hidden flex flex-col shadow-2xl"><div class="p-4 border-b flex justify-between items-center bg-green-600 text-white"><h3 class="font-bold">📦 出貨品項勾選</h3><button onclick="closeDeliveryModal()" class="text-2xl">×</button></div><div id="deliveryList" class="overflow-y-auto flex-1 p-4 space-y-3 bg-gray-50 text-sm"></div><div class="p-4 border-t"><button onclick="closeDeliveryModal()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">確認關閉</button></div></div></div>
    </div>

    <script>
    const firebaseConfig = { apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM", authDomain: "magic-conch-gaming.firebaseapp.com", databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "magic-conch-gaming", storageBucket: "magic-conch-gaming.firebasestorage.app", messagingSenderId: "105735978925", appId: "1:105735978925:web:3ec77acbfd344475322b24" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let inv = {}; let catOrder = []; let records = []; let templates = {}; let currentSelections = {}; let editingRecordId = null; let currentCat = ""; let currentStatus = 'draft'; let searchTerm = "";

    // --- 🧱 核心計算邏輯 ---
    function calculate() {
        try {
            let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
            let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
            catOrder.forEach(cat => {
                (currentSelections[cat] || []).forEach(s => {
                    let p = 0, c = 0; if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
                    else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
                    if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
                });
            });
            const baseTaxedTotal = !isNaN(parseFloat(document.getElementById('manualTotal').value)) ? parseFloat(document.getElementById('manualTotal').value) : (subP - disc);
            document.getElementById('ui-totalSale').innerText = `$${baseTaxedTotal.toLocaleString()}`;
            let profit = baseTaxedTotal - subC; if (noCard > 0) { profit = (noCard - baseTaxedTotal) + (baseTaxedTotal - subC); document.getElementById('ui-noCardVal').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ui-noCardShow').classList.remove('hidden'); } else document.getElementById('ui-noCardShow').classList.add('hidden');
            document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`; document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
        } catch(e) { console.log("計算出錯", e); }
    }

    // --- 🧱 UI 渲染邏輯 ---
    function renderConfig() {
        const container = document.getElementById('configRows'); if(!container) return;
        const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode'); container.innerHTML = '';
        catOrder.forEach(cat => {
            const items = currentSelections[cat] || []; if (isSS && items.length === 0) return;
            const badges = items.map((sel, sIdx) => {
                // 防呆：如果 sel 是舊格式資料，轉為物件
                if (typeof sel === 'number') sel = {idx: sel, qty: 1, isGift: false, isTemp: false, note: ""};
                let target = sel.isTemp ? sel : (inv[cat] || [])[sel.idx]; if(!target) return '';
                const noteHtml = isSS ? '' : `<div class="mt-1"><input type="text" placeholder="保固/序號備註" class="text-[10px] py-1 px-2 w-full bg-gray-50 border-dashed" value="${sel.note || ''}" onchange="updateItemNote('${cat}', ${sIdx}, this.value)"></div>`;
                return `<div class="selected-badge flex-col !items-start mb-2">${sel.isGift?'<span class="text-red-500">[贈]</span> ':''}<div>${target.name}${sel.qty>1?`<span class="bg-blue-100 text-blue-600 px-2 rounded-full ml-1 text-xs">x${sel.qty}</span>`:''} <span class="price-tag">($${Number(target.p).toLocaleString()})</span></div>${noteHtml}</div>`;
            }).join('');
            container.innerHTML += `<div class="item-row cursor-pointer" onclick="openSelection('${cat}')"><div class="text-[10px] font-black text-blue-400 uppercase mb-1 tracking-wider">${cat}</div><div class="flex flex-col gap-1">${badges || '<span class="text-gray-300 italic text-sm no-screenshot">未選中項目...</span>'}</div></div>`;
        });
        calculate();
    }

    function updateItemNote(cat, sIdx, val) { if(currentSelections[cat] && currentSelections[cat][sIdx]) currentSelections[cat][sIdx].note = val; }

    function renderRecords() {
        const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
        if(!dList || !oList || !cList) return;
        dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
        
        records.sort((a,b)=>b.id-a.id).forEach(r => {
            // 防呆搜尋邏輯
            if (searchTerm) {
                const name = r.name || ""; const phone = r.custPhone || ""; const seller = r.seller || "";
                if (!(name + phone + seller).toLowerCase().includes(searchTerm.toLowerCase())) return;
            }

            let undeliveredHtml = ""; if(r.status !== 'draft') { let undeliveredNames = []; for (let cat in (r.selections || {})) { (r.selections[cat] || []).forEach((sel, idx) => { const k = `${cat}_${idx}`; if(!r.deliveredItems || r.deliveredItems[k] === false) { let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知"); undeliveredNames.push(`●${n}`); } }); } if(undeliveredNames.length > 0) undeliveredHtml = `<div class="text-[10px] text-red-500 mt-2 pt-1 border-t border-dashed line-clamp-1 font-bold">未出貨：${undeliveredNames.join(' ')}</div>`; }
            
            const getStatusClass = (p) => {
                if(p === "待處理") return "status-red"; if(p === "組裝中") return "status-blue"; if(p === "測試中") return "status-orange"; if(p === "已完工") return "status-purple"; if(p === "已寄出") return "status-green"; return "";
            };
            const pOpts = ["待處理", "組裝中", "測試中", "已完工", "已寄出"].map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
            
            const div = `<div class="p-4 border-2 rounded-xl bg-white shadow-sm space-y-3"><div class="flex justify-between items-start"><div class="flex-1"><div class="text-[10px] text-gray-400 font-mono">${r.time}</div><div class="text-base font-black text-gray-800">${r.name || '無名客戶'}</div><div class="text-blue-600 font-black text-lg">含稅：${r.total}</div>${r.noCard > 0 ? `<div class="text-[10px] text-orange-500 font-bold">💳 無卡分期：$${Number(r.noCard).toLocaleString()}</div>` : ''}${undeliveredHtml}</div><div class="text-right ml-2"><span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full">${r.seller||'未指定'}</span><div class="mt-2"><select onchange="updateProgress(${r.id}, this)" class="text-[10px] font-bold px-1 py-1 rounded-lg ${getStatusClass(r.progress)}">${pOpts}</select></div></div></div><div class="flex gap-1 pt-3 border-t border-dashed"><button onclick="editRecord(${r.id})" class="flex-1 py-2 bg-blue-600 text-white text-[10px] rounded-lg font-black">編輯</button>${r.status === 'draft' ? `<button onclick="if(confirm('確認轉正式？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-green-600 text-white px-2 rounded-lg text-[10px] font-bold">轉正式</button>` : `<button onclick="openDeliveryFast(${r.id})" class="bg-orange-500 text-white px-2 rounded-lg text-[10px] font-bold">📦 出貨</button><button onclick="if(confirm('確認結案？')) db.ref('records/'+${r.id}+'/status').set('completed')" class="bg-gray-600 text-white px-2 rounded-lg text-[10px] font-bold">結案</button>`}<button onclick="if(confirm('確定刪除？')) db.ref('records/'+${r.id}).remove()" class="text-red-300 text-xl px-1">✕</button></div></div>`;
            if(r.status === 'draft') dList.innerHTML += div; else if(r.status === 'completed') cList.innerHTML += div; else oList.innerHTML += div;
        });
    }

    function updateProgress(id, el) { db.ref('records/'+id+'/progress').set(el.value); }
    function globalSearch(val) { searchTerm = val; renderRecords(); }

    function renderInventoryEditor() {
        const area = document.getElementById('inventoryEditor'); if (!area) return; area.innerHTML = '';
        catOrder.forEach((cat, cIdx) => {
            const sec = document.createElement('div'); sec.className = "bg-gray-50 p-3 rounded-lg border-2 relative mb-4";
            sec.innerHTML = `<div class="flex justify-between items-center mb-3"><div class="flex items-center gap-3"><div class="flex flex-col text-[10px] text-gray-300"><button onclick="moveCat(${cIdx}, -1)">▲</button><button onclick="moveCat(${cIdx}, 1)">▼</button></div><input class="font-black text-sm text-blue-600 border-none bg-transparent p-0 w-32" value="${cat}" onchange="renameCat(${cIdx}, this.value)"></div><button onclick="removeCat(${cIdx})" class="text-red-300 hover:text-red-500 text-2xl">×</button></div><div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-[10px] font-bold bg-white mt-2 py-2 rounded-lg border-2 border-dashed border-gray-200 text-gray-400 hover:text-blue-500 active:bg-blue-50">+ 新增零件品項</button>`;
            area.appendChild(sec);
            (inv[cat] || []).forEach((item, idx) => {
                const row = document.createElement('div'); row.className = `inv-item-row ${item.outOfStock ? 'inv-out-of-stock' : ''}`;
                const sList = item.suppliers || []; const sHtml = ['原', '速', '裕'].map(label => `<button onclick="event.stopPropagation(); toggleSupplier('${cat}', ${idx}, '${label}')" class="supp-btn ${sList.includes(label) ? 'active' : ''}">${label}</button>`).join('');
                row.innerHTML = `<div class="inv-item-name-row"><div class="flex flex-col text-[10px] text-gray-300 px-1 flex-shrink-0"><button onclick="moveItem('${cat}', ${idx}, -1)">▲</button><button onclick="moveItem('${cat}', ${idx}, 1)">▼</button></div><input type="text" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value" placeholder="零件名稱..."></div><div class="inv-item-ctrl-row"><div class="flex gap-1.5 mr-auto">${sHtml}</div><div class="flex items-center gap-1 border-2 rounded-lg bg-white px-2 flex-shrink-0"><span class="text-[10px] text-gray-400">售</span><input type="number" class="w-12 text-xs font-black text-blue-600 border-none p-0" value="${item.p}" onchange="inv['${cat}'][${idx}].p=Number(this.value)"></div><div class="flex items-center gap-1 border-2 rounded-lg bg-white px-2 flex-shrink-0"><span class="text-[10px] text-gray-400">本</span><input type="number" class="w-12 text-xs font-black text-red-400 border-none p-0" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=Number(this.value)"></div><button onclick="toggleStockStatus('${cat}', ${idx})" class="stock-btn ${item.outOfStock?'oos':'active'}">${item.outOfStock?'缺貨':'供應'}</button><button onclick="if(confirm('確定刪除？')) { inv['${cat}'].splice(${idx}, 1); renderInventoryEditor(); }" class="text-red-200 text-xl px-1">×</button></div>`;
                document.getElementById(`edit-${cat}`).appendChild(row);
            });
        });
    }

    // --- 📈 統計邏輯 ---
    function updateMonthSelector() {
        const select = document.getElementById('statsMonthSelect'); if (!select) return; const months = new Set();
        records.forEach(r => { if(r.status === 'draft' || !r.time) return; const parts = r.time.split(/[/, :]/); let y, m; if (parts[0].length === 4) { y = parts[0]; m = parts[1]; } else if (parts[2] && parts[2].length === 4) { y = parts[2]; m = parts[1]; } if (y && m) months.add(`${y}/${parseInt(m)}`); });
        const now = new Date(); const currentStr = `${now.getFullYear()}/${now.getMonth() + 1}`; months.add(currentStr);
        const sorted = Array.from(months).sort((a,b) => { const pa = a.split('/').map(Number), pb = b.split('/').map(Number); return pb[0] - pa[0] || pb[1] - pa[1]; });
        select.innerHTML = sorted.map(m => `<option value="${m}" ${m===currentStr?'selected':''}>${m}</option>`).join('');
    }
    function toggleStats() { const content = document.getElementById('statsContent'); const btn = document.getElementById('btnShowStats'); if (content.classList.contains('hidden')) { renderStats(); content.classList.remove('hidden'); btn.innerText = '🔼 隱藏結算數據'; } else { content.classList.add('hidden'); btn.innerText = '📊 顯示結算數據'; } }
    function renderStats() {
        const select = document.getElementById('statsMonthSelect'); if (!select.value) return; const [year, month] = select.value.split('/').map(Number);
        let totalRev = 0, totalProfit = 0, count = 0;
        records.forEach(r => {
            if (r.status === 'draft' || !r.time) return; const parts = r.time.split(/[/, :]/); let ry, rm; if (parts[0].length === 4) { ry = parts[0]; rm = parts[1]; } else if (parts[2] && parts[2].length === 4) { ry = parts[2]; rm = parts[1]; }
            if (parseInt(ry) === year && parseInt(rm) === month) { count++; let revStr = (r.noCard > 0 ? String(r.noCard) : r.total).replace(/[$,]/g, ""); let rev = parseFloat(revStr) || 0; totalRev += rev; let cost = 0; for(let cat in (r.selections || {})) { (r.selections[cat]||[]).forEach(sel => { let c = 0; if(sel.isTemp) c = Number(sel.c || 0); else if(inv[cat] && inv[cat][sel.idx]) c = Number(inv[cat][sel.idx].c || 0); cost += (c * (sel.qty || 1)); }); } totalProfit += (rev - cost); }
        });
        document.getElementById('stat-count').innerText = count; document.getElementById('stat-revenue').innerText = `$${totalRev.toLocaleString()}`; document.getElementById('stat-profit').innerText = `$${totalProfit.toLocaleString()}`;
    }

    // --- 📁 範本邏輯 ---
    function saveTemplate() { const name = prompt("範本名稱："); if (!name) return; const data = { id: Date.now(), name, selections: currentSelections, discount: document.getElementById('discountAmt').value || 0 }; db.ref('templates/' + data.id).set(data).then(() => alert('範本儲存成功！')); }
    function openTemplateModal() {
        const list = document.getElementById('templateList'); list.innerHTML = '';
        Object.keys(templates).forEach(id => {
            const t = templates[id];
            list.innerHTML += `<div class="p-4 border-2 rounded-xl mb-3 flex justify-between items-center bg-white shadow-sm" onclick="applyTemplate('${id}')"><div class="font-black text-gray-700 text-xs">${t.name}</div><div class="flex gap-2"><button class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px]" onclick="applyTemplate('${id}')">套用</button><button class="bg-red-100 text-red-500 px-3 py-1 rounded-lg text-[10px]" onclick="event.stopPropagation(); deleteTemplate('${id}')">刪除</button></div></div>`;
        });
        document.getElementById('templateModal').classList.remove('hidden');
    }
    function applyTemplate(id) { if (confirm(`載入「${templates[id].name}」？`)) { currentSelections = JSON.parse(JSON.stringify(templates[id].selections)); document.getElementById('discountAmt').value = templates[id].discount || 0; renderConfig(); document.getElementById('templateModal').classList.add('hidden'); } }
    function deleteTemplate(id) { if (confirm('確定刪除？')) db.ref('templates/' + id).remove().then(() => openTemplateModal()); }

    // --- ⚙️ 基本功能 ---
    function showTab(t) { 
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); 
        document.getElementById('tab-'+t).classList.remove('hidden'); 
        document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); 
        document.getElementById('btn-'+t).classList.add('tab-active'); 
        const fsBtn = document.getElementById('floatingSaveBtn'); 
        if(t === 'inventory') { renderInventoryEditor(); fsBtn.classList.remove('hidden'); fsBtn.style.display = 'flex'; } else { fsBtn.classList.add('hidden'); fsBtn.style.display = 'none'; } 
        searchTerm = ""; document.querySelectorAll('input[oninput^="globalSearch"]').forEach(i => i.value = ""); renderRecords();
    }
    function goBack() { if (editingRecordId !== null) { resetForm(); showTab('drafts'); return; } const activeTab = document.querySelector('.page-content:not(.hidden)').id; if (activeTab !== 'tab-calc') showTab('calc'); else window.history.back(); }
    function toggleAdminMode() { const isChecked = document.getElementById('adminToggle').checked; const body = document.getElementById('mainBody'); const box = document.getElementById('sellerBox'); if(isChecked) { body.classList.remove('hide-prices'); box.classList.remove('invisible'); } else { body.classList.add('hide-prices'); box.classList.add('invisible'); } }
    function saveInventory() { if(confirm('同步雲端？')) { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('同步成功'); } }
    function addNewCategory() { const n = prompt("大項名稱："); if(n) { catOrder.push(n); inv[n] = []; renderInventoryEditor(); } }
    function addInvItem(c) { if(!inv[c]) inv[c] = []; inv[c].push({name: "新零件", p: 0, c: 0, outOfStock: false}); renderInventoryEditor(); }
    function removeCat(idx) { if(confirm('刪除？')) { delete inv[catOrder[idx]]; catOrder.splice(idx,1); renderInventoryEditor(); } }
    function renameCat(idx, newName) { const old = catOrder[idx]; inv[newName] = inv[old]; delete inv[old]; catOrder[idx] = newName; }
    function moveCat(idx, dir) { let newIdx = idx + dir; if (newIdx >= 0 && newIdx < catOrder.length) { [catOrder[idx], catOrder[newIdx]] = [catOrder[newIdx], catOrder[idx]]; renderInventoryEditor(); } }
    function moveItem(cat, idx, dir) { let newIdx = idx + dir; if (newIdx >= 0 && newIdx < inv[cat].length) { [inv[cat][idx], inv[cat][newIdx]] = [inv[cat][newIdx], inv[cat][idx]]; renderInventoryEditor(); } }
    function toggleSupplier(cat, idx, label) { if(!inv[cat][idx].suppliers) inv[cat][idx].suppliers = []; const list = inv[cat][idx].suppliers; const pos = list.indexOf(label); if(pos > -1) list.splice(pos, 1); else list.push(label); renderInventoryEditor(); }
    function toggleStockStatus(cat, idx) { inv[cat][idx].outOfStock = !inv[cat][idx].outOfStock; renderInventoryEditor(); }
    function addCustomSeller() { const n = prompt("業務名稱："); if(n) { const s = document.getElementById('infoSeller'); const o = document.createElement('option'); o.value=n; o.text=n; o.selected=true; s.add(o); } }
    function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = '🔍 ' + cat; document.getElementById('selectionModal').classList.remove('hidden'); document.getElementById('modalSearch').value = ''; renderModalList(); }
    function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
    function filterModalList() { const q = document.getElementById('modalSearch').value.toLowerCase(); document.querySelectorAll('.pick-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }
    function renderModalList() {
        const list = document.getElementById('modalList'); list.innerHTML = ''; (inv[currentCat] || []).forEach((item, idx) => {
            const sel = (currentSelections[currentCat] || []).find(s => !s.isTemp && s.idx === idx);
            list.innerHTML += `<div class="pick-item p-3 border-2 rounded-xl flex justify-between items-center mb-2 ${sel?'border-blue-500 bg-blue-50':'border-gray-100'} ${item.outOfStock?'opacity-30 pointer-events-none':''}" onclick="togglePick(${idx})"><div class="flex-1"><div class="font-black text-gray-800 text-xs">${item.outOfStock?'[缺貨] ':''}${item.name}</div><div class="text-blue-600 font-black mt-1 text-sm">$${Number(item.p).toLocaleString()}</div></div>${sel ? `<div class="flex items-center gap-2" onclick="event.stopPropagation()"><label class="text-[10px] font-bold flex items-center gap-1 bg-white px-2 py-1 rounded-full border"><input type="checkbox" ${sel.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked)"> 贈</label><div class="flex items-center border-2 border-blue-200 rounded-lg bg-white overflow-hidden"><button class="px-2 py-1 bg-blue-50" onclick="updateSubItem(${idx}, 'qty', -1)">-</button><span class="px-2 font-black text-blue-600 text-xs">${sel.qty || 1}</span><button class="px-2 py-1 bg-blue-50" onclick="updateSubItem(${idx}, 'qty', 1)">+</button></div></div>` : ''}</div>`;
        });
    }
    function togglePick(idx) { if(!currentSelections[currentCat]) currentSelections[currentCat] = []; const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx); if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false, note:""}); renderConfig(); renderModalList(); }
    function updateSubItem(idx, type, val) { const sel = currentSelections[currentCat].find(s => !s.isTemp && s.idx === idx); if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val); if(type==='gift') sel.isGift = val; renderConfig(); renderModalList(); }
    function addTempItem() { const n = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value; if(n) { if(!currentSelections[currentCat]) currentSelections[currentCat] = []; currentSelections[currentCat].push({name:n, p:Number(p), c:Number(c), isGift:false, qty:1, isTemp: true, note:""}); renderConfig(); renderModalList(); } }
    function saveRecord(st) { if(!document.getElementById('custName').value) { alert('填姓名'); return; } const id = editingRecordId || Date.now(); const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, custPhone: document.getElementById('custPhone').value, seller: document.getElementById('infoSeller').value, selections: currentSelections, total: document.getElementById('ui-totalSale').innerText, noCard: document.getElementById('noCardTotal').value, manualTotal: document.getElementById('manualTotal').value, status: st === 'current' ? currentStatus : st, discount: document.getElementById('discountAmt').value, progress: "待處理" }; db.ref('records/' + id).update(r).then(() => { alert('儲存成功'); resetForm(); showTab(st === 'order' ? 'orders' : 'drafts'); }); }
    function editRecord(id) { const r = records.find(x => x.id === id); if(!r) return; editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {}; document.getElementById('custName').value = r.name || ''; document.getElementById('custPhone').value = r.custPhone || ''; document.getElementById('discountAmt').value = r.discount || 0; document.getElementById('noCardTotal').value = r.noCard || ''; document.getElementById('manualTotal').value = r.manualTotal || ''; if(r.status === 'draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); else document.getElementById('btnConvertToOrder').classList.add('hidden'); renderConfig(); showTab('calc'); }
    function openDeliveryFast(id) { const r = records.find(x => x.id === id); if(!r) return; let tempDeliv = r.deliveredItems || {}; const list = document.getElementById('deliveryList'); list.innerHTML = ''; for (let cat in (r.selections || {})) { (r.selections[cat]||[]).forEach((sel, idx) => { const k = `${cat}_${idx}`; const isD = tempDeliv[k] !== false; let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知"); list.innerHTML += `<div class="flex justify-between items-center p-3 border-2 rounded-xl bg-white"><div>${n}</div><input type="checkbox" ${isD?'checked':''} onchange="db.ref('records/'+${id}+'/deliveredItems/${k}').set(this.checked)"></div>`; }); } document.getElementById('deliveryModal').classList.remove('hidden'); }
    function closeDeliveryModal() { document.getElementById('deliveryModal').classList.add('hidden'); }
    function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input').forEach(i=>i.value=""); renderConfig(); }

    function enterScreenshotMode() { 
        const body = document.getElementById('mainBody'); const footer = document.getElementById('screenshot-footer'); const now = new Date(); document.getElementById('ss-time').innerText = '報價日期：' + now.toLocaleString(); calculate(); 
        footer.style.display = document.getElementById('adminToggle').checked ? 'block' : 'none';
        if(document.getElementById('adminToggle').checked) { document.getElementById('ss-val-disc').innerText = '$' + Number(document.getElementById('discountAmt').value || 0).toLocaleString(); document.getElementById('ss-val-total').innerText = document.getElementById('ui-totalSale').innerText; }
        if (!document.getElementById('ssPriceToggle').checked) body.classList.add('ss-hide-prices'); else body.classList.remove('ss-hide-prices');
        body.classList.add('screenshot-mode'); document.getElementById('screenshot-header').style.display = 'block'; renderConfig(); 
    }
    function exitScreenshotMode() { const body = document.getElementById('mainBody'); body.classList.remove('screenshot-mode', 'ss-hide-prices'); document.getElementById('screenshot-header').style.display = 'none'; document.getElementById('screenshot-footer').style.display = 'none'; renderConfig(); }

    // --- 📡 Firebase 核心啟動 ---
    db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); if(!document.getElementById('tab-inventory').classList.contains('hidden')) renderInventoryEditor(); });
    db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
    db.ref('records').on('value', s => { records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); } renderRecords(); updateMonthSelector(); });
    db.ref('templates').on('value', s => { templates = s.exists() ? s.val() : {}; });

    window.onload = () => { showTab('calc'); };
    </script>
</body>
</html>
