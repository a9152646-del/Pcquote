<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇海螺電競 | 專業報價與庫存系統 v7.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; border-color: #3b82f6; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        
        #screenshot-header { display: none; }
        #screenshot-footer { display: none; }

        .hide-price .price-tag { display: none !important; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 40px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; padding: 2rem !important; }
        .screenshot-mode .item-row { border: none; border-bottom: 1px dashed #ccc; padding: 8px 0; }
        .screenshot-mode .selected-badge { border: none; background: none; padding: 0; font-size: 14px; color: #000; }
        
        .screenshot-mode #screenshot-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .screenshot-mode #screenshot-header .ss-title { width: 100%; text-align: center; font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
        .screenshot-mode #screenshot-header #ss-time { width: 100%; text-align: left; font-size: 0.875rem; color: #4b5563; }
        .screenshot-mode #screenshot-footer { display: block; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }

        /* 複選列表樣式 */
        .pick-item { transition: all 0.2s; border: 1px solid #e5e7eb; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; }

        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } }
    </style>
</head>

<div class="max-w-7xl mx-auto">
    <div id="screenshot-header">
        <div class="ss-title">《報價單》</div>
        <div id="ss-time"></div>
    </div>

    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="showTab('calc')" id="btn-calc" class="px-6 py-3 tab-active">🐚 報價配單</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-6 py-3">📋 訂單/草稿管理</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-6 py-3">⚙️ 品項庫管理</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6 no-screenshot">
                        <h2 class="font-bold text-xl text-blue-600">電腦配置區</h2>
                        <button onclick="toggleSellerMode()" id="sellerBtn" class="text-xs bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">管理員模式: ON</button>
                    </div>
                    <div id="configRows" class="grid grid-cols-1 md:grid-cols-1 gap-1"></div>
                </div>
                <div class="card p-6 no-screenshot">
                    <h2 class="font-bold mb-4 border-b pb-2 text-gray-700">客戶資訊</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                        <select id="custSource">
                            <option value="FB">Facebook</option>
                            <option value="IG">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="其他">其他</option>
                        </select>
                        <input type="text" id="custAddr" placeholder="配送地址" class="md:col-span-4">
                        <textarea id="orderMemo" placeholder="內部備註" class="md:col-span-4 h-24 w-full"></textarea>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-20">
                    <h3 class="font-bold border-b pb-2 mb-4 text-gray-600">報價總計</h3>
                    <div class="space-y-1 mb-4">
                        <div class="text-xs text-gray-400 font-bold">折扣金額</div><input type="number" id="discountAmt" class="w-full mb-2" value="0" oninput="calculate()">
                        <div class="text-xs text-gray-400 font-bold">未稅總計</div><div id="ui-untaxed" class="text-xl font-bold text-gray-700">$0</div>
                        <div class="text-xs text-gray-400 font-bold">含稅總計</div><div id="ui-totalSale" class="text-4xl font-black text-blue-600">$0</div>
                    </div>
                    <div id="sellerBox" class="seller-bg p-4 rounded-lg mb-6 border border-blue-100 space-y-3">
                        <input type="number" id="noCardTotal" class="w-full mt-1 border-blue-200" placeholder="無卡分期金額" oninput="calculate()">
                        <div class="flex justify-between text-sm text-blue-500 border-t pt-2"><span>總成本</span><span id="ui-totalCost">$0</span></div>
                        <div class="flex justify-between text-lg font-bold text-green-600 border-t mt-2 pt-2"><span>預計淨利</span><span id="ui-totalProfit">$0</span></div>
                    </div>
                    <button onclick="saveRecord('current')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold mb-2">儲存/更新</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold mb-2">📸 進入截圖模式</button>
                    <button onclick="exitToOrdersWithoutSaving()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold mb-2 shadow-lg">❌ 不儲存並返回</button>
                    <button onclick="resetForm()" class="w-full text-gray-400 text-xs mt-2">清空重填</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screenshot-footer" class="text-right space-y-1">
        <div id="ss-discount" class="text-sm text-red-500 font-bold"></div>
        <div id="ss-untaxed" class="text-sm text-gray-600"></div>
        <div id="ss-total" class="text-2xl font-bold text-blue-700"></div>
    </div>

    <div id="tab-orders" class="page-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6">
                <h2 class="font-bold text-lg mb-4 text-orange-500 border-b pb-2">📂 雲端草稿 <span id="count-draft">0</span></h2>
                <div id="draftList" class="space-y-4"></div>
            </div>
            <div class="card p-6">
                <h2 class="font-bold text-lg mb-4 text-green-600 border-b pb-2">✅ 正式訂單 <span id="count-order">0</span></h2>
                <div id="orderList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl text-gray-800">⚙️ 雲端品項管理</h2>
                <div class="flex gap-2">
                    <button onclick="addNewCategory()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold">+ 新增大項</button>
                    <button onclick="saveInventory()" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold">儲存並同步</button>
                </div>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<div id="screenshotNav" style="display: none; position: fixed; top: 20px; right: 20px; z-index: 999999;" class="flex gap-2">
    <button onclick="exitScreenshotMode()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-xl">返回編輯</button>
</div>

<div id="selectionModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div class="p-4 border-b flex justify-between items-center bg-gray-50">
            <h3 id="modalTitle" class="font-bold text-blue-600">選擇品項</h3>
            <button onclick="closeModal()" class="text-gray-400 text-xl">×</button>
        </div>
        <div id="modalList" class="overflow-y-auto flex-1 p-4 space-y-2"></div>
        
        <div class="p-4 border-t bg-gray-50 space-y-2">
            <div class="text-xs font-bold text-gray-500">快速臨時新增品項</div>
            <div class="flex gap-2">
                <input type="text" id="tempName" class="flex-1" placeholder="零件名稱">
                <input type="number" id="tempPrice" class="w-20" placeholder="售價">
                <input type="number" id="tempCost" class="w-20" placeholder="成本">
                <button onclick="addTempItem()" class="bg-orange-500 text-white px-3 py-1 rounded text-sm font-bold">新增</button>
            </div>
        </div>
        
        <div class="p-4 border-t flex gap-2">
            <button onclick="closeModal()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">確認完成</button>
        </div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; 
let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft';

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            // 判斷是庫存品項還是臨時品項
            if (s.isTemp) {
                p = Number(s.p || 0); c = Number(s.c || 0);
            } else {
                const item = (inv[cat] || [])[s.idx];
                if(item) { p = Number(item.p || 0); c = Number(item.c || 0); }
            }
            
            if(!s.isGift) subP += (p * (s.qty || 1));
            subC += (c * (s.qty || 1));
        });
    });

    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${(noCard > 0 ? (noCard - subC) : (finalSale - subC)).toLocaleString()}`;
    document.getElementById('ss-time').innerText = `報價時間：${new Date().toLocaleString()}`;
    document.getElementById('ss-discount').innerText = disc > 0 ? `折扣：-$${disc.toLocaleString()}` : "折扣";
    document.getElementById('ss-untaxed').innerText = `未稅金額：$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `含稅總計：$${finalSale.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const badges = items.map((sel, sIdx) => {
            let name = "", p = 0;
            if(sel.isTemp) {
                name = sel.name; p = sel.p;
            } else {
                const target = (inv[cat] || [])[sel.idx];
                if(!target) return '';
                name = target.name; p = target.p;
            }
            const qtyStr = sel.qty > 1 ? `<span class="text-orange-600 font-bold ml-1">x${sel.qty}</span>` : '';
            return `<div class="selected-badge">
                ${sel.isGift?'[贈]':''}${name}${qtyStr} 
                <span class="price-tag text-blue-500 ml-1">($${Number(p).toLocaleString()})</span>
            </div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${!isSellerMode?'hide-price':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

// 複選選單與臨時新增
function openSelection(cat) {
    currentCat = cat; document.getElementById('modalTitle').innerText = `選擇${cat}品項 (可複選)`;
    renderModalList();
    document.getElementById('selectionModal').classList.remove('hidden');
}

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    const selections = currentSelections[currentCat] || [];

    // 1. 庫存品項列表
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `
            <div class="pick-item p-3 rounded-lg flex justify-between items-center ${sel?'active':''}" onclick="togglePick(${idx}, false)">
                <div class="flex-1">
                    <div class="font-bold text-sm">${item.name}</div>
                    <div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div>
                </div>
                <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                    <label class="text-xs flex items-center gap-1"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked, false)"> 贈</label>
                    <div class="flex items-center border rounded bg-white overflow-hidden">
                        <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${idx}, 'qty', -1, false)">-</button>
                        <span class="px-3 text-xs font-bold">${sel?.qty || 1}</span>
                        <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${idx}, 'qty', 1, false)">+</button>
                    </div>
                </div>
            </div>`;
    });

    // 2. 顯示已新增的臨時品項
    selections.filter(s => s.isTemp).forEach((temp, tIdx) => {
        list.innerHTML += `
            <div class="pick-item p-3 rounded-lg flex justify-between items-center active border-orange-200 bg-orange-50">
                <div class="flex-1">
                    <div class="font-bold text-sm text-orange-700">[臨時] ${temp.name}</div>
                    <div class="text-xs text-orange-500 font-bold">$${Number(temp.p).toLocaleString()}</div>
                </div>
                <div class="flex items-center gap-3">
                   <div class="flex items-center border rounded bg-white overflow-hidden">
                        <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${tIdx}, 'qty', -1, true)">-</button>
                        <span class="px-3 text-xs font-bold">${temp.qty || 1}</span>
                        <button class="px-2 py-1 bg-gray-50 text-xs" onclick="updateSubItem(${tIdx}, 'qty', 1, true)">+</button>
                    </div>
                    <button onclick="removeTempItem(${tIdx})" class="text-red-400 text-lg ml-2">×</button>
                </div>
            </div>`;
    });
}

function togglePick(idx, isTemp) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); 
    else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}

function updateSubItem(idx, type, val, isTemp) {
    const selList = currentSelections[currentCat];
    const sel = isTemp ? selList.filter(s => s.isTemp)[idx] : selList.find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type === 'qty') sel.qty = Math.max(1, (sel.qty || 1) + val);
    if(type === 'gift') sel.isGift = val;
    renderConfig(); renderModalList();
}

function addTempItem() {
    const name = document.getElementById('tempName').value;
    const p = document.getElementById('tempPrice').value;
    const c = document.getElementById('tempCost').value || 0;
    if(!name || !p) return alert('名稱與售價必填');
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c, qty: 1, isGift: false, isTemp: true });
    document.getElementById('tempName').value = ""; document.getElementById('tempPrice').value = ""; document.getElementById('tempCost').value = "";
    renderConfig(); renderModalList();
}

function removeTempItem(tIdx) {
    const all = currentSelections[currentCat];
    const tempItems = all.filter(s => s.isTemp);
    const target = tempItems[tIdx];
    const realIdx = all.indexOf(target);
    all.splice(realIdx, 1);
    renderConfig(); renderModalList();
}

// 其餘功能（庫存管理等）保持原樣
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border relative";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2">
            <input class="font-bold text-blue-600 bg-transparent border-none p-0 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)">
            <div class="flex gap-1">
                <button onclick="moveCat(${cIdx},-1)" class="text-xs bg-gray-100 p-1 rounded">↑</button>
                <button onclick="moveCat(${cIdx},1)" class="text-xs bg-gray-100 p-1 rounded">↓</button>
                <button onclick="removeCat(${cIdx})" class="text-red-300 ml-1">×</button>
            </div>
        </div>
        <div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs text-gray-500 font-bold border-dashed border-2 mt-2 py-2 bg-gray-50 rounded-lg">+ 新增細項零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "flex flex-col gap-1 bg-gray-50 p-2 rounded relative border border-transparent hover:border-blue-200";
            row.innerHTML = `<input type="text" class="text-xs font-bold" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <div class="flex gap-1">
                    <input type="number" class="w-1/2 text-xs" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value">
                    <input type="number" class="w-1/2 text-xs text-red-500" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=this.value">
                </div>
                <div class="flex gap-1 mt-1">
                    <button onclick="moveItem('${cat}', ${idx}, -1)" class="text-[9px] bg-white px-1 border">上移</button>
                    <button onclick="moveItem('${cat}', ${idx}, 1)" class="text-[9px] bg-white px-1 border">下移</button>
                    <button onclick="removeInvItem('${cat}',${idx})" class="absolute top-1 right-1 text-gray-300">×</button>
                </div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}
function moveCat(i, d) { let n = i+d; if(n>=0 && n<catOrder.length) { [catOrder[i], catOrder[n]] = [catOrder[n], catOrder[i]]; renderInventoryEditor(); } }
function moveItem(cat, i, d) { let n = i+d; if(n>=0 && n<inv[cat].length) { [inv[cat][i], inv[cat][n]] = [inv[cat][n], inv[cat][i]]; renderInventoryEditor(); } }
function addNewCategory() { const name = prompt("請輸入新大項名稱"); if(name) { catOrder.push(name); inv[name] = []; renderInventoryEditor(); } }
function removeCat(i) { if(confirm("確定刪除此大項？")) { delete inv[catOrder[i]]; catOrder.splice(i,1); renderInventoryEditor(); } }
function renameCat(i, newN) { const oldN = catOrder[i]; inv[newN] = inv[oldN]; delete inv[oldN]; catOrder[i] = newN; renderInventoryEditor(); }
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function removeInvItem(c, i) { inv[c].splice(i,1); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('同步成功')); }

function saveRecord(type) {
    const id = editingRecordId || Date.now(); const status = type === 'current' ? currentStatus : type;
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, source: document.getElementById('custSource').value, phone: document.getElementById('custPhone').value, addr: document.getElementById('custAddr').value, memo: document.getElementById('orderMemo').value, selections: currentSelections, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText, status, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).set(r).then(() => { alert('儲存完成'); resetForm(); showTab('orders'); });
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const div = `<div class="p-4 border rounded-xl bg-white flex justify-between items-center shadow-sm">
            <div><div class="text-[10px] text-gray-400 font-bold">${r.time}</div><div class="text-sm font-bold">[${r.source||'無'}] ${r.name}</div><div class="text-blue-600 font-bold">${r.noCard>0?`分期: $${Number(r.noCard).toLocaleString()}`:r.total}</div></div>
            <div class="flex gap-2"><button onclick="editRecord(${r.id})" class="px-3 py-1 bg-blue-500 text-white text-xs rounded">編輯</button><button onclick="db.ref('records/${r.id}').remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded">刪除</button></div>
        </div>`;
        if(r.status === 'draft') dList.innerHTML += div; else oList.innerHTML += div;
    });
    document.getElementById('count-draft').innerText = records.filter(r=>r.status==='draft').length;
    document.getElementById('count-order').innerText = records.filter(r=>r.status==='order').length;
}

function editRecord(id) {
    const r = records.find(x => x.id === id); editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; 
    document.getElementById('custPhone').value = r.phone || ''; 
    document.getElementById('custAddr').value = r.addr || ''; 
    document.getElementById('discountAmt').value = r.discount || 0;
    document.getElementById('noCardTotal').value = r.noCard || '';
    renderConfig(); showTab('calc');
}

function enterScreenshotMode() { calculate(); document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshotNav').style.display='flex'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshotNav').style.display='none'; }
function exitToOrdersWithoutSaving() { if(confirm("確定不儲存直接返回訂單列表嗎？")) { resetForm(); showTab('orders'); } }

function showTab(t) { 
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); 
    document.getElementById('tab-'+t).classList.remove('hidden'); 
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('btn-'+t).classList.add('tab-active');
    if(t==='inventory') renderInventoryEditor(); 
}
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); renderConfig(); }
function resetForm() { editingRecordId = null; currentSelections = {}; document.getElementById('custName').value = ""; document.getElementById('custPhone').value = ""; document.getElementById('custAddr').value = ""; document.getElementById('discountAmt').value = 0; document.getElementById('noCardTotal').value = ""; calculate(); renderConfig(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
window.onload = () => { renderConfig(); };
</script>
</body>
</html>
