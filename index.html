<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>神奇海螺電競 | 專業報價與庫存系統 v8.8</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); }
        body { 
            background-color: #f4f9fc; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            padding-top: calc(15px + var(--sat)) !important; 
        }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .item-row:hover { background-color: #f8fafc; }
        .is-out-of-stock { opacity: 0.5; background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; }
        
        /* 截圖模式修正 */
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .screenshot-mode .empty-row { display: none !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<button onclick="location.reload(true)" class="no-screenshot fixed right-4 bottom-24 z-[40] bg-orange-500 text-white shadow-lg w-10 h-10 rounded-full flex items-center justify-center text-lg opacity-80">🔄</button>

<div class="max-w-7xl mx-auto">
    <div id="screenshot-header" class="hidden">
        <h1 class="text-2xl font-black">神奇海螺電競 專業組裝報價</h1>
        <div id="ss-time" class="text-sm text-gray-500"></div>
    </div>

    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-[var(--sat)] z-50 p-1">
        <button onclick="showTab('calc')" id="btn-calc" class="px-5 py-4 tab-active whitespace-nowrap">🐚 報價配單</button>
        <button onclick="showTab('drafts')" id="btn-drafts" class="px-5 py-4 whitespace-nowrap">📂 訂單草稿</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-5 py-4 whitespace-nowrap">✅ 正式訂單</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-5 py-4 whitespace-nowrap">⚙️ 庫存品項</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <h2 class="font-bold text-xl text-blue-600 mb-4 no-screenshot">電腦配置區</h2>
                    <div id="configRows" class="grid grid-cols-1 gap-1"></div>
                </div>
            </div>
            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-24 space-y-4">
                    <input type="number" id="discountAmt" class="w-full" value="0" placeholder="折扣金額" oninput="calculate()">
                    <div class="border-t pt-2">
                        <div class="flex justify-between text-2xl font-black text-blue-600"><span>總計</span><span id="ui-totalSale">$0</span></div>
                    </div>
                    <button onclick="saveRecord('draft')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">儲存草稿</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">📸 生成截圖</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-drafts" class="page-content hidden"><div id="draftList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
    <div id="tab-orders" class="page-content hidden"><div id="orderList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-xl">⚙️ 品項管理</h2>
                <button onclick="saveInventory()" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold">儲存同步</button>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let inv = {}; let catOrder = []; let currentSelections = {}; let records = [];

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

// 品項管理編輯 (補回缺貨切換)
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border";
        sec.innerHTML = `<h3 class="font-bold text-blue-600 mb-2">${cat}</h3><div id="edit-${cat}" class="space-y-2"></div>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = `p-2 rounded border relative ${item.outOfStock?'bg-gray-100':''}`;
            row.innerHTML = `
                <div class="text-xs font-bold">${item.name}</div>
                <div class="flex gap-2 mt-1">
                    <button onclick="toggleStock('${cat}', ${idx})" class="text-[10px] px-2 py-1 rounded ${item.outOfStock?'bg-red-500 text-white':'bg-gray-200'}">
                        ${item.outOfStock?'缺貨中':'有庫存'}
                    </button>
                    <button onclick="if(confirm('刪除？')) { inv['${cat}'].splice(${idx},1); renderInventoryEditor(); }" class="text-[10px] px-2 py-1 bg-gray-100 rounded">刪除</button>
                </div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}

function toggleStock(cat, idx) {
    inv[cat][idx].outOfStock = !inv[cat][idx].outOfStock;
    renderInventoryEditor();
}

function saveInventory() { db.ref('inventory').set(inv).then(()=>alert('同步成功')); }

// 正式訂單 (補回缺貨品項提醒)
function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        // 檢查是否有缺貨品項邏輯
        let stockAlert = "";
        if(r.selections) {
            for(let cat in r.selections) {
                r.selections[cat].forEach(sel => {
                    const item = (inv[cat] || [])[sel.idx];
                    if(item && item.outOfStock) stockAlert += `<div class="text-[10px] text-red-500 font-bold">⚠️ 缺貨：${item.name}</div>`;
                });
            }
        }

        const card = `
            <div class="card p-4 border-l-4 ${r.status==='order'?'border-green-500':'border-blue-400'}">
                <div class="flex justify-between">
                    <div>
                        <div class="text-xs text-gray-400">${r.time}</div>
                        <div class="font-bold">${r.name || '客戶'}</div>
                        <div class="text-blue-600 font-black">${r.total}</div>
                        ${stockAlert}
                    </div>
                    <div class="no-screenshot">
                        <select onchange="db.ref('records/${r.id}/seller').set(this.value)" class="text-xs border">
                            <option>朱冠穎</option><option>江苙翔</option>
                        </select>
                    </div>
                </div>
            </div>`;
        if(r.status==='draft') dList.innerHTML += card; else oList.innerHTML += card;
    });
}

function calculate() {
    let subP = 0; const disc = parseFloat(document.getElementById('discountAmt').value || 0);
    catOrder.forEach(cat => { (currentSelections[cat] || []).forEach(sel => { const item = (inv[cat] || [])[sel.idx]; if(item) subP += (Number(item.p) * (sel.qty || 1)); }); });
    document.getElementById('ui-totalSale').innerText = `$${(subP - disc).toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return; container.innerHTML = '';
    catOrder.forEach(cat => {
        const sels = currentSelections[cat] || [];
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${sels.length===0?'empty-row':''}" onclick="showTab('inventory')">
            <div class="text-[10px] font-bold text-gray-400 uppercase">${cat}</div>
            <div class="text-sm">${sels.length > 0 ? '已選擇' : '尚未選擇'}</div>
        </div>`;
    });
    calculate();
}

function showTab(t) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
    document.getElementById('tab-'+t).classList.remove('hidden');
    if(t === 'inventory') renderInventoryEditor();
}

function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); }
function saveRecord(status) {
    const id = Date.now();
    db.ref('records/' + id).set({ id, status, time: new Date().toLocaleString(), name: document.getElementById('custName').value, total: document.getElementById('ui-totalSale').innerText, selections: currentSelections });
}
</script>
</body>
</html>
