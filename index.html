<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pcquote 專業報價管理系統 - 完整版</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* 保持原本的專業風格，不縮減樣式 */
        :root { --main-bg: #f8f9fa; --primary: #2c3e50; --accent: #3498db; }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background-color: var(--main-bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header-section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 24px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* 搜尋欄位 */
        .search-area { margin: 20px 0; display: flex; gap: 10px; }
        #searchInput { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }

        /* 資料卡片與收合邏輯樣式 */
        .quote-card { background: white; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e0e0e0; transition: all 0.3s ease; }
        .quote-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        /* 修正後的收合按鈕區塊 */
        .card-header { 
            padding: 15px 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff;
            border-radius: 8px;
        }
        .card-header.active { background: #f0f7ff; border-bottom: 1px solid #d1e3f8; border-radius: 8px 8px 0 0; }
        
        .info-tag { font-size: 14px; color: #666; }
        .price-tag { color: #e74c3c; font-weight: bold; font-size: 18px; }
        .arrow-icon { transition: transform 0.3s; color: #999; font-size: 12px; }
        .active .arrow-icon { transform: rotate(180deg); }

        /* 收合內容區 */
        .card-content { 
            display: none; /* 預設完全不顯示 */
            padding: 20px; 
            background: #ffffff; 
        }
        .card-content.show { display: block; }

        /* 表格樣式 - 確保所有細節都在 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #f1f3f5; color: #495057; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; }
        .total-row { text-align: right; padding-top: 15px; font-size: 1.1rem; }

        /* 讀取中提示 */
        #loader { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>📦 Pcquote 專業報價與庫存管理系統</h1>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="🔍 搜尋客戶姓名、單號或產品..." onkeyup="handleSearch()">
        </div>
    </div>

    <div id="data-list">
        <div id="loader">🔄 正在連線至雲端資料庫，請稍候...</div>
    </div>
</div>

<script>
    // --- 2. 完整資料救援：Firebase 配置 (請在此填入你原本的密鑰) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    // 初始化
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- 3. 救回資料庫核心：指向正確的路徑 ---
    // 注意：如果你的資料是存在 'orders' 或 'inventory'，請把下面引號內容改掉
    const dbPath = 'quotes'; 
    const quotesRef = database.ref(dbPath);

    // 即時監聽資料
    quotesRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            renderQuotes(data);
        } else {
            document.getElementById('data-list').innerHTML = `
                <div style="background:white; padding:40px; text-align:center; border-radius:10px;">
                    <p style="color:#e74c3c; font-size:18px;">⚠️ 找不到資料！</p>
                    <p>請檢查 Firebase 控制台中的路徑是否為 <b>"${dbPath}"</b>，<br>並確認 Rules 權限是否已開啟。</p>
                </div>`;
        }
    }, (error) => {
        console.error("讀取失敗：", error);
        alert("資料庫讀取失敗，請檢查網路或 Firebase 規則設定。");
    });

    // --- 4. 完整的渲染邏輯 (不刪減任何資訊) ---
    function renderQuotes(data) {
        const listArea = document.getElementById('data-list');
        let html = '';

        // 將物件轉為陣列並由新到舊排序
        const keys = Object.keys(data).reverse();

        keys.forEach(key => {
            const item = data[key];
            const totalPrice = item.total || 0;
            const customer = item.customer || '未載明客戶';
            const date = item.date || '無日期';

            html += `
                <div class="quote-card" id="card-${key}">
                    <div class="card-header" onclick="toggleCard('${key}')">
                        <div>
                            <span class="info-tag">#${key}</span>
                            <strong style="margin-left:10px; font-size:17px;">${customer}</strong>
                            <span class="info-tag" style="margin-left:15px;">📅 ${date}</span>
                        </div>
                        <div>
                            <span class="price-tag">$${totalPrice.toLocaleString()}</span>
                            <span class="arrow-icon" id="arrow-${key}" style="margin-left:15px;">▼</span>
                        </div>
                    </div>
                    <div class="card-content" id="content-${key}">
                        <table>
                            <thead>
                                <tr>
                                    <th>產品項目</th>
                                    <th style="width:80px;">數量</th>
                                    <th style="width:120px;">單價</th>
                                    <th style="width:120px;">小計</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(item.items || []).map(prod => `
                                    <tr>
                                        <td>${prod.name || '不明產品'}</td>
                                        <td>${prod.qty || 0}</td>
                                        <td>$${(prod.price || 0).toLocaleString()}</td>
                                        <td>$${((prod.qty || 0) * (prod.price || 0)).toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div class="total-row">
                            <hr style="border:0; border-top:1px solid #eee;">
                            <strong>總計： <span style="color:#e74c3c; font-size:20px;">$${totalPrice.toLocaleString()}</span></strong>
                        </div>
                    </div>
                </div>
            `;
        });
        listArea.innerHTML = html;
    }

    // --- 5. 核心修復：絕對穩定的收合函數 ---
    function toggleCard(id) {
        const content = document.getElementById(`content-${id}`);
        const header = document.querySelector(`#card-${id} .card-header`);
        const arrow = document.getElementById(`arrow-${id}`);

        // 檢查目前是否已顯示
        const isOpen = content.classList.contains('show');

        // 先關閉所有其他的 (如果你想一次只開一個，可以解除下面註釋)
        // document.querySelectorAll('.card-content').forEach(c => c.classList.remove('show'));
        // document.querySelectorAll('.card-header').forEach(h => h.classList.remove('active'));

        if (isOpen) {
            content.classList.remove('show');
            header.classList.remove('active');
        } else {
            content.classList.add('show');
            header.classList.add('active');
        }
    }

    // --- 6. 搜尋功能 ---
    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.quote-card');

        cards.forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(term) ? 'block' : 'none';
        });
    }
</script>

</body>
</html>
