<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-top: 20px !important; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .invisible { visibility: hidden !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; outline: none; }
        .item-row:hover { background-color: #f8fafc; }
        .selected-badge { color: #1e293b; font-size: 14px; margin-right: 12px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
        .price-tag { color: #64748b; font-weight: 500; }
        
        /* 隱藏單價的樣式 */
        .hide-prices .price-tag { display: none !important; }

        #screenshotNav { position: fixed; bottom: 30px; left: 20px; z-index: 9999999; display: none; }
        .screenshot-mode #screenshotNav { display: block !important; }
        #screenshotNav button { font-size: 14px; padding: 12px 24px; border-radius: 50px; background: rgba(30, 41, 59, 0.9); color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }

        #screenshot-header, #screenshot-footer { display: none; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode body { background: #fff !important; padding-top: 20px !important; }
        .screenshot-mode #mainBody { background: #fff !important; padding: 20px !important; }
        .screenshot-mode .max-w-7xl { max-width: 750px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 1px solid #eee !important; border-radius: 10px !important; padding: 1rem !important; }
        .screenshot-mode #screenshot-header { display: flex !important; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; }
        .screenshot-mode .ss-title { font-size: 2rem; font-weight: 900; color: #1e3a8a; letter-spacing: 8px; }
        .screenshot-mode #ss-time { font-size: 0.85rem; color: #666; margin-top: 5px; }
        .screenshot-mode #screenshot-footer { display: block !important; margin-top: 25px; border-top: 2px solid #3b82f6; padding-top: 15px; }
        .ss-amount-row { font-size: 1rem; font-weight: 600; color: #475569; display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 4px; }
        .ss-total-row { font-size: 1.8rem; font-weight: 900; color: #1d4ed8; display: flex; justify-content: flex-end; align-items: baseline; gap: 10px; margin-top: 10px; }

        /* 雲端管理介面修正：防止凸出 */
        .inv-item-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 10px; border-radius: 10px; border: 1px solid #f1f5f9; background: #fff; position: relative; }
        .inv-item-row:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .inv-out-of-stock { background-color: #fff1f2 !important; border-color: #fecdd3 !important; }
        .stock-btn { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: bold; border: 1px solid #e2e8f0; }
        .stock-btn.active { background: #22c55e; color: white; border-color: #22c55e; }
        .stock-btn.oos { background: #ef4444; color: white; border-color: #ef4444; }

        .pick-item { transition: all 0.2s; border: 1px solid #f1f5f9; cursor: pointer; border-radius: 8px; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; }
    </style>
</head>

<div id="deliveryModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[1000] backdrop-blur-sm">
    <div class="bg-white rounded-2xl max-w-xl w-full max-h-[80vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="p-5 border-b flex justify-between items-center bg-orange-500 text-white"><h3 class="font-bold text-lg">📦 出貨品項勾選</h3><button onclick="closeDeliveryModal()" class="text-3xl font-bold">×</button></div>
        <div id="deliveryList" class="overflow-y-auto flex-1 p-5 space-y-3 bg-gray-50"></div>
        <div class="p-5 border-t"><button onclick="closeDeliveryModal()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">更新並返回</button></div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; let editingRecordId = null; let currentCat = ""; let currentStatus = 'draft'; let isSellerMode = true;

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => { records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); } renderRecords(); });

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    if(noCard > 0) { document.getElementById('ui-noCardVal').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ui-noCardShow').classList.remove('hidden'); } else { document.getElementById('ui-noCardShow').classList.add('hidden'); }
    const baseRevenue = noCard > 0 ? noCard : finalSale;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${(baseRevenue - subC).toLocaleString()}`;
    document.getElementById('ss-time').innerText = `報價日期：${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}`;
    document.getElementById('ss-discount').innerText = `-$${disc.toLocaleString()}`;
    document.getElementById('ss-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ss-total').innerText = `$${finalSale.toLocaleString()}`;
    if(noCard > 0) { document.getElementById('ss-nocard-val').innerText = `$${noCard.toLocaleString()}`; document.getElementById('ss-nocard-row').classList.remove('hidden'); } else { document.getElementById('ss-nocard-row').classList.add('hidden'); }
}

function renderConfig() {
    const container = document.getElementById('configRows');
    const isSS = document.getElementById('mainBody').classList.contains('screenshot-mode');
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        if (isSS && items.length === 0) return;
        const badges = items.map(sel => {
            let target = sel.isTemp ? sel : (inv[cat] || [])[sel.idx];
            if(!target) return '';
            return `<div class="selected-badge">${sel.isGift?'<span class="text-red-500 font-black">[贈] </span>':''}${target.name}${sel.qty>1?`<span class="bg-gray-200 px-1.5 rounded ml-1 text-xs">x${sel.qty}</span>`:''} <span class="price-tag ml-2 text-xs">($${Number(target.p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="py-4 item-row cursor-pointer transition" onclick="openSelection('${cat}')"><div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">${cat}</div><div class="flex flex-wrap gap-2">${badges || '<span class="text-gray-300 italic text-sm no-screenshot">尚未選擇品項...</span>'}</div></div>`;
    });
    calculate();
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const progressList = ["待處理", "組裝中", "測試中", "已完工", "已寄出"];
        const pOpts = progressList.map(p => `<option value="${p}" ${r.progress===p?'selected':''}>${p}</option>`).join('');
        const div = `<div class="p-5 border rounded-2xl bg-white shadow-sm hover:shadow-md transition">
            <div class="flex justify-between items-start mb-4">
                <div><div class="text-[10px] text-gray-400 font-bold mb-1">${r.time}</div><div class="text-lg font-black text-gray-800">${r.name || '未填寫客戶'}</div><div class="text-blue-600 font-black text-2xl mt-1">${r.total}</div></div>
                <div class="text-right"><span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-full font-bold">${r.seller||'無業務'}</span><div class="mt-2"><select onchange="db.ref('records/'+${r.id}+'/progress').set(this.value)" class="text-[10px] border-none bg-gray-100 rounded-lg px-2 py-1">${pOpts}</select></div></div>
            </div>
            <div class="flex gap-2 pt-3 border-t border-dashed">
                <button onclick="editRecord(${r.id})" class="flex-1 py-2 bg-blue-600 text-white text-xs rounded-xl font-bold">編輯配單</button>
                ${r.status === 'draft' ? `<button onclick="if(confirm('確認轉為正式訂單？')) db.ref('records/'+${r.id}+'/status').set('order')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">✅ 轉正式</button>` : `<button onclick="openDeliveryFast(${r.id})" class="flex-1 py-2 bg-orange-500 text-white text-xs rounded-xl font-bold shadow-sm">📦 出貨勾選</button>`}
                <button onclick="if(confirm('確定刪除？')) db.ref('records/'+${r.id}).remove()" class="px-2 text-red-300 hover:text-red-500 text-sm">✕</button>
            </div></div>`;
        if(r.status === 'draft') dList.innerHTML += div; else if(r.status === 'completed') cList.innerHTML += div; else oList.innerHTML += div;
    });
}

// 2. 雲端管理介面修正：優化間距與彈性排版
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-gray-50 p-4 rounded-2xl border border-gray-100 relative mb-4";
        sec.innerHTML = `
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div class="flex flex-col text-[10px] text-gray-300"><button onclick="moveCat(${cIdx}, -1)">▲</button><button onclick="moveCat(${cIdx}, 1)">▼</button></div>
                <input class="font-black text-lg text-blue-600 border-none bg-transparent p-0 w-48 focus:ring-0" value="${cat}" onchange="renameCat(${cIdx}, this.value)">
            </div>
            <button onclick="removeCat(${cIdx})" class="text-red-300 hover:text-red-500 text-2xl">×</button>
        </div>
        <div id="edit-${cat}" class="grid grid-cols-1 gap-2"></div>
        <button onclick="addInvItem('${cat}')" class="w-full text-[11px] bg-white mt-4 py-2 rounded-xl border-dashed border-2 text-gray-400 hover:text-blue-500 transition">+ 新增零件</button>`;
        area.appendChild(sec);
        
        const items = inv[cat] || [];
        items.forEach((item, idx) => {
            const row = document.createElement('div'); 
            row.className = `inv-item-row ${item.outOfStock ? 'inv-out-of-stock' : ''}`;
            row.innerHTML = `
                <div class="flex flex-col text-[8px] text-gray-300 px-1"><button onclick="moveItem('${cat}', ${idx}, -1)">▲</button><button onclick="moveItem('${cat}', ${idx}, 1)">▼</button></div>
                <input class="flex-grow min-w-[120px] text-sm font-bold bg-transparent border-none focus:ring-0" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <div class="flex items-center gap-2 ml-auto">
                    <div class="flex items-center gap-1 border rounded bg-white px-2 py-1"><span class="text-[9px] text-gray-400">售</span><input type="number" class="w-12 text-xs font-bold text-blue-600 border-none p-0" value="${item.p}" onchange="inv['${cat}'][${idx}].p=Number(this.value)"></div>
                    <div class="flex items-center gap-1 border rounded bg-white px-2 py-1"><span class="text-[9px] text-gray-400">本</span><input type="number" class="w-12 text-xs font-bold text-red-400 border-none p-0" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=Number(this.value)"></div>
                    <button onclick="inv['${cat}'][${idx}].outOfStock=!inv['${cat}'][${idx}].outOfStock; renderInventoryEditor();" class="stock-btn ${item.outOfStock?'oos':'active'}">${item.outOfStock?'缺貨':'供應'}</button>
                    <button onclick="inv['${cat}'].splice(${idx}, 1); renderInventoryEditor();" class="text-red-200 hover:text-red-500 text-lg">×</button>
                </div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}

function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t==='inventory') renderInventoryEditor(); }

// 1. 管理員模式切換（隱藏利潤與細項金額）
function toggleAdminMode() { 
    const box = document.getElementById('sellerBox');
    const body = document.getElementById('mainBody');
    const isChecked = document.getElementById('adminToggle').checked;
    
    if(isChecked) {
        box.classList.remove('invisible');
        body.classList.remove('hide-prices');
    } else {
        box.classList.add('invisible');
        body.classList.add('hide-prices');
    }
}

function enterScreenshotMode() { document.getElementById('mainBody').classList.add('screenshot-mode'); renderConfig(); }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); renderConfig(); }
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = '🔍 選擇 ' + cat; document.getElementById('selectionModal').classList.remove('hidden'); document.getElementById('modalSearch').value = ''; renderModalList(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function filterModalList() { const q = document.getElementById('modalSearch').value.toLowerCase(); document.querySelectorAll('.pick-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = '';
    const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-4 flex justify-between items-center mb-2 ${sel?'active':''} ${item.outOfStock?'opacity-50 pointer-events-none':''}" onclick="togglePick(${idx})">
            <div class="flex-1"><div class="font-bold text-gray-800">${item.outOfStock?'[缺貨] ':''}${item.name}</div><div class="text-sm text-blue-500 font-black mt-1">$${Number(item.p).toLocaleString()}</div></div>
            ${sel ? `<div class="flex items-center gap-4" onclick="event.stopPropagation()"><label class="text-xs flex items-center gap-1 font-bold"><input type="checkbox" class="w-4 h-4" ${sel.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked)"> 贈</label><div class="flex items-center border-2 border-blue-200 rounded-xl bg-white overflow-hidden"><button class="px-3 py-1 bg-blue-50 font-bold" onclick="updateSubItem(${idx}, 'qty', -1)">-</button><span class="px-3 text-sm font-black text-blue-600">${sel.qty || 1}</span><button class="px-3 py-1 bg-blue-50 font-bold" onclick="updateSubItem(${idx}, 'qty', 1)">+</button></div></div>` : ''}</div>`;
    });
}

function togglePick(idx) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function updateSubItem(idx, type, val) {
    const sel = (currentSelections[currentCat] || []).find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val);
    if(type==='gift') sel.isGift = val;
    renderConfig(); renderModalList();
}
function saveRecord(st) { 
    if(!document.getElementById('custName').value) { alert('請填寫客戶名稱'); return; }
    const id = editingRecordId || Date.now();
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, seller: document.getElementById('infoSeller').value, selections: currentSelections, total: document.getElementById('ui-totalSale').innerText, noCard: document.getElementById('noCardTotal').value, status: st === 'current' ? currentStatus : st, discount: document.getElementById('discountAmt').value, progress: "待處理" };
    db.ref('records/' + id).update(r).then(() => { alert('存檔成功'); resetForm(); showTab(st === 'order' ? 'orders' : 'drafts'); });
}
function editRecord(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name || ''; document.getElementById('discountAmt').value = r.discount || 0; document.getElementById('noCardTotal').value = r.noCard || '';
    if(r.status === 'draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); else document.getElementById('btnConvertToOrder').classList.add('hidden');
    renderConfig(); showTab('calc');
}
function addTempItem() {
    const n = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value, c = document.getElementById('tempCost').value;
    if(!n) return;
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({name:n, p:Number(p), c:Number(c), isGift:false, qty:1, isTemp: true});
    renderConfig(); renderModalList();
    document.getElementById('tempName').value = '';
}
function openDeliveryFast(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    let tempDeliv = r.deliveredItems || {};
    const list = document.getElementById('deliveryList'); list.innerHTML = '';
    for (let cat in r.selections) {
        r.selections[cat].forEach((sel, idx) => {
            const k = `${cat}_${idx}`; const isD = tempDeliv[k] !== false;
            let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知品項");
            list.innerHTML += `<div class="flex justify-between items-center p-4 border rounded-xl bg-white shadow-sm"><div class="text-sm font-bold text-gray-700">${n}</div><input type="checkbox" class="w-6 h-6 rounded text-orange-500" ${isD?'checked':''} onchange="db.ref('records/'+${id}+'/deliveredItems/${k}').set(this.checked)"></div>`;
        });
    }
    document.getElementById('deliveryModal').classList.remove('hidden');
}
function saveInventory() { if(confirm('同步至雲端？')) { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder); alert('已更新'); } }
function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input').forEach(i=>i.value=""); renderConfig(); }
function moveCat(idx, dir) { let newIdx = idx + dir; if (newIdx < 0 || newIdx >= catOrder.length) return; [catOrder[idx], catOrder[newIdx]] = [catOrder[newIdx], catOrder[idx]]; renderInventoryEditor(); }
function moveItem(cat, idx, dir) { let newIdx = idx + dir; if (newIdx < 0 || newIdx >= inv[cat].length) return; [inv[cat][idx], inv[cat][newIdx]] = [inv[cat][newIdx], inv[cat][idx]]; renderInventoryEditor(); }
function addNewCategory() { const n = prompt("新大項："); if(n) { catOrder.push(n); inv[n] = []; renderInventoryEditor(); } }
function addInvItem(c) { if(!inv[c]) inv[c] = []; inv[c].push({name: "新零件", p: 0, c: 0, outOfStock: false}); renderInventoryEditor(); }
function removeCat(idx) { if(confirm('確定刪除？')) { delete inv[catOrder[idx]]; catOrder.splice(idx,1); renderInventoryEditor(); } }
function renameCat(idx, newName) { const old = catOrder[idx]; inv[newName] = inv[old]; delete inv[old]; catOrder[idx] = newName; }
function addCustomSeller() { const n = prompt("業務名："); if(n) { const s = document.getElementById('infoSeller'); const o = document.createElement('option'); o.value=n; o.text=n; o.selected=true; s.add(o); } }
function exitToOrdersWithoutSaving() { if(confirm('放棄返回？')) { resetForm(); showTab('drafts'); } }
function closeDeliveryModal() { document.getElementById('deliveryModal').classList.add('hidden'); }
window.onload = () => renderConfig();
</script>
</body>
</html>
