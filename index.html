<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding-top: env(safe-area-inset-top); }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; border-color: #3b82f6; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        
        #screenshot-header, #screenshot-footer { display: none; }
        .hide-price .price-tag { display: none !important; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 40px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 2px solid #334155 !important; border-radius: 0 !important; padding: 2rem !important; }
        .screenshot-mode .item-row { border: none; border-bottom: 1px dashed #ccc; padding: 8px 0; }
        .screenshot-mode .item-row.empty-row { display: none !important; visibility: hidden !important; height: 0 !important; }
        
        .pick-item { transition: all 0.2s; border: 2px solid #e5e7eb; cursor: pointer; border-radius: 10px; }
        .pick-item.active { background-color: #eff6ff; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .is-out-of-stock { opacity: 0.4; background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #64748b !important; }

        .status-badge { font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .status-待處理 { background: #fee2e2; color: #ef4444; }
        .status-組裝中 { background: #fef3c7; color: #d97706; }
        .status-測試中 { background: #e0f2fe; color: #0284c7; }
        .status-已完工 { background: #dcfce7; color: #16a34a; }
        .status-已寄出 { background: #f3f4f6; color: #4b5563; }

        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } }
    </style>
</head>

<div id="shippingModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-hidden flex flex-col">
        <div class="p-4 border-b bg-gray-50 flex justify-between items-center"><h3 class="font-bold text-gray-700">📦 品項出貨/缺件管理</h3><button onclick="closeShippingModal()" class="text-gray-400 text-2xl">&times;</button></div>
        <div id="shippingList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t"><button onclick="closeShippingModal()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">更新完成</button></div>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; let trashInv = [];
let editingRecordId = null; let currentCat = ""; let isSellerMode = true; let currentStatus = 'draft';

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt')?.value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            let p = 0, c = 0;
            if (s.isTemp) { p = Number(s.p || 0); c = Number(s.c || 0); } 
            else { const item = (inv[cat] || [])[s.idx]; if(item) { p = Number(item.p || 0); c = Number(item.c || 0); } }
            if(!s.isGift) subP += (p * (s.qty || 1)); subC += (c * (s.qty || 1));
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    const profit = noCard > 0 ? (noCard - subC) : (finalSale - subC);
    document.getElementById('ui-totalProfit').innerText = `$${profit.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return;
    container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const badges = items.map(sel => {
            let name = "", p = 0;
            if(sel.isTemp) { name = sel.name; p = sel.p; } 
            else { const target = (inv[cat] || [])[sel.idx]; if(!target) return ''; name = target.name; p = target.p; }
            return `<div class="selected-badge">${sel.isGift?'[贈]':''}${name}${sel.qty>1?` x${sel.qty}`:''} <span class="price-tag text-blue-500 ml-1">($${Number(p).toLocaleString()})</span></div>`;
        }).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${!isSellerMode?'hide-price':''} ${items.length===0?'empty-row':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function updateField(id, field, value) { db.ref(`records/${id}/${field}`).set(value); }

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList'), cList = document.getElementById('completedList');
    dList.innerHTML = ''; oList.innerHTML = ''; cList.innerHTML = '';
    
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const sellers = ["未選擇", "朱冠穎", "江鈞宇", "江苙翔"];
        const statuses = ["待處理", "組裝中", "測試中", "已完工", "已寄出"];
        const sOpts = sellers.map(s => `<option value="${s}" ${r.seller===s?'selected':''}>${s}</option>`).join('');
        const pOpts = statuses.map(s => `<option value="${s}" ${r.progress===s?'selected':''}>${s}</option>`).join('');
        
        let missingItems = [];
        if(r.deliveredItems) {
            for(let key in r.deliveredItems) {
                if(r.deliveredItems[key] === false) {
                    const [cat, idx] = key.split('_');
                    const sel = r.selections[cat][idx];
                    let n = sel.isTemp ? sel.name : (inv[cat] && inv[cat][sel.idx] ? inv[cat][sel.idx].name : "未知");
                    missingItems.push(n);
                }
            }
        }

        const priceDisplay = (r.noCard && Number(r.noCard)>0) 
            ? `<div class="text-gray-400 text-xs line-through">原計: ${r.total}</div><div class="text-orange-600 font-black">分期: $${Number(r.noCard).toLocaleString()}</div>`
            : `<div class="text-blue-600 font-black">${r.total}</div>`;

        const div = `<div class="p-4 border-2 rounded-xl bg-white flex flex-col gap-3 shadow-sm relative ${missingItems.length>0?'border-red-400':'border-transparent'}">
            <div class="absolute top-4 right-4 text-right">
                ${r.completedTime ? `<div class="text-[9px] text-gray-400 font-bold bg-gray-100 px-2 rounded mb-1">完成: ${r.completedTime}</div>` : ''}
            </div>
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="text-[10px] text-gray-400 font-bold">${r.time}</div>
                    <div class="text-sm font-bold text-gray-700">[${r.source||'無'}] ${r.name}</div>
                    ${priceDisplay}
                    ${missingItems.length > 0 ? `<div class="mt-2 text-[11px] text-red-600 font-black bg-red-50 p-2 rounded border border-red-100 italic">⚠️ 未出貨：${missingItems.join(', ')}</div>` : ''}
                </div>
                <div class="flex flex-col items-end gap-2 pr-2">
                    <select onchange="updateField(${r.id}, 'seller', this.value)" class="text-xs p-1 bg-gray-50 border rounded w-24">${sOpts}</select>
                    <select onchange="updateField(${r.id}, 'progress', this.value)" class="text-xs p-1 bg-blue-50 border-blue-100 text-blue-700 rounded w-24 font-bold">${pOpts}</select>
                </div>
            </div>
            <div class="flex gap-2 border-t pt-2">
                <button onclick="editRecord(${r.id})" class="flex-1 py-1 bg-blue-500 text-white text-xs rounded font-bold">${r.status==='completed'?'查看':'編輯'}</button>
                ${r.status==='order' ? `<button onclick="openShippingManager(${r.id})" class="flex-1 py-1 bg-orange-500 text-white text-xs rounded font-bold">📦 出貨管理</button>` : ''}
                ${r.status==='order' ? `<button onclick="archiveOrder(${r.id})" class="flex-1 py-1 bg-green-600 text-white text-xs rounded font-bold">🏁 結案歸檔</button>` : ''}
                <button onclick="if(confirm('確定刪除？')) db.ref('records/'+${r.id}).remove()" class="px-3 py-1 bg-red-50 text-red-400 text-xs rounded font-bold">刪除</button>
            </div>
        </div>`;
        
        if(r.status === 'draft') dList.innerHTML += div; 
        else if(r.status === 'completed') cList.innerHTML += div;
        else oList.innerHTML += div;
    });
    document.getElementById('count-draft').innerText = records.filter(r=>r.status==='draft').length;
    document.getElementById('count-order').innerText = records.filter(r=>r.status==='order').length;
    document.getElementById('count-completed').innerText = records.filter(r=>r.status==='completed').length;
}

function archiveOrder(id) {
    if(confirm('確定結案並移至「已結案」區域嗎？')) {
        const now = new Date();
        const t = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        db.ref(`records/${id}`).update({ status: 'completed', completedTime: t });
    }
}

function openShippingManager(id) {
    const r = records.find(x => x.id === id); if(!r) return;
    editingRecordId = id; const list = document.getElementById('shippingList'); list.innerHTML = '';
    if(!r.deliveredItems) r.deliveredItems = {};
    for(let cat in r.selections) {
        r.selections[cat].forEach((sel, i) => {
            const key = `${cat}_${i}`; const isDel = r.deliveredItems[key] !== false;
            let name = sel.isTemp ? sel.name : ((inv[cat] && inv[cat][sel.idx]) ? inv[cat][sel.idx].name : "未知");
            list.innerHTML += `<div class="flex justify-between items-center p-3 border rounded-lg ${isDel?'bg-gray-50':'bg-red-50 border-red-200'}">
                <div><div class="text-[10px] font-bold text-gray-400">${cat}</div><div class="text-sm font-bold ${isDel?'':'text-red-700'}">${name}</div></div>
                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="w-6 h-6" ${isDel?'checked':''} onchange="db.ref('records/${id}/deliveredItems/${key}').set(this.checked)"> <span class="text-xs font-bold">${isDel?'已出貨':'未出貨'}</span></label>
            </div>`;
        });
    }
    document.getElementById('shippingModal').classList.remove('hidden');
}

function closeShippingModal() { document.getElementById('shippingModal').classList.add('hidden'); editingRecordId=null; }
function filterModalList() { const term = document.getElementById('modalSearch').value.toLowerCase(); document.querySelectorAll('#modalList .pick-item').forEach(item => { item.style.display = item.innerText.toLowerCase().includes(term) ? 'flex' : 'none'; }); }

function renderModalList() {
    const list = document.getElementById('modalList'); list.innerHTML = ''; const selections = currentSelections[currentCat] || [];
    (inv[currentCat] || []).forEach((item, idx) => {
        const sel = selections.find(s => !s.isTemp && s.idx === idx);
        list.innerHTML += `<div class="pick-item p-3 rounded-lg flex justify-between items-center mb-1 ${sel?'active':''} ${item.outOfStock?'is-out-of-stock':''}" onclick="togglePick(${idx}, false)">
            <div class="flex-1"><div class="font-bold text-sm">${item.outOfStock?'(缺貨) ':''}${item.name}</div><div class="text-xs text-blue-500 font-bold">$${Number(item.p).toLocaleString()}</div></div>
            <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                <label class="text-xs flex items-center gap-1 cursor-pointer"><input type="checkbox" ${sel?.isGift?'checked':''} onchange="updateSubItem(${idx}, 'gift', this.checked, false)"> 贈</label>
                <div class="flex items-center border rounded bg-white overflow-hidden shadow-sm">
                    <button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', -1, false)">-</button>
                    <span class="px-2 text-xs font-bold min-w-[20px] text-center">${sel?.qty || 1}</span>
                    <button class="px-2 py-1 bg-gray-50 text-xs font-bold" onclick="updateSubItem(${idx}, 'qty', 1, false)">+</button>
                </div>
            </div>
        </div>`;
    });
}

function togglePick(idx, isTemp) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => !s.isTemp && s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1, isTemp: false});
    renderConfig(); renderModalList();
}
function updateSubItem(idx, type, val, isTemp, tIdx) {
    if(!currentSelections[currentCat]) return;
    const selList = currentSelections[currentCat];
    const sel = isTemp ? selList.filter(s => s.isTemp)[tIdx] : selList.find(s => !s.isTemp && s.idx === idx);
    if(!sel) return;
    if(type==='qty') sel.qty = Math.max(1, (sel.qty||1)+val); if(type==='gift') sel.isGift = val;
    renderConfig(); renderModalList();
}
function addTempItem() {
    const name = document.getElementById('tempName').value, p = document.getElementById('tempPrice').value; if(!name||!p) return;
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    currentSelections[currentCat].push({ name, p, c: document.getElementById('tempCost').value||0, qty:1, isTemp:true });
    document.getElementById('tempName').value = ""; document.getElementById('tempPrice').value = ""; renderConfig(); renderModalList();
}
function removeTempItem(tIdx) { const all = currentSelections[currentCat], temps = all.filter(s=>s.isTemp); all.splice(all.indexOf(temps[tIdx]), 1); renderConfig(); renderModalList(); }
function openSelection(cat) { currentCat = cat; document.getElementById('modalTitle').innerText = `選擇 ${cat}`; document.getElementById('modalSearch').value = ''; renderModalList(); document.getElementById('selectionModal').classList.remove('hidden'); }
function saveRecord(targetStatus) {
    const id = editingRecordId || Date.now(), status = targetStatus === 'current' ? currentStatus : targetStatus;
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, source: document.getElementById('custSource').value, phone: document.getElementById('custPhone').value, addr: document.getElementById('custAddr').value, memo: document.getElementById('orderMemo').value, selections: currentSelections, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText, status, discount: document.getElementById('discountAmt').value };
    db.ref('records/' + id).update(r).then(() => { alert('儲存成功'); resetForm(); showTab('drafts'); });
}
function editRecord(id) {
    const r = records.find(x => x.id === id); editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name||''; document.getElementById('custPhone').value = r.phone||''; document.getElementById('custAddr').value = r.addr||''; document.getElementById('discountAmt').value = r.discount||0; document.getElementById('noCardTotal').value = r.noCard||'';
    if(r.status==='draft') document.getElementById('btnConvertToOrder').classList.remove('hidden'); else document.getElementById('btnConvertToOrder').classList.add('hidden');
    renderConfig(); showTab('calc');
}

// 核心修正: 排序按鈕回歸與垃圾桶邏輯
function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border relative";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2"><input class="font-bold text-blue-600 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)"><div class="flex gap-1"><button onclick="moveCat(${cIdx},-1)" class="text-xs bg-gray-100 p-1 rounded font-bold">↑</button><button onclick="moveCat(${cIdx},1)" class="text-xs bg-gray-100 p-1 rounded font-bold">↓</button><button onclick="removeCat(${cIdx})" class="text-red-300 ml-1">×</button></div></div><div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs border-dashed border-2 mt-2 py-1">+ 新增零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "bg-gray-50 p-2 rounded relative border";
            row.innerHTML = `<input type="text" class="text-xs font-bold w-full" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value"><div class="flex gap-1 mt-1"><input type="number" class="w-1/2 text-xs" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value"><input type="number" class="w-1/2 text-xs text-red-500" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=this.value"></div><div class="flex gap-2 mt-1 items-center"><button onclick="moveItem('${cat}', ${idx}, -1)" class="text-[9px] bg-white px-2 border font-bold">上移</button><button onclick="moveItem('${cat}', ${idx}, 1)" class="text-[9px] bg-white px-2 border font-bold">下移</button><label class="text-[9px] bg-gray-200 px-1 rounded cursor-pointer"><input type="checkbox" ${item.outOfStock?'checked':''} onchange="inv['${cat}'][${idx}].outOfStock=this.checked; db.ref('inventory').set(inv);"> 缺貨</label><button onclick="moveToTrash('${cat}',${idx})" class="absolute top-1 right-1 text-gray-300">×</button></div>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
    renderTrash();
}

function moveToTrash(cat, idx) { const item = inv[cat].splice(idx,1)[0]; trashInv.push({cat, item}); renderInventoryEditor(); }
function renderTrash() {
    const area = document.getElementById('trashContainer'); area.innerHTML = trashInv.length === 0 ? '<div class="text-gray-400 text-xs">尚無刪除紀錄</div>' : '';
    trashInv.forEach((t, i) => { area.innerHTML += `<div class="flex justify-between items-center bg-white p-2 border rounded text-xs mb-1"><span>[${t.cat}] ${t.item.name}</span><div class="flex gap-2"><button onclick="restoreFromTrash(${i})" class="text-blue-500 font-bold">救回</button><button onclick="trashInv.splice(${i},1); renderTrash();" class="text-red-400">刪除</button></div></div>`; });
}
function restoreFromTrash(i) { const t = trashInv.splice(i,1)[0]; if(!inv[t.cat]) inv[t.cat]=[]; inv[t.cat].push(t.item); renderInventoryEditor(); }

function moveCat(i, d) { let n = i+d; if(n>=0 && n<catOrder.length) { [catOrder[i], catOrder[n]] = [catOrder[n], catOrder[i]]; renderInventoryEditor(); } }
function moveItem(cat, i, d) { let n = i+d; if(n>=0 && n<inv[cat].length) { [inv[cat][i], inv[cat][n]] = [inv[cat][n], inv[cat][i]]; renderInventoryEditor(); } }
function addNewCategory() { const name = prompt("名稱"); if(name) { catOrder.push(name); inv[name]=[]; renderInventoryEditor(); } }
function removeCat(i) { if(confirm("確定刪除大項？")) { delete inv[catOrder[i]]; catOrder.splice(i,1); renderInventoryEditor(); } }
function renameCat(i, n) { const o = catOrder[i]; inv[n]=inv[o]; delete inv[o]; catOrder[i]=n; renderInventoryEditor(); }
function addInvItem(c) { if(!inv[c]) inv[c]=[]; inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('同步成功')); }

function enterScreenshotMode() { calculate(); document.getElementById('mainBody').classList.add('screenshot-mode'); document.getElementById('screenshotNav').style.display='flex'; }
function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('screenshotNav').style.display='none'; }
function exitToOrdersWithoutSaving() { if(confirm("返回？")) { resetForm(); showTab('drafts'); } }
function showTab(t) { document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById('btn-'+t).classList.add('tab-active'); if(t==='inventory') renderInventoryEditor(); }
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); document.getElementById('sellerBtn').innerText = `管理員模式: ${isSellerMode?'ON':'OFF'}`; renderConfig(); }
function resetForm() { editingRecordId=null; currentSelections={}; document.querySelectorAll('input:not([type="checkbox"])').forEach(i=>i.value=""); document.getElementById('btnConvertToOrder').classList.add('hidden'); renderConfig(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
window.onload = () => renderConfig();
</script>
</body>
</html>
