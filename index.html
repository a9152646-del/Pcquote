<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇海螺電競 | 專業報價與庫存系統 v7.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f4f9fc; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 14px; }
        .seller-bg { background-color: #eff6ff; }
        .item-row:hover { background-color: #f8fafc; border-color: #3b82f6; }
        .selected-badge { background: #f1f5f9; color: #334155; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid #e2e8f0; }
        
        /* 📸 截圖模式專業樣式 */
        .hide-price .price-tag { display: none !important; }
        #mainBody.screenshot-mode { background: #fff !important; padding: 40px 20px !important; }
        .screenshot-mode .no-screenshot { display: none !important; }
        .screenshot-mode .print-only { display: block !important; }
        .screenshot-mode .max-w-7xl { max-width: 800px !important; margin: 0 auto !important; }
        .screenshot-mode .card { box-shadow: none !important; border: 3px solid #1e293b !important; border-radius: 0 !important; width: 100% !important; padding: 2.5rem !important; }
        .screenshot-mode .item-row { border: none !important; border-bottom: 1px dashed #cbd5e1 !important; border-radius: 0 !important; padding: 12px 0 !important; }
        .screenshot-mode .item-row .text-blue-500 { color: #1e293b !important; font-weight: 800 !important; border-left: 5px solid #1e293b !important; padding-left: 10px !important; }
        .screenshot-mode .selected-badge { border: none !important; background: none !important; padding: 0 !important; font-size: 16px !important; color: #000 !important; }

        @media print { .no-print, button, #sellerBox, .no-screenshot { display: none !important; } }
        .print-only { display: none; }
    </style>
</head>
<body class="p-2 md:p-6" id="mainBody">

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDeCI3yFPr1v9KxOmko-qim2a7EtllEHKM",
  authDomain: "magic-conch-gaming.firebaseapp.com",
  databaseURL: "https://magic-conch-gaming-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "magic-conch-gaming",
  storageBucket: "magic-conch-gaming.firebasestorage.app",
  messagingSenderId: "105735978925",
  appId: "1:105735978925:web:3ec77acbfd344475322b24"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<div class="max-w-7xl mx-auto">
    <div class="flex border-b mb-6 no-screenshot overflow-x-auto bg-white sticky top-0 z-10">
        <button onclick="showTab('calc')" id="btn-calc" class="px-6 py-3 tab-active">🐚 報價配單</button>
        <button onclick="showTab('orders')" id="btn-orders" class="px-6 py-3">📋 訂單/草稿管理</button>
        <button onclick="showTab('inventory')" id="btn-inventory" class="px-6 py-3">⚙️ 品項庫管理</button>
    </div>

    <div id="tab-calc" class="page-content">
        <div class="print-only mb-6">
            <div class="flex justify-between items-end border-b-4 border-slate-800 pb-2">
                <div class="text-xs font-bold text-slate-500 italic" id="print-date">---</div>
                <div class="text-3xl font-black text-slate-800 tracking-[0.5em] flex-1 text-center pl-10">《報價單》</div>
                <div class="w-32"></div> </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-6 no-screenshot">
                        <h2 class="font-bold text-xl text-blue-600">電腦配置區</h2>
                        <button onclick="toggleSellerMode()" id="sellerBtn" class="text-xs bg-blue-100 text-blue-600 px-4 py-2 rounded-full font-bold">管理員模式: ON</button>
                    </div>
                    <div id="configRows" class="grid grid-cols-1 md:grid-cols-1 gap-1"></div>
                </div>

                <div class="card p-6 no-screenshot">
                    <h2 class="font-bold mb-4 border-b pb-2 text-gray-700">客戶資訊</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱">
                        <input type="text" id="custPhone" placeholder="電話">
                        <select id="custSource">
                            <option value="FB">Facebook</option>
                            <option value="IG">Instagram</option>
                            <option value="Line">Line</option>
                            <option value="其他">其他</option>
                        </select>
                        <input type="text" id="custAddr" placeholder="收件地址" class="md:col-span-4">
                        <textarea id="orderMemo" placeholder="內部備註" class="md:col-span-4 h-20 w-full"></textarea>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 no-screenshot">
                <div class="card p-6 sticky top-20">
                    <h3 class="font-bold border-b pb-2 mb-4 text-gray-600">報價總計</h3>
                    <div class="space-y-1 mb-4">
                        <div class="text-xs text-gray-400 font-bold">未稅總計</div><div id="ui-untaxed" class="text-xl font-bold text-gray-700">$0</div>
                        <div class="text-xs text-gray-400 font-bold">含稅總計</div><div id="ui-totalSale" class="text-4xl font-black text-blue-600">$0</div>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-gray-400 font-bold">折扣金額</label>
                        <input type="number" id="discountAmt" class="w-full mt-1" value="0" oninput="calculate()">
                    </div>

                    <div id="sellerBox" class="seller-bg p-4 rounded-lg mb-6 border border-blue-100 space-y-3">
                        <input type="number" id="noCardTotal" class="w-full mt-1 border-blue-200" placeholder="無卡分期金額" oninput="calculate()">
                        <div class="flex justify-between text-sm text-blue-500 border-t pt-2"><span>總成本</span><span id="ui-totalCost">$0</span></div>
                        <div class="flex justify-between text-lg font-bold text-green-600 border-t mt-2 pt-2"><span>預計淨利</span><span id="ui-totalProfit">$0</span></div>
                    </div>

                    <button onclick="saveRecord('current')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold mb-2">儲存/更新</button>
                    <button onclick="enterScreenshotMode()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold mb-2">📸 進入截圖模式</button>
                    <button onclick="showTab('orders')" class="w-full border border-gray-300 text-gray-500 py-3 rounded-xl font-bold">⬅️ 返回訂單列表</button>
                </div>
            </div>

            <div class="print-only mt-6 w-full">
                <div class="flex justify-end gap-10 text-sm font-bold text-slate-700">
                    <div id="print-disc-box">折扣金額：<span id="print-discount">-$0</span></div>
                    <div>未稅總計：<span id="print-untaxed">$0</span></div>
                </div>
                <div class="flex justify-end items-baseline mt-2">
                    <div class="text-lg font-black text-slate-900 mr-4 italic">TOTAL</div>
                    <div class="text-4xl font-black text-slate-900" id="print-total">$0</div>
                </div>
                <div class="mt-8 pt-4 border-t border-slate-200 text-center text-[10px] text-gray-400 uppercase tracking-widest">Thank you for your business.</div>
            </div>
        </div>
    </div>

    <div id="tab-orders" class="page-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card p-6"><h2 class="font-bold text-lg mb-4 text-orange-500 border-b pb-2">📂 雲端草稿 <span id="count-draft">0</span></h2><div id="draftList" class="space-y-4"></div></div>
            <div class="card p-6"><h2 class="font-bold text-lg mb-4 text-green-600 border-b pb-2">✅ 正式訂單 <span id="count-order">0</span></h2><div id="orderList" class="space-y-4"></div></div>
        </div>
    </div>

    <div id="tab-inventory" class="page-content hidden">
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-2xl text-gray-800">⚙️ 雲端品項管理</h2>
                <div class="flex gap-2">
                    <button onclick="addNewCategory()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold">+ 新增大項</button>
                    <button onclick="saveInventory()" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold">儲存並同步</button>
                </div>
            </div>
            <div id="inventoryEditor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<button id="exitBtn" onclick="exitScreenshotMode()" style="display: none; position: fixed; bottom: 30px; left: 30px; z-index: 999999;" class="bg-red-600 text-white px-8 py-4 rounded-full font-bold shadow-2xl">❌ 退出截圖模式</button>

<div id="selectionModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-hidden flex flex-col p-4">
        <div id="modalList" class="overflow-y-auto flex-1 space-y-2"></div>
        <button onclick="closeModal()" class="mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold">完成</button>
    </div>
</div>

<script>
let inv = {}; let catOrder = []; let records = []; let currentSelections = {}; 
let editingRecordId = null; let currentStatus = 'draft'; let isSellerMode = true;

db.ref('inventory').on('value', s => { if(s.exists()) inv = s.val(); renderConfig(); });
db.ref('catOrder').on('value', s => { if(s.exists()) catOrder = s.val(); renderConfig(); });
db.ref('records').on('value', s => {
    records = []; if(s.exists()) { const data = s.val(); for(let id in data) records.push(data[id]); }
    renderRecords();
});

function calculate() {
    let subP = 0, subC = 0, disc = parseFloat(document.getElementById('discountAmt').value || 0);
    let noCard = parseFloat(document.getElementById('noCardTotal').value) || 0;
    catOrder.forEach(cat => {
        (currentSelections[cat] || []).forEach(s => {
            const item = inv[cat][s.idx];
            if(item) {
                if(!s.isGift) subP += (Number(item.p) * (s.qty || 1));
                subC += (Number(item.c || 0) * (s.qty || 1));
            }
        });
    });
    const finalSale = subP - disc;
    const untaxed = Math.round(finalSale / 1.05);
    document.getElementById('ui-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('ui-totalSale').innerText = `$${finalSale.toLocaleString()}`;
    document.getElementById('ui-totalCost').innerText = `$${subC.toLocaleString()}`;
    document.getElementById('ui-totalProfit').innerText = `$${(noCard > 0 ? (noCard - subC) : (finalSale - subC)).toLocaleString()}`;
    
    // 截圖數值同步
    document.getElementById('print-discount').innerText = `-$${disc.toLocaleString()}`;
    document.getElementById('print-disc-box').style.display = disc > 0 ? 'block' : 'none';
    document.getElementById('print-untaxed').innerText = `$${untaxed.toLocaleString()}`;
    document.getElementById('print-total').innerText = `$${finalSale.toLocaleString()}`;
}

function renderConfig() {
    const container = document.getElementById('configRows'); if(!container) return; container.innerHTML = '';
    catOrder.forEach(cat => {
        const items = currentSelections[cat] || [];
        const badges = items.map(sel => `<div class="selected-badge">${sel.isGift?'[贈]':''}${inv[cat][sel.idx].name} <span class="price-tag text-blue-500">($${Number(inv[cat][sel.idx].p).toLocaleString()})</span></div>`).join('');
        container.innerHTML += `<div class="p-3 border-b item-row cursor-pointer ${!isSellerMode?'hide-price':''}" onclick="openSelection('${cat}')">
            <div class="text-[10px] font-black text-blue-500 uppercase">${cat}</div>
            <div class="mt-1 flex flex-wrap gap-1">${badges || '<span class="text-gray-300 italic text-xs">尚未選擇</span>'}</div>
        </div>`;
    });
    calculate();
}

function renderInventoryEditor() {
    const area = document.getElementById('inventoryEditor'); area.innerHTML = '';
    catOrder.forEach((cat, cIdx) => {
        const sec = document.createElement('div'); sec.className = "bg-white p-4 rounded-xl border shadow-sm relative";
        sec.innerHTML = `<div class="flex justify-between items-center mb-2">
            <input class="font-bold text-blue-600 bg-transparent border-none p-0 w-2/3" value="${cat}" onchange="renameCat(${cIdx}, this.value)">
            <div class="flex gap-1"><button onclick="moveCat(${cIdx},-1)">↑</button><button onclick="moveCat(${cIdx},1)">↓</button></div></div>
            <div id="edit-${cat}" class="space-y-2"></div><button onclick="addInvItem('${cat}')" class="w-full text-xs text-gray-400 border-dashed border mt-2 py-1">+ 零件</button>`;
        area.appendChild(sec);
        (inv[cat] || []).forEach((item, idx) => {
            const row = document.createElement('div'); row.className = "flex flex-col gap-1 bg-gray-50 p-2 rounded relative";
            row.innerHTML = `<input type="text" class="text-xs font-bold" value="${item.name}" onchange="inv['${cat}'][${idx}].name=this.value">
                <div class="flex gap-1"><input type="number" class="w-1/2 text-xs" value="${item.p}" onchange="inv['${cat}'][${idx}].p=this.value">
                <input type="number" class="w-1/2 text-xs text-red-500" value="${item.c||0}" onchange="inv['${cat}'][${idx}].c=this.value"></div>
                <button onclick="removeInvItem('${cat}',${idx})" class="absolute top-1 right-1 text-gray-300">×</button>`;
            document.getElementById(`edit-${cat}`).appendChild(row);
        });
    });
}

function addNewCategory() { const name = prompt("輸入新大項"); if(name) { catOrder.push(name); inv[name] = []; renderInventoryEditor(); } }
function moveCat(i, d) { let n = i+d; if(n>=0 && n<catOrder.length) [catOrder[i], catOrder[n]] = [catOrder[n], catOrder[i]]; renderInventoryEditor(); }
function renameCat(i, nN) { const oN = catOrder[i]; inv[nN] = inv[oN]; delete inv[oN]; catOrder[i] = nN; renderInventoryEditor(); }
function addInvItem(c) { inv[c].push({name:"", p:0, c:0}); renderInventoryEditor(); }
function removeInvItem(c, i) { inv[c].splice(i,1); renderInventoryEditor(); }
function saveInventory() { db.ref('inventory').set(inv); db.ref('catOrder').set(catOrder).then(()=>alert('雲端已同步')); }

function enterScreenshotMode() {
    const now = new Date();
    document.getElementById('print-date').innerText = "DATE: " + now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('mainBody').classList.add('screenshot-mode');
    document.getElementById('exitBtn').style.display = 'block';
    window.scrollTo(0,0);
}

function exitScreenshotMode() { document.getElementById('mainBody').classList.remove('screenshot-mode'); document.getElementById('exitBtn').style.display = 'none'; }
function saveRecord(type) {
    const id = editingRecordId || Date.now(); const status = type === 'current' ? currentStatus : type;
    const r = { id, time: new Date().toLocaleString(), name: document.getElementById('custName').value, source: document.getElementById('custSource').value, phone: document.getElementById('custPhone').value, addr: document.getElementById('custAddr').value, memo: document.getElementById('orderMemo').value, selections: currentSelections, noCard: document.getElementById('noCardTotal').value, total: document.getElementById('ui-totalSale').innerText, status };
    db.ref('records/' + id).set(r).then(() => { alert('已儲存'); resetForm(); showTab('orders'); });
}

function renderRecords() {
    const dList = document.getElementById('draftList'), oList = document.getElementById('orderList');
    dList.innerHTML = ''; oList.innerHTML = '';
    records.sort((a,b)=>b.id-a.id).forEach(r => {
        const div = `<div class="p-4 border rounded-xl bg-white flex justify-between items-center shadow-sm">
            <div><div class="text-[10px] text-gray-400">${r.time}</div><div class="font-bold text-sm">[${r.source||'無'}] ${r.name}</div><div class="text-blue-600 font-bold">${r.total}</div></div>
            <div class="flex gap-2"><button onclick="editDraft(${r.id})" class="px-3 py-1 bg-blue-500 text-white text-xs rounded">編輯</button></div>
        </div>`;
        if(r.status === 'draft') dList.innerHTML += div; else oList.innerHTML += div;
    });
    document.getElementById('count-draft').innerText = records.filter(r=>r.status==='draft').length;
    document.getElementById('count-order').innerText = records.filter(r=>r.status==='order').length;
}

function editDraft(id) {
    const r = records.find(x => x.id === id); editingRecordId = id; currentStatus = r.status; currentSelections = r.selections || {};
    document.getElementById('custName').value = r.name||''; document.getElementById('custPhone').value = r.phone||'';
    document.getElementById('custAddr').value = r.addr||''; document.getElementById('orderMemo').value = r.memo||'';
    document.getElementById('noCardTotal').value = r.noCard||''; renderConfig(); showTab('calc');
}

function showTab(t) { 
    document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden')); 
    document.getElementById('tab-'+t).classList.remove('hidden'); 
    document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('btn-'+t).classList.add('tab-active');
    if(t==='inventory') renderInventoryEditor(); 
}
function toggleSellerMode() { isSellerMode = !isSellerMode; document.getElementById('sellerBox').classList.toggle('hidden'); renderConfig(); }
function resetForm() { editingRecordId = null; currentSelections = {}; calculate(); renderConfig(); }
function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }
function openSelection(cat) {
    currentCat = cat; const list = document.getElementById('modalList'); list.innerHTML = '';
    (inv[cat] || []).forEach((item, idx) => {
        const selObj = (currentSelections[cat] || []).find(s => s.idx === idx);
        list.innerHTML += `<div onclick="togglePick(${idx})" class="p-3 border rounded-lg mb-2 flex justify-between ${selObj?'bg-blue-50 border-blue-200':''}">
            <div><div class="font-bold">${item.name}</div><div class="text-xs text-blue-500">$${item.p}</div></div>
            <div class="flex items-center gap-2"><label onclick="event.stopPropagation()"><input type="checkbox" ${selObj?.isGift?'checked':''} onchange="toggleGift(${idx},this.checked)"> 贈</label></div>
        </div>`;
    });
    document.getElementById('selectionModal').classList.remove('hidden');
}
function togglePick(idx) {
    if(!currentSelections[currentCat]) currentSelections[currentCat] = [];
    const i = currentSelections[currentCat].findIndex(s => s.idx === idx);
    if(i > -1) currentSelections[currentCat].splice(i,1); else currentSelections[currentCat].push({idx, isGift:false, qty:1});
    renderConfig(); openSelection(currentCat);
}
function toggleGift(idx, checked) { const sel = currentSelections[currentCat]?.find(s => s.idx === idx); if(sel) sel.isGift = checked; renderConfig(); }
window.onload = () => { renderConfig(); };
</script>
</body>
</html>
