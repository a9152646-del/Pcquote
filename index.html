<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pcquote 專業管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background: white; border-radius: 1.5rem; shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .active-tab { background-color: #1e293b; color: white; }
    </style>
</head>
<body>

    <div id="landing-page" class="max-w-md mx-auto mt-12 p-6">
        <div class="card p-10 text-center space-y-8">
            <div class="space-y-2">
                <h1 class="text-3xl font-black text-gray-800">Pcquote</h1>
                <p class="text-gray-500 font-medium">專業報價管理系統</p>
            </div>
            
            <div class="flex gap-4">
                <button onclick="showSystem('drafts')" class="flex-1 bg-slate-700 text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">📋 報價單列表</button>
                <button onclick="showSystem('calc')" class="flex-1 bg-blue-50 text-blue-600 py-5 rounded-2xl font-bold shadow-lg border border-blue-100 active:scale-95 transition-transform">＋ 建立新報價</button>
            </div>

            <div class="relative mt-6">
                <input type="text" placeholder="🔍 搜尋客戶、單號..." class="w-full p-4 pl-12 border-2 border-gray-100 rounded-2xl bg-gray-50 focus:border-blue-400 outline-none transition-all">
                <span class="absolute left-4 top-4 grayscale opacity-50">🔎</span>
            </div>
        </div>
        
        <div class="mt-8 text-center text-gray-400 text-sm">
            神奇海螺電競 © 2026 數位管理系統
        </div>
    </div>

    <div id="main-system" class="hidden min-h-screen pb-20">
        <nav class="bg-white border-b sticky top-0 z-10 px-4 py-3 flex justify-between items-center">
            <button onclick="goHome()" class="text-gray-500 font-bold">← 返回首頁</button>
            <div class="flex gap-1 bg-gray-100 p-1 rounded-xl">
                <button id="tab-btn-calc" onclick="showTab('calc')" class="px-4 py-2 rounded-lg text-sm font-bold active-tab">報價系統</button>
                <button id="tab-btn-stock" onclick="showTab('stock')" class="px-4 py-2 rounded-lg text-sm font-bold">庫存管理</button>
                <button id="tab-btn-drafts" onclick="showTab('drafts')" class="px-4 py-2 rounded-lg text-sm font-bold">草稿列表</button>
            </div>
        </nav>

        <main class="p-4 max-w-4xl mx-auto">
            <section id="tab-calc" class="tab-content space-y-4">
                <div class="card p-6">
                    <h2 class="text-xl font-bold mb-4">新建報價單</h2>
                    <p class="text-gray-400 italic">報價功能載入中...</p>
                </div>
            </section>

            <section id="tab-stock" class="tab-content hidden card p-6">
                <h2 class="text-xl font-bold mb-4">庫存狀態</h2>
                </section>

            <section id="tab-drafts" class="tab-content hidden card p-6">
                <h2 class="text-xl font-bold mb-4">已儲存的報價</h2>
                </section>
        </main>
    </div>

    <script>
        // --- 核心邏輯 ---

        // 1. 顯示系統並跳轉分頁
        function showSystem(targetTab) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('main-system').classList.remove('hidden');
            showTab(targetTab);
        }

        // 2. 回到首頁
        function goHome() {
            document.getElementById('landing-page').classList.remove('hidden');
            document.getElementById('main-system').classList.add('hidden');
        }

        // 3. 切換分頁
        function showTab(tabId) {
            // 隱藏所有分頁
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            // 移除所有按鈕樣式
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            
            // 顯示目標
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('tab-btn-' + tabId).classList.add('active-tab');
        }

        // --- Firebase 設定 (請確保此處資訊正確) ---
        const firebaseConfig = {
            // 請貼上你的 Firebase Config
            databaseURL: "你的資料庫網址"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
    </script>
</body>
</html>
